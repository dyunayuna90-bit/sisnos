<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OS-NXT // Retro Notes</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&family=Fira+Code:wght@400;700&display=swap');

        :root {
            /* Theme 1: Pip-Boy (Default) */
            --bg-bezel: #111;
            --bg-color: #051505;
            --text-color: #14ff14;
            --text-muted: #0b7a0b;
            --accent: #22ff22;
            --glow: 0 0 10px rgba(20, 255, 20, 0.5);
            --crt-line: rgba(20, 255, 20, 0.1);
            --font-main: 'VT323', monospace;
            --font-code: 'Fira Code', monospace;
            --chart-fill: rgba(20, 255, 20, 0.2);
        }

        [data-theme="linux"] {
            /* Theme 2: Linux Ivory Terminal */
            --bg-bezel: #bdc3c7;
            --bg-color: #fffff0;
            --text-color: #333333;
            --text-muted: #888888;
            --accent: #d35400;
            --glow: 0 0 5px rgba(51, 51, 51, 0.2);
            --crt-line: rgba(0, 0, 0, 0.05);
            --font-main: 'Fira Code', monospace;
            --chart-fill: rgba(51, 51, 51, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-tap-highlight-color: transparent; scrollbar-width: none; }
        ::-webkit-scrollbar { display: none; }

        body {
            background-color: var(--bg-bezel); height: 100vh; width: 100vw; overflow: hidden;
            display: flex; justify-content: center; align-items: center;
            font-family: var(--font-main); color: var(--text-color); padding: 10px;
        }

        /* 3D Hardware Frame */
        #hardware-frame {
            width: 100%; height: 100%; position: relative;
            background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(0,0,0,0.5) 100%);
            border-radius: 20px; padding: 15px;
            box-shadow: inset 0 0 20px #000, 0 10px 30px rgba(0,0,0,0.8);
            display: flex; flex-direction: column;
        }

        /* CRT Screen Glass */
        #screen-glass {
            flex: 1; position: relative; background-color: var(--bg-color);
            border-radius: 15px; overflow: hidden;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.8), 0 0 10px var(--text-color);
            display: flex; flex-direction: column;
        }

        /* CRT Effects */
        #screen-glass::after {
            content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, var(--crt-line) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            z-index: 10; background-size: 100% 4px, 6px 100%; pointer-events: none;
        }

        .scanline {
            width: 100%; height: 100px; z-index: 9; position: absolute; pointer-events: none;
            background: linear-gradient(0deg, rgba(0,0,0,0) 0%, var(--crt-line) 50%, rgba(0,0,0,0) 100%);
            animation: scan 6s linear infinite; opacity: 0.5;
        }

        @keyframes scan { 0% { top: -100px; } 100% { top: 100%; } }
        @keyframes flicker { 0% { opacity: 0.95; } 5% { opacity: 0.85; } 10% { opacity: 0.95; } 100% { opacity: 1; } }
        .flicker-effect { animation: flicker 0.15s infinite alternate; }

        /* Main View Container */
        #viewport {
            flex: 1; overflow-y: auto; overflow-x: hidden; padding: 15px; padding-bottom: 80px;
            text-shadow: var(--glow); z-index: 5; position: relative;
        }

        /* Bottom Header / Navigation (Ramah Jempol) */
        #bottom-nav {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 65px;
            background: rgba(0,0,0,0.8); border-top: 2px solid var(--text-color);
            display: flex; justify-content: space-around; align-items: center;
            z-index: 20; backdrop-filter: blur(5px);
        }

        .nav-btn {
            background: none; border: none; color: var(--text-muted); font-family: var(--font-main);
            font-size: 1.2rem; cursor: pointer; padding: 10px; transition: 0.2s; text-transform: uppercase;
        }
        .nav-btn.active { color: var(--text-color); text-shadow: var(--glow); border-bottom: 2px solid var(--text-color); }

        /* Typography & UI Elements */
        h1, h2, h3 { text-transform: uppercase; border-bottom: 1px solid var(--text-color); padding-bottom: 5px; margin-bottom: 15px; }
        button, input {
            font-family: var(--font-main); color: var(--text-color); background: transparent;
            border: 1px solid var(--text-color); outline: none; padding: 10px; text-shadow: var(--glow);
        }
        button { cursor: pointer; text-transform: uppercase; }
        button:active { background: var(--text-color); color: var(--bg-color); }
        input::placeholder { color: var(--text-muted); opacity: 0.5; }
        input { user-select: auto; }

        /* Fake Terminal Cursor Editor (The Logical Hack) */
        .editor-container { position: relative; width: 100%; height: 50vh; margin-top: 10px; }
        
        #edit-content, #edit-replica {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            font-family: var(--font-main); font-size: 1.3rem; line-height: 1.5;
            padding: 10px; border: 1px solid var(--text-color);
            white-space: pre-wrap; word-break: break-word; overflow-y: auto; margin: 0;
            background: transparent; outline: none; border-radius: 0;
        }
        
        /* The real input is invisible but captures native events */
        #edit-content { color: transparent; caret-color: transparent; z-index: 2; user-select: auto; }
        #edit-content::selection { background: rgba(100, 100, 100, 0.4); color: transparent; }
        
        /* The replica shows the text and the thick cursor */
        #edit-replica { color: var(--text-color); z-index: 1; pointer-events: none; }
        .thick-cursor {
            display: inline-block; width: 0.6em; height: 1.2em;
            background-color: var(--text-color); vertical-align: text-bottom;
            animation: blink 1s step-end infinite; margin-left: 2px;
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        /* Data Visualization Canvas */
        .chart-container { border: 1px solid var(--text-color); padding: 5px; margin-bottom: 15px; position: relative; }
        canvas { display: block; width: 100%; }
        .chart-label { position: absolute; top: 5px; left: 10px; font-size: 0.8rem; background: var(--bg-color); padding: 0 5px; }

        /* Specific Views */
        .note-card { border: 1px solid var(--text-color); padding: 10px; margin-bottom: 10px; cursor: pointer; }
        .note-card:active { background: var(--chart-fill); }
        .note-date { font-size: 0.8rem; color: var(--text-muted); }
        .label-badge {
            display: inline-block; padding: 2px 5px; font-size: 0.7rem;
            border: 1px solid var(--accent); color: var(--accent); margin-right: 5px;
        }

        .timeline-item { border-left: 2px solid var(--text-color); padding-left: 15px; margin-bottom: 20px; position: relative; }
        .timeline-item::before {
            content: ''; position: absolute; left: -6px; top: 0;
            width: 10px; height: 10px; background: var(--bg-color); border: 2px solid var(--text-color); border-radius: 50%;
        }

        .flex-row { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; align-items: center;}
        .flex-between { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }

        /* Modal / Commit Dialog */
        #modal-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 50; display: none;
            justify-content: center; align-items: center; padding: 20px;
        }
        .modal-box {
            border: 2px solid var(--text-color); background: var(--bg-color);
            padding: 20px; width: 100%; max-width: 400px; text-align: center;
        }
        .modal-box input { width: 100%; margin: 15px 0; text-align: center; font-size: 1.5rem; text-transform: uppercase; }

        /* Toast Fallback */
        #toast {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            background: var(--text-color); color: var(--bg-color);
            padding: 5px 15px; font-weight: bold; z-index: 100; opacity: 0; pointer-events: none;
            transition: opacity 0.3s;
        }
    </style>
</head>
<body data-theme="pipboy">

    <div id="hardware-frame">
        <div id="screen-glass" class="flicker-effect">
            <div class="scanline"></div>
            <div id="toast">ACTION SUCCESS</div>

            <div id="viewport">
                <!-- Content injected by JS -->
            </div>

            <div id="bottom-nav">
                <button class="nav-btn active" onclick="navigate('dashboard')">SYS</button>
                <button class="nav-btn" onclick="navigate('notes')">DATA</button>
                <button class="nav-btn" onclick="navigate('log')">LOG</button>
                <button class="nav-btn" onclick="navigate('settings')">CFG</button>
            </div>
        </div>
    </div>

    <!-- Modal System -->
    <div id="modal-overlay">
        <div class="modal-box">
            <h3 id="modal-title">REQUIRE COMMIT</h3>
            <p id="modal-desc">Type 'ok' to execute action.</p>
            <input type="text" id="modal-input" autocomplete="off">
            <div class="flex-row" style="justify-content: center;">
                <button onclick="closeModal()">ABORT</button>
                <button id="modal-confirm" style="background: var(--text-color); color: var(--bg-color);">EXECUTE</button>
            </div>
        </div>
    </div>

    <script>
        /** * OS-NXT CORE LOGIC
         * Strict. Logical. No nonsense.
         */

        // --- STATE MANAGEMENT ---
        let state = {
            notes: JSON.parse(localStorage.getItem('os-nxt-notes')) || [],
            labels: JSON.parse(localStorage.getItem('os-nxt-labels')) || ['TUGAS', 'PRIBADI', 'IDE'],
            logs: JSON.parse(localStorage.getItem('os-nxt-logs')) || [],
            settings: JSON.parse(localStorage.getItem('os-nxt-settings')) || { theme: 'pipboy', sound: true },
            currentView: 'dashboard',
            activeNoteId: null,
            filterLabel: null
        };

        const saveState = () => {
            localStorage.setItem('os-nxt-notes', JSON.stringify(state.notes));
            localStorage.setItem('os-nxt-labels', JSON.stringify(state.labels));
            localStorage.setItem('os-nxt-logs', JSON.stringify(state.logs));
            localStorage.setItem('os-nxt-settings', JSON.stringify(state.settings));
        };

        const addLog = (action, details) => {
            const entry = { id: Date.now(), action, details, time: new Date().toISOString() };
            state.logs.unshift(entry);
            if(state.logs.length > 200) state.logs.pop(); // Prevent memory leak
            saveState();
        };

        // --- AUDIO ENGINE ---
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;

        const initAudio = () => { if (!audioCtx) audioCtx = new AudioContext(); };

        const playTone = (freq, type, duration, vol) => {
            if (!state.settings.sound) return;
            initAudio();
            if(audioCtx.state === 'suspended') audioCtx.resume();
            
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        };

        const sfx = {
            type: () => playTone(Math.random() * 100 + 300, 'square', 0.05, 0.02),
            enter: () => playTone(600, 'triangle', 0.1, 0.05),
            error: () => playTone(150, 'sawtooth', 0.3, 0.1),
            commit: () => { playTone(800, 'square', 0.1, 0.05); setTimeout(() => playTone(1200, 'square', 0.15, 0.05), 100); }
        };

        // --- UI & RENDER ENGINE ---
        const viewport = document.getElementById('viewport');
        const showToast = (msg) => {
            const t = document.getElementById('toast');
            t.innerText = msg; t.style.opacity = 1;
            setTimeout(() => t.style.opacity = 0, 2000);
        };

        const fmtDate = (iso) => {
            const d = new Date(iso);
            return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
        };

        // Escape HTML to prevent XSS in replica
        const escapeHTML = (str) => {
            return str.replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag]));
        };

        // --- NAVIGATION ---
        let activeAnimations = []; // Store animation frame IDs to cancel them
        const clearAnimations = () => { activeAnimations.forEach(id => cancelAnimationFrame(id)); activeAnimations = []; };

        const navigate = (view, silent = false) => {
            if (!silent) sfx.enter();
            state.currentView = view;
            clearAnimations();
            
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            const activeBtn = Array.from(document.querySelectorAll('.nav-btn')).find(b => b.innerText.includes(view === 'notes' || view === 'editor' ? 'DATA' : (view === 'log' ? 'LOG' : (view === 'settings' ? 'CFG' : 'SYS'))));
            if(activeBtn) activeBtn.classList.add('active');

            if(view === 'dashboard') renderDashboard();
            else if(view === 'notes') renderNotes();
            else if(view === 'editor') renderEditor();
            else if(view === 'log') renderLog();
            else if(view === 'settings') renderSettings();

            if(!silent) history.pushState({ view: view }, "", `#${view}`);
        };

        window.addEventListener('popstate', (e) => {
            if(e.state && e.state.view) navigate(e.state.view, true);
            else navigate('dashboard', true);
        });

        // --- VIEWS ---

        // 1. Dashboard (SYS) with Analytics
        const renderDashboard = () => {
            viewport.innerHTML = `
                <h2>SYSTEM DIAGNOSTICS</h2>
                
                <div class="chart-container" style="height: 120px;">
                    <span class="chart-label">ACTIVITY LOG (7 DAYS)</span>
                    <canvas id="line-chart" height="100"></canvas>
                </div>

                <div class="flex-row" style="align-items: stretch;">
                    <div class="chart-container" style="flex: 1; height: 140px; display:flex; justify-content:center; align-items:center;">
                        <span class="chart-label">DATA DISTRIBUTION</span>
                        <canvas id="pie-chart" width="120" height="120"></canvas>
                    </div>
                    <div class="chart-container" style="flex: 1; height: 140px; display:flex; justify-content:center; align-items:center; overflow:hidden;">
                        <span class="chart-label">MEMORY SCAN</span>
                        <canvas id="radar-chart" width="120" height="120"></canvas>
                    </div>
                </div>

                <div class="flex-between"><span>TOTAL BLOCKS:</span><span>${state.notes.length}</span></div>
                <div class="flex-between"><span>TOTAL LABELS:</span><span>${state.labels.length}</span></div>
                <div class="flex-between"><span>TOTAL LOGS:</span><span>${state.logs.length}</span></div>
            `;
            
            drawActivityLineChart();
            drawPieChart();
            drawRadarScanner();
            addLog('SYSTEM', 'Accessed Diagnostics');
        };

        const drawActivityLineChart = () => {
            const canvas = document.getElementById('line-chart');
            if(!canvas) return;
            const ctx = canvas.getContext('2d');
            canvas.width = canvas.parentElement.clientWidth - 10;
            const color = getComputedStyle(document.body).getPropertyValue('--text-color').trim();
            const fill = getComputedStyle(document.body).getPropertyValue('--chart-fill').trim();

            // Calculate actual data: last 7 days activity count
            const daysData = Array(7).fill(0);
            const now = new Date();
            state.logs.forEach(log => {
                const diffTime = Math.abs(now - new Date(log.time));
                const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
                if(diffDays < 7) daysData[6 - diffDays]++; // index 6 is today, 0 is 6 days ago
            });

            const maxVal = Math.max(...daysData, 5); // Base max of 5
            
            ctx.fillStyle = fill;
            ctx.strokeStyle = color;
            ctx.lineWidth = 2;
            
            ctx.beginPath();
            const stepX = canvas.width / 6;
            ctx.moveTo(0, canvas.height);

            daysData.forEach((val, i) => {
                const x = i * stepX;
                const y = canvas.height - ((val / maxVal) * (canvas.height - 20)) - 10;
                ctx.lineTo(x, y);
                // Draw dots
                ctx.fillRect(x-2, y-2, 4, 4);
            });
            
            ctx.lineTo(canvas.width, canvas.height);
            ctx.closePath();
            ctx.fill();
            ctx.stroke();
        };

        const drawPieChart = () => {
            const canvas = document.getElementById('pie-chart');
            if(!canvas) return;
            const ctx = canvas.getContext('2d');
            const color = getComputedStyle(document.body).getPropertyValue('--text-color').trim();
            const colorMuted = getComputedStyle(document.body).getPropertyValue('--text-muted').trim();

            // Calculate label distribution
            const dist = { 'UNLABELED': 0 };
            state.labels.forEach(l => dist[l] = 0);
            state.notes.forEach(n => {
                if(n.labels.length === 0) dist['UNLABELED']++;
                else n.labels.forEach(l => { if(dist[l] !== undefined) dist[l]++; });
            });

            const total = Object.values(dist).reduce((a,b)=>a+b, 0);
            if(total === 0) {
                ctx.fillStyle = colorMuted;
                ctx.fillText("NO DATA", canvas.width/2 - 20, canvas.height/2);
                return;
            }

            let startAngle = 0;
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            const radius = Math.min(cx, cy) - 10;

            Object.entries(dist).forEach(([label, count], index) => {
                if(count === 0) return;
                const sliceAngle = (count / total) * 2 * Math.PI;
                
                ctx.beginPath();
                ctx.moveTo(cx, cy);
                ctx.arc(cx, cy, radius, startAngle, startAngle + sliceAngle);
                ctx.closePath();
                
                // Alternate fill styles for retro look (lines, solid, transparent)
                if(index % 3 === 0) { ctx.fillStyle = color; ctx.fill(); }
                else if (index % 3 === 1) { 
                    ctx.strokeStyle = color; ctx.lineWidth = 2; ctx.stroke();
                    ctx.fillStyle = getComputedStyle(document.body).getPropertyValue('--chart-fill').trim(); ctx.fill();
                } else {
                    // Hatch pattern logic via simple arc drawing
                    ctx.strokeStyle = colorMuted; ctx.lineWidth = 1; ctx.stroke();
                }
                startAngle += sliceAngle;
            });
        };

        const drawRadarScanner = () => {
            const canvas = document.getElementById('radar-chart');
            if(!canvas) return;
            const ctx = canvas.getContext('2d');
            const cx = canvas.width / 2; const cy = canvas.height / 2;
            const radius = cx - 5;
            let angle = 0;
            const color = getComputedStyle(document.body).getPropertyValue('--text-color').trim();

            const animate = () => {
                if(state.currentView !== 'dashboard') return;
                
                ctx.fillStyle = 'rgba(0, 0, 0, 0.1)'; // Fade effect
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                // Draw grid
                ctx.strokeStyle = getComputedStyle(document.body).getPropertyValue('--crt-line').trim();
                ctx.beginPath(); ctx.arc(cx, cy, radius, 0, Math.PI*2); ctx.stroke();
                ctx.beginPath(); ctx.arc(cx, cy, radius*0.5, 0, Math.PI*2); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(cx, 0); ctx.lineTo(cx, canvas.height); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0, cy); ctx.lineTo(canvas.width, cy); ctx.stroke();

                // Draw Scanner
                ctx.save();
                ctx.translate(cx, cy);
                ctx.rotate(angle);
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.arc(0, 0, radius, 0, 0.2);
                ctx.lineTo(0,0);
                ctx.fillStyle = getComputedStyle(document.body).getPropertyValue('--chart-fill').trim();
                ctx.fill();
                ctx.strokeStyle = color;
                ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(radius, 0); ctx.stroke();
                ctx.restore();

                angle += 0.05;
                activeAnimations.push(requestAnimationFrame(animate));
            };
            animate();
        };

        // 2. Notes List (DATA)
        const renderNotes = () => {
            const searchTerm = document.getElementById('search-box')?.value.toLowerCase() || '';
            let filteredNotes = state.notes;
            
            if(state.filterLabel) filteredNotes = filteredNotes.filter(n => n.labels.includes(state.filterLabel));
            if(searchTerm) filteredNotes = filteredNotes.filter(n => n.title.toLowerCase().includes(searchTerm) || n.content.toLowerCase().includes(searchTerm));

            viewport.innerHTML = `
                <h2>DATABANKS</h2>
                <input type="text" id="search-box" placeholder="> Query data..." value="${searchTerm}" style="width:100%; margin-bottom:10px;" onkeyup="sfx.type(); renderNotes()">
                
                <div style="overflow-x: auto; white-space: nowrap; margin-bottom: 15px; padding-bottom: 5px;">
                    <button style="border: ${!state.filterLabel ? '1px solid' : 'none'}; padding: 5px;" onclick="setFilter(null)">[ALL]</button>
                    ${state.labels.map(l => `
                        <button style="border: ${state.filterLabel === l ? '1px solid' : 'none'}; padding: 5px; margin-left:5px;" onclick="setFilter('${l}')">[${l}]</button>
                    `).join('')}
                </div>

                <div id="notes-list">
                    ${filteredNotes.length === 0 ? '<p>NO DATA BLOCKS FOUND.</p>' : filteredNotes.map(n => `
                        <div class="note-card" onclick="openNote(${n.id})">
                            <div class="flex-between" style="margin-bottom:5px;">
                                <strong>${n.title || 'UNTITLED_DATA'}</strong>
                                <span class="note-date">${fmtDate(n.timestamp)}</span>
                            </div>
                            <div>${n.labels.map(l => `<span class="label-badge">${l}</span>`).join('')}</div>
                        </div>
                    `).join('')}
                </div>
                <button style="position:fixed; bottom: 80px; right: 20px; border-radius: 50%; width: 60px; height: 60px; font-size: 2rem; background: var(--bg-color); box-shadow: var(--glow);" onclick="addNote()">+</button>
            `;
        };

        const setFilter = (lbl) => { sfx.enter(); state.filterLabel = lbl; renderNotes(); };

        // 3. Editor (The Core Setup with Replica Hack)
        const addNote = () => {
            const id = Date.now();
            state.notes.unshift({ id, title: '', content: '', labels: [], timestamp: new Date().toISOString() });
            state.activeNoteId = id;
            saveState();
            navigate('editor');
            addLog('DATA', `Initialized new block ID:${id}`);
        };

        const openNote = (id) => {
            state.activeNoteId = id;
            navigate('editor');
            addLog('DATA', `Accessed block ID:${id}`);
        };

        const renderEditor = () => {
            const note = state.notes.find(n => n.id === state.activeNoteId);
            if(!note) return navigate('notes');

            viewport.innerHTML = `
                <div class="flex-between">
                    <button onclick="navigate('notes')">< BACK</button>
                    <button style="color:red; border-color:red;" onclick="requestDelete(${note.id})">[X] PURGE</button>
                </div>
                
                <input type="text" id="edit-title" value="${note.title}" placeholder="> TITLE_BLOCK" style="width:100%; margin-bottom:10px; font-size:1.2rem; font-weight:bold;" oninput="updateNote(); sfx.type()">
                
                <div class="flex-row" style="margin-bottom: 10px; font-size: 0.8rem;">
                    <span style="color:var(--text-muted)">TAGS:</span>
                    ${state.labels.map(l => `
                        <button style="padding: 2px 5px; font-size:0.7rem; border:${note.labels.includes(l)?'1px solid var(--accent)':'1px dashed var(--text-muted)'};" 
                                onclick="toggleLabel('${l}')">${l}</button>
                    `).join('')}
                    <button style="padding: 2px 5px; font-size:0.7rem;" onclick="navigate('settings')">+ MGR</button>
                </div>

                <div class="editor-container">
                    <div id="edit-replica"></div>
                    <textarea id="edit-content" placeholder="> BEGIN INPUT SEQUENCE..." oninput="syncReplica(); updateNote(); sfx.type()">${note.content}</textarea>
                </div>
            `;
            
            // Sync initial state for replica
            syncReplica();
            
            // Sync scrolling so the replica follows the invisible textarea exactly
            const textarea = document.getElementById('edit-content');
            const replica = document.getElementById('edit-replica');
            textarea.addEventListener('scroll', (e) => { replica.scrollTop = e.target.scrollTop; });
        };

        const syncReplica = () => {
            const textarea = document.getElementById('edit-content');
            const replica = document.getElementById('edit-replica');
            if(!textarea || !replica) return;
            
            // Logika Murni: Replace text biasa ke format HTML yang aman, lalu tempel span cursor di akhir.
            // Spasi ganda dan newline harus dijaga pakai trik spasi CSS atau pre-wrap (sudah di CSS).
            let text = textarea.value;
            if (text.endsWith('\n')) text += ' '; // Fix rendering bug if ends with newline
            
            replica.innerHTML = escapeHTML(text) + '<span class="thick-cursor"></span>';
        };

        const toggleLabel = (lbl) => {
            sfx.enter();
            const note = state.notes.find(n => n.id === state.activeNoteId);
            if(note.labels.includes(lbl)) note.labels = note.labels.filter(l => l !== lbl);
            else note.labels.push(lbl);
            saveState();
            renderEditor();
        };

        const updateNote = () => {
            const note = state.notes.find(n => n.id === state.activeNoteId);
            note.title = document.getElementById('edit-title').value;
            note.content = document.getElementById('edit-content').value;
            note.timestamp = new Date().toISOString();
            saveState();
        };

        // 4. Log / Timeline
        const renderLog = () => {
            viewport.innerHTML = `
                <h2>ACTIVITY TRACE</h2>
                <div style="border-left: 2px solid var(--text-color); margin-left: 10px;">
                    ${state.logs.map(l => `
                        <div class="timeline-item">
                            <span class="note-date">${fmtDate(l.time)}</span><br>
                            <strong>[${l.action}]</strong> ${l.details}
                        </div>
                    `).join('')}
                </div>
            `;
        };

        // 5. Settings & Label Manager (CFG)
        const renderSettings = () => {
            viewport.innerHTML = `
                <h2>CONFIGURATION</h2>
                
                <div class="flex-between" style="border:1px solid var(--text-color); padding:10px; margin-bottom:15px;">
                    <span>UI THEME</span>
                    <button onclick="toggleTheme()">${state.settings.theme === 'pipboy' ? 'PIP-BOY (DARK)' : 'LINUX (LIGHT)'}</button>
                </div>

                <div class="flex-between" style="border:1px solid var(--text-color); padding:10px; margin-bottom:15px;">
                    <span>SYSTEM AUDIO</span>
                    <button onclick="toggleSound()">${state.settings.sound ? 'ENABLED' : 'MUTED'}</button>
                </div>

                <h3>LABEL DATABASE MANAGER</h3>
                <div style="border: 1px solid var(--text-color); padding: 10px; margin-bottom: 15px;">
                    <div style="margin-bottom: 10px;">
                        ${state.labels.length === 0 ? '<p style="font-size:0.8rem">NO LABELS CONFIGURED.</p>' : ''}
                        ${state.labels.map(l => `
                            <div class="flex-between" style="border-bottom: 1px dashed var(--crt-line); padding: 5px 0;">
                                <span>[${l}]</span>
                                <button style="padding: 2px 5px; font-size: 0.7rem; border-color: red; color: red;" onclick="requestDeleteLabel('${l}')">DEL</button>
                            </div>
                        `).join('')}
                    </div>
                    <div class="flex-row">
                        <input type="text" id="new-label-input" placeholder="> NEW_LABEL_NAME" style="flex: 1;" onkeyup="sfx.type()">
                        <button onclick="addNewLabel()">[+] ADD</button>
                    </div>
                </div>

                <h3>DATA MANAGEMENT</h3>
                <p style="font-size:0.8rem; margin-bottom:10px; color:var(--text-muted)">Local state serialization. Ensure safety.</p>
                <div class="flex-row">
                    <button style="flex:1" onclick="exportData()">⬇ EXPORT</button>
                    <button style="flex:1" onclick="document.getElementById('import-file').click()">⬆ IMPORT</button>
                    <input type="file" id="import-file" style="display:none" accept=".json" onchange="handleImport(event)">
                </div>
            `;
        };

        const addNewLabel = () => {
            const input = document.getElementById('new-label-input');
            const val = input.value.trim().toUpperCase().replace(/\s+/g, '_');
            if(val && !state.labels.includes(val)) {
                sfx.commit();
                state.labels.push(val);
                saveState();
                addLog('CFG', `Created label [${val}]`);
                renderSettings();
            } else {
                sfx.error();
                showToast("INVALID OR DUPLICATE LABEL");
            }
        };

        const requestDeleteLabel = (lbl) => {
            openCommit('DELETE LABEL', `Type 'ok' to remove [${lbl}]. Associated notes will keep it as text but it won't be in system filters.`, () => {
                state.labels = state.labels.filter(l => l !== lbl);
                saveState();
                showToast('LABEL DELETED');
                addLog('CFG', `Deleted label [${lbl}]`);
                renderSettings();
            });
        };

        const toggleTheme = () => {
            sfx.enter();
            state.settings.theme = state.settings.theme === 'pipboy' ? 'linux' : 'pipboy';
            document.body.setAttribute('data-theme', state.settings.theme);
            saveState();
            renderSettings();
            addLog('CFG', `Theme switched to ${state.settings.theme}`);
        };

        const toggleSound = () => {
            state.settings.sound = !state.settings.sound;
            if(state.settings.sound) sfx.enter();
            saveState();
            renderSettings();
        };

        // --- BACKUP & RESTORE ---
        const exportData = () => {
            sfx.enter();
            const dataStr = JSON.stringify(state);
            const dataUri = 'data:application/json;charset=utf-8,'+ encodeURIComponent(dataStr);
            const exportFileDefaultName = `OS_NXT_BACKUP_${new Date().getTime()}.json`;
            
            const linkElement = document.createElement('a');
            linkElement.setAttribute('href', dataUri);
            linkElement.setAttribute('download', exportFileDefaultName);
            linkElement.click();
            
            showToast('EXPORT COMPLETE');
            addLog('DATA', 'Exported system backup');
        };

        let tempImportData = null;
        const handleImport = (e) => {
            const file = e.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                try {
                    tempImportData = JSON.parse(event.target.result);
                    if(tempImportData.notes && tempImportData.logs) {
                        openCommit('RESTORE OVERRIDE', 'WARNING: Local data will be destroyed. Type "ok" to proceed.', executeRestore);
                    } else throw new Error("Invalid format");
                } catch(err) {
                    sfx.error();
                    showToast('IMPORT FAILED: CORRUPT DATA');
                }
            };
            reader.readAsText(file);
            e.target.value = ''; // Reset input
        };

        const executeRestore = () => {
            state = tempImportData;
            saveState();
            document.body.setAttribute('data-theme', state.settings.theme);
            showToast('RESTORE SUCCESSFUL');
            addLog('SYSTEM', 'Restored from external backup');
            navigate('dashboard');
        };

        // --- COMMIT MODAL ENGINE ---
        let commitCallback = null;
        const modal = document.getElementById('modal-overlay');
        const modalInput = document.getElementById('modal-input');
        
        const openCommit = (title, desc, callback) => {
            sfx.error();
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-desc').innerText = desc;
            modalInput.value = '';
            commitCallback = callback;
            modal.style.display = 'flex';
            setTimeout(() => modalInput.focus(), 100);
        };

        const closeModal = () => { sfx.enter(); modal.style.display = 'none'; commitCallback = null; };

        document.getElementById('modal-confirm').addEventListener('click', () => {
            if(modalInput.value.toLowerCase() === 'ok') {
                sfx.commit();
                modal.style.display = 'none';
                if(commitCallback) commitCallback();
            } else {
                sfx.error();
                modalInput.value = '';
                modalInput.placeholder = "INVALID. TYPE 'ok'";
            }
        });

        // Trigger delete Note
        const requestDelete = (id) => {
            openCommit('PURGE DATA BLOCK', `Type 'ok' to permanently delete datablock ID:${id}.`, () => {
                state.notes = state.notes.filter(n => n.id !== id);
                saveState();
                showToast('BLOCK PURGED');
                addLog('DATA', `Purged datablock ID:${id}`);
                navigate('notes');
            });
        };

        // --- INITIALIZATION ---
        document.body.setAttribute('data-theme', state.settings.theme);
        history.replaceState({ view: 'dashboard' }, "", "#dashboard");
        renderDashboard();

        // Init audio engine on first interaction
        document.body.addEventListener('click', initAudio, { once: true });

    </script>
</body>
</html>
