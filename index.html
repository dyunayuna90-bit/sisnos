<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" id="meta-theme-color" content="#020802">
    
    <title>OS-NXT // APEX</title>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&family=Share+Tech+Mono&display=swap');

        :root {
            --bg-color: #020802;
            --bg-bezel: #010301;
            --text-color: #14ff14;
            --text-muted: #086b08;
            --accent: #22ff22;
            --glow-light: 0 0 3px rgba(20, 255, 20, 0.5);
            --glow-heavy: 0 0 10px rgba(20, 255, 20, 0.9), 0 0 2px rgba(255, 255, 255, 0.5);
            --crt-line: rgba(20, 255, 20, 0.08);
            --chart-fill: rgba(20, 255, 20, 0.2);
            --font-main: 'Share Tech Mono', monospace;
            --letter-space: 0.5px;
            --border-style: solid;
        }

        [data-theme="linux"] {
            --bg-color: #000000;
            --bg-bezel: #050505;
            --text-color: #ffb000; 
            --text-muted: #8a6300;
            --accent: #ffcc00; 
            --glow-light: 0 0 2px rgba(255, 176, 0, 0.4);
            --glow-heavy: 0 0 8px rgba(255, 176, 0, 0.8);
            --crt-line: rgba(255, 176, 0, 0.05);
            --chart-fill: rgba(255, 176, 0, 0.15);
            --font-main: 'Fira Code', monospace;
            --letter-space: -0.5px;
        }

        body[data-chroma="true"] {
            --glow-light: 1px 0px 0px rgba(255, 0, 0, 0.7), -1px 0px 0px rgba(0, 255, 255, 0.7), 0 0 4px rgba(20, 255, 20, 0.4);
            --glow-heavy: 2px 0px 0px rgba(255, 0, 0, 0.8), -2px 0px 0px rgba(0, 255, 255, 0.8), 0 0 12px rgba(20, 255, 20, 0.8);
        }
        body[data-theme="linux"][data-chroma="true"] {
            --glow-light: 1px 0px 0px rgba(255, 0, 0, 0.5), -1px 0px 0px rgba(0, 150, 255, 0.5);
            --glow-heavy: 2px 0px 0px rgba(255, 0, 0, 0.6), -2px 0px 0px rgba(0, 150, 255, 0.6), 0 0 8px rgba(255, 176, 0, 0.6);
        }
        
        body[data-scan="false"] #crt-matrix, 
        body[data-scan="false"] .vcr-tracking, 
        body[data-scan="false"] .scanline,
        body[data-scan="false"] .scanline-thick,
        body[data-scan="false"] .vsync-roll { display: none !important; }
        
        body[data-blur="true"] #crt-vignette { backdrop-filter: blur(0.8px); -webkit-backdrop-filter: blur(0.8px); }
        body[data-flicker="true"] #flicker-layer { animation: crt-flicker 0.12s infinite; }
        body[data-jitter="true"] #viewport { animation: signal-jitter 4s infinite; }
        body[data-interf="true"] #interference { animation: v-interf 6s infinite linear; }
        body[data-ghost="true"] #viewport { filter: drop-shadow(3px 0px 1px rgba(20,255,20,0.3)); }
        body[data-theme="linux"][data-ghost="true"] #viewport { filter: drop-shadow(2px 0px 1px rgba(255,176,0,0.2)); }

        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-user-select: none; -webkit-touch-callout: none; -webkit-tap-highlight-color: transparent; scrollbar-width: none; }
        ::-webkit-scrollbar { display: none; }
        input, [contenteditable="true"] { user-select: text; -webkit-user-select: text; -webkit-touch-callout: default; cursor: text; }

        body {
            background-color: var(--bg-bezel); height: 100vh; width: 100vw; overflow: hidden;
            display: flex; flex-direction: column; font-family: var(--font-main); color: var(--text-color);
            letter-spacing: var(--letter-space); text-transform: uppercase; font-size: 16px;
            -webkit-font-smoothing: none; text-rendering: optimizeSpeed; padding: 1vw;
        }

        #screen-tube {
            position: relative; width: 100%; height: 100%; border-radius: 20px; overflow: hidden;
            background-color: var(--bg-color); box-shadow: 0 0 0 4px #000, inset 0 0 30px rgba(0,0,0,0.9);
            border: 2px solid #111; z-index: 1; transform: translateZ(0);
        }

        /* 1. LAYERS */
        #crt-matrix { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(0, 0, 0, 0.2) 50%, transparent 50%), linear-gradient(90deg, rgba(0, 0, 0, 0.2) 50%, transparent 50%); background-size: 4px 4px; pointer-events: none; z-index: 2; transform: translateZ(0); }
        .vsync-roll { position: absolute; top: -20%; left: 0; width: 100%; height: 15%; background: linear-gradient(to bottom, transparent, rgba(0,0,0,0.4), transparent); animation: v-roll 8s linear infinite; z-index: 8; pointer-events: none; will-change: top; }
        .vcr-tracking { width: 100%; height: 15px; z-index: 9; position: absolute; pointer-events: none; background: rgba(255,255,255,0.03); box-shadow: 0 0 8px rgba(255,255,255,0.02); animation: tracking 6s infinite linear; will-change: top; }
        .scanline { width: 100%; height: 100px; z-index: 10; position: absolute; pointer-events: none; background: linear-gradient(0deg, transparent 0%, var(--crt-line) 50%, transparent 100%); animation: scan 3s linear infinite; will-change: top; }
        .scanline-thick { width: 100%; height: 300px; z-index: 10; position: absolute; pointer-events: none; background: linear-gradient(0deg, transparent, rgba(255,255,255,0.02), transparent); animation: scan-thick 12s linear infinite; will-change: top; }
        #interference { position: absolute; top: -20%; left: 0; width: 100%; height: 40px; background: linear-gradient(0deg, transparent, rgba(255,255,255,0.08), transparent); z-index: 97; pointer-events: none; opacity: 0; }
        #flicker-layer { position: absolute; top:0; left:0; width:100%; height:100%; background: #000; opacity: 0; pointer-events: none; z-index: 98; }
        #crt-vignette { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 50% 50%, transparent 50%, rgba(0,0,0,0.9) 120%), linear-gradient(90deg, rgba(0,0,0,0.6) 0%, transparent 5%, transparent 95%, rgba(0,0,0,0.6) 100%), linear-gradient(0deg, rgba(0,0,0,0.6) 0%, transparent 5%, transparent 95%, rgba(0,0,0,0.6) 100%); pointer-events: none; z-index: 99; transition: backdrop-filter 0.3s ease; box-shadow: inset 0 0 60px rgba(0,0,0,0.8); }

        /* 2. KEYFRAMES */
        @keyframes v-roll { 0% { top: -20%; } 100% { top: 120%; } }
        @keyframes tracking { 0% { top: -20px; } 100% { top: 110%; } }
        @keyframes scan { 0% { top: -150px; } 100% { top: 100%; } }
        @keyframes scan-thick { 0% { top: -300px; } 100% { top: 120%; } }
        @keyframes crt-flicker { 0% { opacity: 0; } 50% { opacity: 0.04; } 100% { opacity: 0; } }
        @keyframes signal-jitter { 0%, 9%, 11%, 100% { transform: translateX(0) skewX(0); } 10% { transform: translateX(-4px) skewX(1.5deg); } 10.5% { transform: translateX(3px) skewX(-1.5deg); } }
        @keyframes v-interf { 0% { top: -20%; opacity: 0; } 5% { opacity: 1; transform: skewX(10deg); } 8% { transform: skewX(-10deg); } 10% { top: 120%; opacity: 0; } 100% { top: 120%; opacity: 0; } }
        
        .crt-flash { animation: burst 0.4s cubic-bezier(0.1, 0.9, 0.2, 1) forwards; }
        @keyframes burst { 0% { filter: brightness(2.5) contrast(1.5) blur(2px); transform: scale(1.02); } 100% { filter: brightness(1) contrast(1) blur(0); transform: scale(1); } }
        
        .meltdown-fx { animation: glitch-tear 0.6s ease-in-out forwards; }
        @keyframes glitch-tear { 0% { transform: skew(0deg); filter: hue-rotate(0deg); } 15% { transform: skew(-25deg) translateX(-15px); filter: hue-rotate(90deg) invert(1); } 30% { transform: skew(20deg) translateX(10px); filter: hue-rotate(-90deg); } 45% { transform: skew(-10deg); filter: contrast(3); } 60% { transform: skew(15deg); opacity: 0.5; } 100% { transform: skew(0deg); filter: none; opacity: 1; } }

        .boot-flash { animation: boot-power-on 1s ease-out forwards; }
        @keyframes boot-power-on { 0% { transform: scaleY(0.01) scaleX(0); opacity: 0; filter: brightness(10); } 40% { transform: scaleY(0.02) scaleX(1); opacity: 1; filter: brightness(5); } 100% { transform: scaleY(1) scaleX(1); filter: brightness(1); } }

        /* 3. OS CONTENT */
        .safe-area-wrapper { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; z-index: 20; padding-top: max(env(safe-area-inset-top), 10px); }
        #viewport { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 25px; padding-bottom: 110px; text-shadow: var(--glow-light); position: relative; will-change: transform; transition: filter 0.3s; }

        #bottom-nav { position: absolute; bottom: 0; left: 0; width: 100%; height: 80px; background: rgba(0,0,0,0.8); border-top: 3px double var(--text-color); display: flex; justify-content: space-around; align-items: center; padding-bottom: env(safe-area-inset-bottom); z-index: 50; text-shadow: var(--glow-heavy); backdrop-filter: blur(5px); }
        .nav-btn { background: none; border: none; color: var(--text-muted); font-family: var(--font-main); font-size: 1.5rem; cursor: pointer; padding: 15px 5px; font-weight: bold; flex: 1; transition: 0.1s; position: relative;}
        .nav-btn.active { color: var(--bg-color); background: var(--text-color); text-shadow: none; box-shadow: 0 0 15px var(--text-color); transform: scale(0.95);}
        .nav-btn::before { content: '['; position: absolute; left: 10px; opacity: 0; transition: 0.2s; }
        .nav-btn::after { content: ']'; position: absolute; right: 10px; opacity: 0; transition: 0.2s; }
        .nav-btn.active::before, .nav-btn.active::after { opacity: 1; }

        h1, h2, h3 { background: var(--text-color); color: var(--bg-color); padding: 5px 10px; display: inline-block; margin-bottom: 18px; font-size: 1.4rem; font-weight: bold; text-shadow: none; letter-spacing: 2px; }
        h3 { background: transparent; color: var(--text-color); border-bottom: 2px dashed var(--text-color); text-shadow: var(--glow-heavy); }
        
        button, input { font-family: var(--font-main); color: var(--text-color); background: rgba(0,0,0,0.5); border: 2px var(--border-style) var(--text-color); outline: none; padding: 14px; text-transform: uppercase; font-size: 1.1rem; text-shadow: var(--glow-light); transition: all 0.1s;}
        button { cursor: pointer; font-weight: bold; text-shadow: var(--glow-heavy); position: relative; overflow: hidden; }
        button::before { content: ''; position: absolute; top:0; left:-100%; width:100%; height:100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent); transition: 0.2s; }
        button:active::before { left: 100%; transition: 0.1s; }
        button:active { background: var(--text-color); color: var(--bg-color); transform: translateY(2px); box-shadow: 0 0 10px var(--text-color); }
        input::placeholder { color: var(--text-muted); opacity: 0.6; text-transform: uppercase; }
        input:focus { background: rgba(20, 255, 20, 0.1); border-style: dashed; }

        .fab-btn { position: absolute; bottom: 100px; right: 25px; z-index: 40; width: 70px; height: 70px; font-size: 2.5rem; font-weight: bold; background: var(--bg-color); box-shadow: -5px 5px 0px var(--text-muted); border: 3px solid var(--text-color); display: flex; justify-content: center; align-items: center; color: var(--text-color); cursor: pointer; text-shadow: var(--glow-heavy); border-radius: 50%; }
        .fab-btn:active { box-shadow: 0 0 0 transparent; transform: translate(-5px, 5px); background: var(--text-color); color: var(--bg-color); }

        /* EDITOR */
        .editor-container { position: relative; width: 100%; height: 50vh; margin-top: 10px; border: 2px var(--border-style) var(--text-color); background: rgba(0,0,0,0.6); box-shadow: inset 0 0 20px rgba(0,0,0,0.8); overflow: hidden; }
        #edit-content { position: absolute; top: 0; left: 0; width: 100%; height: 100%; font-family: var(--font-main); font-size: 1.2rem; line-height: 1.6; padding: 15px; overflow-y: auto; outline: none; text-transform: none; caret-color: transparent; text-shadow: var(--glow-light); z-index: 2; }
        #edit-content::selection { background: var(--text-color); color: var(--bg-color); text-shadow: none; }
        #block-cursor { position: absolute; width: 14px; height: 1.4rem; background-color: var(--text-color); box-shadow: var(--glow-heavy); z-index: 1; pointer-events: none; display: none; animation: blink 0.8s step-end infinite; transition: top 0.05s, left 0.05s; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        #edit-content h1, #edit-content h2 { display: block; background: transparent; color: var(--text-color); text-shadow: var(--glow-heavy); padding:0; letter-spacing: 0; }
        #edit-content h1 { font-size: 2.2rem; border-bottom: 3px solid var(--text-color); margin-bottom: 10px; text-transform: uppercase; }
        #edit-content h2 { font-size: 1.8rem; border-bottom: 1px dashed var(--text-color); margin-bottom: 10px; text-transform: uppercase; }
        #edit-content b, #edit-content strong { background: var(--chart-fill); color: var(--accent); padding: 0 4px; text-shadow: none; border: 1px solid var(--accent);}
        
        /* SMART BULLETPROOF TOOLBAR */
        #format-toolbar { 
            position: absolute; background: var(--bg-color); border: 2px solid var(--text-color); box-shadow: 0 15px 30px rgba(0,0,0,1); 
            display: none; flex-direction: row; align-items: center; z-index: 9999; padding: 0; 
            opacity: 0; transition: opacity 0.1s; pointer-events: none;
            /* Pastikan nempel absolut ke body (atau wrapper) */
        }
        #format-toolbar::after { content: ''; position: absolute; bottom: -10px; left: var(--arrow-pos, 50%); transform: translateX(-50%); border-width: 10px 10px 0; border-style: solid; border-color: var(--text-color) transparent transparent transparent; display: block; width: 0; }
        #format-toolbar.flip-down::after { top: -10px; bottom: auto; border-width: 0 10px 10px; border-color: transparent transparent var(--text-color) transparent; }
        .fmt-btn { background: transparent; color: var(--text-color); border: none; font-size: 1.2rem; padding: 15px 20px; margin: 0; font-weight: bold; border-right: 2px solid var(--text-muted); border-radius: 0; pointer-events: auto;}
        .fmt-btn:last-child { border-right: none; }
        .fmt-btn:active { background: var(--text-color); color: var(--bg-color); transform: none; box-shadow: none;}

        .data-stream { font-size: 0.8rem; color: var(--text-muted); white-space: nowrap; overflow: hidden; margin-bottom: 15px; opacity: 0.8; font-family: monospace; }
        .chart-box { border: 2px var(--border-style) var(--text-color); padding: 10px; margin-top: 30px; margin-bottom: 20px; position: relative; background: repeating-linear-gradient(45deg, rgba(0,0,0,0), rgba(0,0,0,0) 10px, rgba(20,255,20,0.03) 10px, rgba(20,255,20,0.03) 20px); display: flex; justify-content: center; align-items: center; box-shadow: inset 0 0 15px rgba(0,0,0,0.5); }
        .chart-label { position: absolute; top: -14px; left: 15px; font-size: 1rem; background: var(--text-color); color: var(--bg-color); padding: 2px 10px; font-weight: bold; z-index: 2; text-shadow: none; box-shadow: 2px 2px 0 var(--text-muted);}
        canvas { display: block; width: 100%; image-rendering: pixelated; filter: drop-shadow(0 0 5px var(--text-color));}

        .note-card { border: 2px var(--border-style) var(--text-color); padding: 15px; margin-bottom: 15px; cursor: pointer; position: relative; display: block; width: 100%; text-align: left; background: rgba(0,0,0,0.4); border-left: 6px solid var(--text-color); transition: all 0.1s;}
        .note-card:active { background: var(--chart-fill); border-left-width: 15px; }
        .note-date { font-size: 0.85rem; color: var(--text-muted); margin-top: 8px; display: block; font-family: monospace;}
        .pin-badge { position: absolute; top: 10px; right: 10px; background: var(--text-color); color: var(--bg-color); font-size: 0.8rem; padding: 2px 8px; font-weight: bold; text-shadow: none; box-shadow: -2px 2px 0 var(--text-muted);}
        
        .label-badge { display: inline-block; padding: 4px 8px; font-size: 0.8rem; border: 1px solid var(--text-color); color: var(--text-color); margin-right: 5px; margin-top: 5px; background: rgba(0,0,0,0.6); }
        .swipe-labels { display: flex; overflow-x: auto; white-space: nowrap; padding-bottom: 15px; align-items: center; scrollbar-width: none;}
        .swipe-labels span { display: inline-block; cursor: pointer; border: 2px dashed var(--text-muted); padding: 8px 15px; margin-right: 10px; font-weight: bold; flex-shrink: 0; background: rgba(0,0,0,0.5);}
        .swipe-labels span.active-tag { border: 2px solid var(--text-color); background: var(--text-color); color: var(--bg-color); text-shadow: none; box-shadow: 2px 2px 0 var(--text-muted);}

        .timeline-item { border-left: 2px dashed var(--text-muted); padding-left: 20px; margin-bottom: 25px; position: relative; font-size: 1rem; line-height: 1.5;}
        .timeline-item::before { content: '>>'; position: absolute; left: -14px; top: 0; font-weight: bold; color: var(--accent); background: var(--bg-color); }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; align-items: stretch;}
        .flex-row { display: flex; gap: 15px; margin-bottom: 15px; flex-wrap: wrap; align-items: stretch;}
        .flex-between { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }

        .stat-block { flex: 1; border: 2px var(--border-style) var(--text-color); padding: 15px 10px; text-align: center; display: flex; flex-direction: column; justify-content: center; background: rgba(0,0,0,0.5); position: relative;}
        .stat-val { font-size: 1.8rem; font-weight: bold; text-shadow: var(--glow-heavy);}
        .stat-lbl { font-size: 0.8rem; color: var(--text-muted); margin-top: 5px; letter-spacing: 1px;}
        .prog-bar { width: 100%; height: 6px; background: var(--chart-fill); margin-top: 10px; position: relative; overflow: hidden;}
        .prog-fill { height: 100%; background: var(--text-color); width: 0%; transition: width 1s ease-out; box-shadow: var(--glow-light);}

        #modal-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 100; display: none; justify-content: center; align-items: center; padding: 20px; backdrop-filter: blur(2px);}
        .modal-box { border: 4px solid var(--text-color); background: repeating-linear-gradient(45deg, var(--bg-color), var(--bg-color) 10px, rgba(20,255,20,0.05) 10px, rgba(20,255,20,0.05) 20px); padding: 30px; width: 100%; max-width: 400px; text-align: center; box-shadow: -15px 15px 0px rgba(0,0,0,0.8), 0 0 30px var(--chart-fill); z-index: 101; position: relative;}
        .modal-box::before { content: '!'; position: absolute; top: -25px; left: -25px; width: 50px; height: 50px; background: var(--text-color); color: var(--bg-color); font-size: 2rem; font-weight: bold; display: flex; justify-content: center; align-items: center; }
        .modal-box input { width: 100%; margin: 25px 0; text-align: center; font-size: 1.8rem; text-shadow: var(--glow-light); background: rgba(0,0,0,0.9); }
        
        #toast { position: absolute; top: 60px; left: 50%; transform: translateX(-50%); background: var(--text-color); color: var(--bg-color); padding: 15px 30px; font-weight: bold; font-size: 1.3rem; z-index: 120; opacity: 0; pointer-events: none; transition: opacity 0.2s; border: 4px solid var(--bg-color); box-shadow: 0 0 30px var(--text-color); letter-spacing: 2px;}

        #power-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 200; display: flex; flex-direction: column; justify-content: center; align-items: center; color: var(--text-color); font-family: monospace; cursor: pointer; text-shadow: 0 0 8px var(--text-color); }
        .boot-logo-ascii { white-space: pre; font-size: 8px; line-height: 8px; margin-bottom: 30px; color: var(--text-color); text-shadow: var(--glow-heavy); text-align: center;}
        @media (min-width: 400px) { .boot-logo-ascii { font-size: 12px; line-height: 12px; } }
        #boot-instruct { font-size: 1.4rem; margin-bottom: 20px; font-weight: bold;}
        #boot-bar-container { width: 250px; height: 20px; border: 2px solid var(--text-color); padding: 3px; position: relative;}
        #boot-progress { width: 0%; height: 100%; background: var(--text-color); transition: width 0.1s linear; box-shadow: var(--glow-light);}
        #boot-console { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 199; display: none; flex-direction: column; padding: 20px; color: var(--text-color); font-family: monospace; font-size: 1.2rem; text-transform: uppercase; text-shadow: 0 0 5px var(--text-color); box-shadow: inset 0 0 50px rgba(0,0,0,0.9);}
        .boot-line { margin-bottom: 8px; word-break: break-all; }
        .boot-cursor { display: inline-block; width: 12px; height: 1.2rem; background: var(--text-color); animation: blink 0.5s step-end infinite; vertical-align: bottom;}
        
        .sys-glitch { animation: glitch-anim 0.2s linear infinite; }
        @keyframes glitch-anim { 0% { transform: translate(0) } 20% { transform: translate(-2px, 2px) } 40% { transform: translate(-2px, -2px) } 60% { transform: translate(2px, 2px) } 80% { transform: translate(2px, -2px) } 100% { transform: translate(0) } }

        .decrypting-text { font-family: monospace; opacity: 0.8; }
    </style>
</head>
<body>

    <div id="power-screen">
        <div class="boot-logo-ascii sys-glitch" id="ascii-logo" style="display:none;">
   ____  _____       _   ___  _______
  / __ \/ ___/      / | / / |/ /_  _/
 / / / /\__ \______/  |/ /|   / / /  
/ /_/ /___/ /_____/ /|  //   | / /   
\____//____/     /_/ |_//_/|_|/_/    
        </div>
        <div id="boot-instruct" class="sys-glitch">> INITIALIZE_</div>
        <div id="boot-bar-container"><div id="boot-progress"></div></div>
    </div>
    <div id="boot-console">
        <div id="boot-text-area"></div>
        <div class="boot-cursor" id="boot-cursor-elem"></div>
    </div>

    <!-- MAIN OS LAYERS -->
    <div id="screen-tube">
        <div id="crt-matrix"></div>
        <div class="vsync-roll"></div>
        <div class="vcr-tracking"></div>
        <div class="scanline"></div>
        <div class="scanline-thick"></div>
        
        <div id="interference"></div>
        <div id="flicker-layer"></div>
        <div id="crt-vignette"></div>
        <div id="toast">[ SYS MSG ]</div>

        <div class="safe-area-wrapper" id="os-ui">
            <div id="viewport"></div>

            <button id="main-fab" class="fab-btn" onclick="addNote()" style="display:none;">[+]</button>

            <!-- DYNAMIC BULLETPROOF TOOLBAR -->
            <div id="format-toolbar">
                <button class="fmt-btn" onmousedown="execFormat('formatBlock', 'H1'); return false;">H1</button>
                <button class="fmt-btn" onmousedown="execFormat('formatBlock', 'H2'); return false;">H2</button>
                <button class="fmt-btn" onmousedown="execFormat('bold'); return false;">B</button>
                <button class="fmt-btn" onmousedown="execFormat('italic'); return false;">I</button>
                <button class="fmt-btn" onmousedown="execSelectAll(); return false;">&lt;&gt;</button>
                <button class="fmt-btn" onmousedown="execCopy(); return false;">CPY</button>
            </div>

            <div id="bottom-nav">
                <button class="nav-btn active" onclick="navigate('dashboard')">SYS</button>
                <button class="nav-btn" onclick="navigate('notes')">DAT</button>
                <button class="nav-btn" onclick="navigate('log')">LOG</button>
                <button class="nav-btn" onclick="navigate('settings')">CFG</button>
            </div>
        </div>

        <div id="modal-overlay">
            <div class="modal-box">
                <h2 id="modal-title" style="margin-bottom: 5px; background:var(--bg-color); color:var(--text-color); border:2px solid var(--text-color);">SUDO EXEC</h2>
                <p id="modal-desc" style="font-size: 1rem; color: var(--text-muted); margin-bottom:10px; font-family: monospace; background:var(--bg-color); padding:5px;">Auth Required.</p>
                <input type="text" id="modal-input" autocomplete="off" placeholder="> TYPE 'OK'">
                <div class="grid-2" style="margin-top: 20px; margin-bottom: 0;">
                    <button onclick="closeModal()" style="border-style: dashed; background:var(--bg-color);">ABORT</button>
                    <button id="modal-confirm" style="background: var(--text-color); color: var(--bg-color);">EXEC</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const setupPWA = () => {
            const svgIcon = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" fill="#020802"/><text x="50" y="65" font-family="monospace" font-size="50" font-weight="bold" fill="#14ff14" text-anchor="middle">NXT</text></svg>`;
            const encodedIcon = "data:image/svg+xml;base64," + btoa(svgIcon);
            const link = document.createElement('link'); link.rel = 'icon'; link.href = encodedIcon; document.head.appendChild(link);
        };
        setupPWA();

        let state = { 
            notes: [], labels: ['TUGAS', 'PRIBADI', 'IDE', 'INTEL'], logs: [], 
            settings: { theme: 'pipboy', sfx: true, vhs: true, blur: true, chroma: true, scan: true, flicker: true, jitter: false, interf: true, ghost: true, boot: true }, 
            currentView: 'dashboard', activeNoteId: null, filterLabel: null 
        };
        
        let pristineEditorState = ""; let editorHistory = []; let historyIndex = -1;

        try {
            const memNotes = localStorage.getItem('os-nxt-notes'); if(memNotes) state.notes = JSON.parse(memNotes);
            const memLabels = localStorage.getItem('os-nxt-labels'); if(memLabels) state.labels = JSON.parse(memLabels);
            const memLogs = localStorage.getItem('os-nxt-logs'); if(memLogs) state.logs = JSON.parse(memLogs);
            const memSettings = localStorage.getItem('os-nxt-settings'); 
            if(memSettings) state.settings = { ...state.settings, ...JSON.parse(memSettings) };
        } catch (e) { localStorage.clear(); }

        let sessionStartTime = Date.now();

        const saveState = () => {
            localStorage.setItem('os-nxt-notes', JSON.stringify(state.notes)); localStorage.setItem('os-nxt-labels', JSON.stringify(state.labels));
            localStorage.setItem('os-nxt-logs', JSON.stringify(state.logs)); localStorage.setItem('os-nxt-settings', JSON.stringify(state.settings));
        };

        const addLog = (action, details) => { state.logs.unshift({ id: Date.now(), action, details, time: new Date().toISOString() }); if(state.logs.length > 150) state.logs.pop(); saveState(); };
        const getStorageSize = () => { let total = 0; for(let x in localStorage) { if(localStorage.hasOwnProperty(x)) total += ((localStorage[x].length + x.length) * 2); } return (total / 1024).toFixed(1); };
        const fmtDate = (iso) => { const d = new Date(iso); return `${d.getFullYear().toString().substr(-2)}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} // ${String(d.getHours()).padStart(2,'0')}${String(d.getMinutes()).padStart(2,'0')}H`; };
        const stripHTML = (html) => { const tmp = document.createElement("DIV"); tmp.innerHTML = html; return tmp.textContent || tmp.innerText || ""; };
        
        let toastTimeout;
        const showToast = (msg) => { const t = document.getElementById('toast'); t.innerText = `[ ${msg} ]`; t.style.opacity = 1; sfx.commit(); clearTimeout(toastTimeout); toastTimeout = setTimeout(() => t.style.opacity = 0, 2500); };

        // --- AUDIO ENGINE ---
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx, humOsc, humGain, noiseSource, noiseFilter, noiseGain, geigerInterval;
        
        const initAudio = () => { 
            if (!audioCtx && AudioContext) audioCtx = new AudioContext(); 
            if(audioCtx && audioCtx.state === 'suspended') audioCtx.resume(); 
            manageHumFX(); manageGeiger();
        };

        const manageGeiger = () => {
            clearInterval(geigerInterval);
            if(state.settings.sfx && state.settings.vhs) {
                geigerInterval = setInterval(() => {
                    if(Math.random() > 0.6) {
                        if(!audioCtx) return; const t = audioCtx.currentTime; const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
                        osc.type = 'square'; osc.frequency.setValueAtTime(50 + Math.random()*800, t);
                        gain.gain.setValueAtTime((0.01 + Math.random()*0.03), t); gain.gain.exponentialRampToValueAtTime(0.001, t + 0.02);
                        osc.connect(gain); gain.connect(audioCtx.destination); osc.start(t); osc.stop(t + 0.02);
                    }
                }, 150);
            }
        };

        const manageHumFX = () => {
            if(!audioCtx) return;
            if(state.settings.vhs && !noiseSource) {
                const bufferSize = audioCtx.sampleRate * 2; const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate); const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
                noiseSource = audioCtx.createBufferSource(); noiseSource.buffer = buffer; noiseSource.loop = true;
                noiseFilter = audioCtx.createBiquadFilter(); noiseFilter.type = 'lowpass'; noiseFilter.frequency.value = 1000; 
                noiseGain = audioCtx.createGain(); noiseGain.gain.value = 0.05; 
                noiseSource.connect(noiseFilter); noiseFilter.connect(noiseGain); noiseGain.connect(audioCtx.destination); noiseSource.start();
                humOsc = audioCtx.createOscillator(); humGain = audioCtx.createGain(); humOsc.type = 'sine'; humOsc.frequency.value = 60; humGain.gain.value = 0.06;
                humOsc.connect(humGain); humGain.connect(audioCtx.destination); humOsc.start();
            } else if (!state.settings.vhs && noiseSource) { noiseSource.stop(); noiseSource = null; humOsc.stop(); humOsc = null; }
        };

        const analogHit = (startFreq, endFreq, dur, vol, type='square') => {
            if (!state.settings.sfx || !audioCtx) return; const t = audioCtx.currentTime;
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.type = type; osc.frequency.setValueAtTime(startFreq, t); osc.frequency.exponentialRampToValueAtTime(endFreq, t + dur);
            gain.gain.setValueAtTime(vol, t); gain.gain.exponentialRampToValueAtTime(0.001, t + dur);
            osc.connect(gain); gain.connect(audioCtx.destination); osc.start(t); osc.stop(t + dur);
        };
        const humVoltageDrop = () => { if(humOsc && humOsc.frequency && state.settings.vhs) { const t = audioCtx.currentTime; humOsc.frequency.setValueAtTime(60, t); humOsc.frequency.exponentialRampToValueAtTime(30, t + 0.15); humOsc.frequency.exponentialRampToValueAtTime(60, t + 0.6); } };

        const sfx = {
            type: () => { analogHit(200, 50, 0.05, 0.2, 'sawtooth'); analogHit(1000, 400, 0.02, 0.05, 'square'); },
            nav: () => { analogHit(400, 50, 0.15, 0.2, 'square'); humVoltageDrop(); },
            enter: () => { analogHit(600, 100, 0.1, 0.2, 'triangle'); },
            error: () => { analogHit(150, 30, 0.4, 0.3, 'sawtooth'); analogHit(100, 20, 0.5, 0.3, 'sawtooth'); humVoltageDrop(); },
            commit: () => { analogHit(1000, 1500, 0.1, 0.15, 'square'); setTimeout(() => analogHit(1500, 2000, 0.2, 0.15, 'square'), 100); humVoltageDrop(); },
            floppy: () => { analogHit(200, 250, 0.03, 0.1, 'sawtooth'); setTimeout(() => analogHit(250, 150, 0.04, 0.1, 'square'), 30); },
            boot: () => { analogHit(50, 600, 0.8, 0.2, 'sawtooth'); setTimeout(()=>analogHit(600, 1200, 0.4, 0.2), 800); }
        };

        // --- ANIMATIONS & FX ---
        let activeFrames = []; let activeTimeouts = []; let streamInterval; let decryptTimeouts = [];
        const clearAnimations = () => { 
            activeFrames.forEach(id => cancelAnimationFrame(id)); activeFrames = []; 
            activeTimeouts.forEach(id => clearTimeout(id)); activeTimeouts = [];
            decryptTimeouts.forEach(id => clearTimeout(id)); decryptTimeouts = [];
            clearInterval(streamInterval);
            document.getElementById('format-toolbar').style.display = 'none'; 
            const cur = document.getElementById('block-cursor'); if(cur) cur.style.display = 'none';
        };
        const triggerFlash = () => { const vp = document.getElementById('viewport'); vp.classList.remove('crt-flash'); void vp.offsetWidth; vp.classList.add('crt-flash'); if(Math.random() > 0.7) triggerMeltdown(); };
        const triggerMeltdown = () => { const vp = document.getElementById('viewport'); vp.classList.remove('meltdown-fx'); void vp.offsetWidth; vp.classList.add('meltdown-fx'); sfx.error(); };

        const executeDecryption = (elementId, originalHTML, duration = 600) => {
            const el = document.getElementById(elementId); if(!el) return;
            const originalText = stripHTML(originalHTML);
            if(originalText.length === 0) { el.innerHTML = originalHTML; return; }
            
            const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*()_+";
            let start = Date.now();
            el.classList.add('decrypting-text');
            
            const decryptLoop = () => {
                let now = Date.now();
                if(now - start > duration || state.currentView !== 'editor') {
                    el.classList.remove('decrypting-text');
                    el.innerHTML = originalHTML; return;
                }
                let scrambled = "";
                for(let i=0; i < Math.min(originalText.length, 50); i++) { // limit loop for perf
                    scrambled += chars.charAt(Math.floor(Math.random() * chars.length));
                }
                if(originalText.length > 50) scrambled += "...";
                el.innerText = scrambled;
                if(state.settings.sfx && Math.random() > 0.5) analogHit(800, 900, 0.02, 0.02, 'square');
                decryptTimeouts.push(setTimeout(decryptLoop, 30));
            };
            decryptLoop();
        };

        const forceNavigate = (view, silent = false) => {
            if (!silent) sfx.nav(); 
            state.currentView = view; clearAnimations(); triggerFlash();
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            const activeBtn = Array.from(document.querySelectorAll('.nav-btn')).find(b => b.innerText.includes(view === 'notes' || view === 'editor' ? 'DAT' : (view === 'log' ? 'LOG' : (view === 'settings' ? 'CFG' : 'SYS'))));
            if(activeBtn) activeBtn.classList.add('active');

            const fab = document.getElementById('main-fab');
            if(fab) fab.style.display = (view === 'notes') ? 'flex' : 'none';

            if(view === 'dashboard') renderDashboard(); else if(view === 'notes') renderNotes(); else if(view === 'editor') renderEditor(); else if(view === 'log') renderLog(); else if(view === 'settings') renderSettings();
            if(!silent) history.pushState({ view: view }, "", `#${view}`);
        };

        const navigate = (view, silent = false) => {
            if (state.currentView === 'editor' && view !== 'editor') {
                const note = state.notes.find(n => n.id === state.activeNoteId);
                const currentState = JSON.stringify({ t: document.getElementById('edit-title').value, c: document.getElementById('edit-content').innerHTML });
                if (currentState !== pristineEditorState || (note._isNew && (note.title !== '' || document.getElementById('edit-content').innerHTML !== ''))) {
                    sfx.error(); showToast("UNSAVED DATA"); triggerMeltdown();
                    openCommit('SAVE CHANGES', 'Unsaved data detected. Force commit?', () => {
                        captureDraft(); const n = state.notes.find(n => n.id === state.activeNoteId);
                        n.timestamp = new Date().toISOString(); delete n._isNew; 
                        saveState(); showToast('DATA SAVED'); addLog('DATA', `Auto-commit ID:${n.id}`); forceNavigate(view);
                    }); return; 
                } else { if(note && note._isNew) state.notes = state.notes.filter(n => n.id !== state.activeNoteId); }
            } forceNavigate(view, silent);
        };

        window.addEventListener('popstate', (e) => {
            if (state.currentView === 'editor') { 
                history.pushState({ view: 'editor' }, "", "#editor"); 
                const note = state.notes.find(n => n.id === state.activeNoteId);
                const currentState = JSON.stringify({ t: document.getElementById('edit-title').value, c: document.getElementById('edit-content').innerHTML });
                if (currentState !== pristineEditorState || (note._isNew && (note.title !== '' || document.getElementById('edit-content').innerHTML !== ''))) {
                    sfx.error(); triggerMeltdown();
                    openCommit('SAVE CHANGES', 'Unsaved data detected. Force commit?', () => {
                        captureDraft(); const n = state.notes.find(n => n.id === state.activeNoteId);
                        n.timestamp = new Date().toISOString(); delete n._isNew; 
                        saveState(); showToast('DATA SAVED'); forceNavigate('notes', true);
                    });
                } else { if(note && note._isNew) state.notes = state.notes.filter(n => n.id !== state.activeNoteId); forceNavigate('notes', true); }
            } else { if(e.state && e.state.view) forceNavigate(e.state.view, true); else forceNavigate('dashboard', true); }
        });

        // --- 1. DASHBOARD ---
        const renderDashboard = () => {
            const storageKB = getStorageSize(); const memPerc = Math.min((storageKB / 5120) * 100, 100); 
            const recentNotes = [...state.notes].sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp)).slice(0, 2);
            const vp = document.getElementById('viewport');

            vp.innerHTML = `
                <h1>SYS.DIAGNOSTICS</h1>
                <div class="data-stream" id="top-stream">INIT_STREAM...</div>
                
                <div class="grid-2">
                    <div class="stat-block"><div class="stat-val">${state.notes.length}</div><div class="stat-lbl">DATA BLOCKS</div></div>
                    <div class="stat-block"><div class="stat-val" id="uptime-val">00:00</div><div class="stat-lbl">UPTIME</div></div>
                    <div class="stat-block" style="grid-column: span 2;">
                        <div class="flex-between" style="margin:0;"><span class="stat-lbl">MEM_ALLOCATION</span><span class="stat-val" style="font-size:1rem;">${storageKB}KB</span></div>
                        <div class="prog-bar"><div class="prog-fill" style="width: ${memPerc}%;"></div></div>
                    </div>
                </div>

                <div class="chart-box" style="height: 220px;"><span class="chart-label">SECTOR_SCAN</span><canvas id="radar-chart"></canvas></div>
                
                <div class="grid-2">
                    <div class="chart-box" style="height: 150px; margin-top:10px;"><span class="chart-label">DIST</span><canvas id="pie-chart"></canvas></div>
                    <div><button style="width:100%; height:100%; font-size:1.5rem; background:var(--chart-fill);" onclick="addNote()">+ NEW<br><span style="font-size:0.8rem; font-weight:normal;">SECURE_BLOCK</span></button></div>
                </div>

                <h3 style="margin-top: 30px;">RECENT ACTIVITY</h3>
                ${recentNotes.length === 0 ? '<div class="timeline-item">NO RECENT I/O.</div>' : recentNotes.map(n => `<div class="note-card" onclick="openNote(${n.id})"><strong style="font-size:1.2rem;">${n.title || 'UNTITLED_BLOCK'}</strong><div class="data-stream" style="margin:5px 0 0 0; opacity:0.5;">ID:${n.id}</div><div class="note-date">${fmtDate(n.timestamp)}</div></div>`).join('')}
            `;
            
            const streamEl = document.getElementById('top-stream');
            const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*";
            streamInterval = setInterval(() => {
                let str = ""; for(let i=0; i<30; i++) str += chars.charAt(Math.floor(Math.random() * chars.length));
                if(streamEl) streamEl.innerText = `0x${Math.floor(Math.random()*16777215).toString(16).toUpperCase()} // ${str}`;
            }, 100);

            activeTimeouts.push(setTimeout(() => { if(state.currentView !== 'dashboard') return; drawPieChart(); drawRadarScanner(storageKB); }, 100));
            updateUptime(); if(!state.logs.length || state.logs[0].action !== 'SYSTEM') addLog('SYSTEM', 'SYS Diagnostics Array Active');
        };

        const updateUptime = () => {
            if(state.currentView !== 'dashboard') return;
            const el = document.getElementById('uptime-val'); if(!el) return;
            const diff = Math.floor((Date.now() - sessionStartTime) / 1000); 
            const h = String(Math.floor(diff / 3600)).padStart(2, '0');
            const m = String(Math.floor((diff % 3600) / 60)).padStart(2, '0');
            const s = String(diff % 60).padStart(2, '0');
            el.innerText = `${h}:${m}:${s}`;
            activeTimeouts.push(setTimeout(updateUptime, 1000)); 
        };

        const drawPieChart = () => {
            const canvas = document.getElementById('pie-chart'); if(!canvas) return;
            canvas.width = canvas.parentElement.clientWidth - 20; canvas.height = canvas.parentElement.clientHeight - 20;
            const ctx = canvas.getContext('2d'); const color = getComputedStyle(document.body).getPropertyValue('--text-color').trim();
            const dist = { 'UNLABELED': 0 }; state.labels.forEach(l => dist[l] = 0);
            state.notes.forEach(n => { if(n.labels.length === 0) dist['UNLABELED']++; else n.labels.forEach(l => { if(dist[l] !== undefined) dist[l]++; }); });
            const validDist = Object.entries(dist).filter(([k,v]) => v > 0); const total = validDist.reduce((a, [k,v]) => a + v, 0);

            if(total === 0) { ctx.fillStyle = color; ctx.font = "bold 12px monospace"; ctx.textAlign="center"; ctx.fillText("NO DATA", canvas.width/2, canvas.height/2); return; }

            let startAngle = -Math.PI/2; const cx = canvas.width / 2; const cy = canvas.height / 2; const radius = Math.min(cx, cy) - 5;
            validDist.forEach(([label, count], index) => {
                const sliceAngle = (count / total) * 2 * Math.PI;
                ctx.beginPath(); ctx.moveTo(cx, cy); ctx.arc(cx, cy, radius, startAngle, startAngle + sliceAngle); ctx.closePath();
                ctx.fillStyle = color; ctx.globalAlpha = Math.max(1 - (index * 0.25), 0.2); ctx.fill();
                ctx.globalAlpha = 1.0; ctx.strokeStyle = getComputedStyle(document.body).getPropertyValue('--bg-bezel').trim(); ctx.lineWidth = 3; ctx.stroke(); startAngle += sliceAngle;
            });
        };

        let radarAnomalies = [];
        const drawRadarScanner = (storage) => {
            const canvas = document.getElementById('radar-chart'); if(!canvas) return;
            canvas.width = canvas.parentElement.clientWidth - 20; canvas.height = canvas.parentElement.clientHeight - 20;
            const ctx = canvas.getContext('2d'); const cx = canvas.width / 2; const cy = canvas.height / 2; const radius = Math.min(cx, cy) - 10; let angle = 0;
            const color = getComputedStyle(document.body).getPropertyValue('--text-color').trim(); 
            const bgColor = getComputedStyle(document.body).getPropertyValue('--bg-bezel').trim();
            
            let lastTime = 0;
            const animate = (time) => {
                if(state.currentView !== 'dashboard') return;
                activeFrames.push(requestAnimationFrame(animate));
                if(time - lastTime < 40) return; lastTime = time;

                ctx.fillStyle = `rgba(0, 0, 0, 0.15)`; ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                ctx.strokeStyle = color; ctx.globalAlpha = 0.2; ctx.lineWidth = 1;
                ctx.beginPath(); ctx.arc(cx, cy, radius, 0, Math.PI*2); ctx.stroke(); 
                ctx.beginPath(); ctx.arc(cx, cy, radius*0.66, 0, Math.PI*2); ctx.stroke();
                ctx.beginPath(); ctx.arc(cx, cy, radius*0.33, 0, Math.PI*2); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(cx, cy-radius); ctx.lineTo(cx, cy+radius); ctx.stroke(); 
                ctx.beginPath(); ctx.moveTo(cx-radius, cy); ctx.lineTo(cx+radius, cy); ctx.stroke();
                
                ctx.save(); ctx.translate(cx, cy); ctx.rotate(angle);
                const sweepGrad = ctx.createLinearGradient(0,0,0,radius);
                sweepGrad.addColorStop(0, color); sweepGrad.addColorStop(1, "transparent");
                ctx.beginPath(); ctx.moveTo(0, 0); ctx.arc(0, 0, radius, -0.2, 0.1); ctx.lineTo(0,0);
                ctx.globalAlpha = 0.5; ctx.fillStyle = sweepGrad; ctx.fill(); 
                ctx.globalAlpha = 1; ctx.strokeStyle = color; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(radius, 0); ctx.stroke(); 
                ctx.restore();

                if(Math.random() < 0.08) {
                    radarAnomalies.push({ a: Math.random() * Math.PI * 2, r: Math.random() * radius * 0.9, life: 1, type: Math.random()>0.8?'hostile':'neutral' });
                    if(state.settings.sfx) analogHit(2000, 1800, 0.05, 0.05, 'sine'); 
                }
                
                radarAnomalies.forEach((an, i) => {
                    if(an.life <= 0) { radarAnomalies.splice(i, 1); return; }
                    const ax = cx + Math.cos(an.a) * an.r; const ay = cy + Math.sin(an.a) * an.r;
                    ctx.fillStyle = an.type === 'hostile' ? '#ff0000' : color; ctx.globalAlpha = an.life; ctx.fillRect(ax-2, ay-2, 4, 4);
                    if(an.life > 0.8) { ctx.strokeStyle = ctx.fillStyle; ctx.strokeRect(ax-6, ay-6, 12, 12); }
                    an.life -= 0.02;
                });

                ctx.globalAlpha = 1; ctx.fillStyle = bgColor; ctx.fillRect(cx - 40, cy - 12, 80, 24); ctx.strokeStyle = color; ctx.strokeRect(cx - 40, cy - 12, 80, 24);
                ctx.fillStyle = color; ctx.font = "bold 14px monospace"; ctx.textAlign="center";
                ctx.fillText(`SECURE`, cx, cy + 5);
                angle += 0.08; 
            }; 
            activeFrames.push(requestAnimationFrame(animate));
        };

        // --- 2. NOTES LIST ---
        const renderNotes = () => {
            const vp = document.getElementById('viewport'); const term = document.getElementById('search-box')?.value.toLowerCase() || '';
            vp.innerHTML = `
                <h1>SECURE.DATA</h1>
                <input type="text" id="search-box" placeholder="> QUERY_DB..." value="${term}" style="width:100%; margin-bottom:15px; border-style:dashed;" oninput="executeQuickSearch();">
                <div class="swipe-labels">
                    <span onclick="setFilter(null)" style="${!state.filterLabel ? 'border:2px solid var(--text-color); background:var(--text-color); color:var(--bg-color);' : ''}">[ALL_SECTORS]</span>
                    ${state.labels.map(l => `<span onclick="setFilter('${l}')" class="${state.filterLabel === l ? 'active-tag' : ''}">[${l}]</span>`).join('')}
                </div>
                <div id="notes-list-container" style="margin-top: 10px;"></div>
            `;
            buildNotesDOM();
        };

        const buildNotesDOM = () => {
            const container = document.getElementById('notes-list-container'); if(!container) return;
            let filteredNotes = state.notes; if(state.filterLabel) filteredNotes = filteredNotes.filter(n => n.labels.includes(state.filterLabel));
            const sortedNotes = [...filteredNotes.filter(n => n.pinned), ...filteredNotes.filter(n => !n.pinned)];
            container.innerHTML = sortedNotes.length === 0 ? '<div class="data-stream">> 404: NO DATA FOUND IN SECTOR.</div>' : sortedNotes.map(n => `
                <div class="note-card note-item-dom" data-title="${(n.title||'').toLowerCase()}" data-content="${stripHTML(n.content).toLowerCase()}" onclick="openNote(${n.id})">
                    ${n.pinned ? '<div class="pin-badge">!!!</div>' : ''}
                    <div style="margin-bottom:5px;"><strong style="font-size:1.3rem">${n.title || 'UNTITLED_BLOCK'}</strong></div>
                    <div class="data-stream" style="margin-bottom:10px;">UID:${n.id} // LEN:${stripHTML(n.content).length}B</div>
                    <div style="margin-bottom:8px;">${n.labels.map(l => `<span class="label-badge">${l}</span>`).join('')}</div>
                    <div class="note-date">${fmtDate(n.timestamp)}</div>
                </div>
            `).join('');
            executeQuickSearch();
        };
        const setFilter = (lbl) => { sfx.enter(); state.filterLabel = lbl; renderNotes(); };
        const executeQuickSearch = () => { 
            sfx.type(); const term = document.getElementById('search-box').value.toLowerCase(); 
            if(term === 'meltdown') { triggerMeltdown(); document.getElementById('search-box').value = '';}
            document.querySelectorAll('.note-item-dom').forEach(card => { card.style.display = (card.getAttribute('data-title').includes(term) || card.getAttribute('data-content').includes(term)) ? 'block' : 'none'; }); 
        };

        // --- 3. EDITOR ---
        const addNote = () => { const id = Date.now(); state.notes.unshift({ id, title: '', content: '', labels: [], pinned: false, timestamp: new Date().toISOString(), _isNew: true }); state.activeNoteId = id; forceNavigate('editor'); };
        const openNote = (id) => { state.activeNoteId = id; forceNavigate('editor'); };

        let saveDraftTimeout;
        const pushHistory = (val) => { if(editorHistory[historyIndex] === val) return; editorHistory = editorHistory.slice(0, historyIndex + 1); editorHistory.push(val); historyIndex++; };

        const renderEditor = () => {
            const vp = document.getElementById('viewport'); const note = state.notes.find(n => n.id === state.activeNoteId); if(!note) return forceNavigate('notes');
            pristineEditorState = JSON.stringify({ t: note.title, c: note.content });
            editorHistory = [note.content]; historyIndex = 0; 
            const rawText = stripHTML(note.content); const words = rawText.trim().split(/\s+/).filter(w=>w.length>0).length;

            vp.innerHTML = `
                <div class="flex-between">
                    <button onclick="requestDiscard()" style="border:none; color:var(--text-muted); background:transparent;">&lt; ABORT</button>
                    <div>
                        <button onclick="togglePinDraft()" style="margin-right:10px; padding:8px 12px; ${note.pinned ? 'background:var(--text-color); color:var(--bg-color);' : 'border-style:dashed;'}">PIN</button>
                        <button style="background:var(--text-color); color:var(--bg-color); padding:8px 15px;" onclick="requestSave()">COMMIT &gt;</button>
                    </div>
                </div>
                
                <input type="text" id="edit-title" value="" placeholder="> ENTER_TITLE" style="width:100%; margin-top:10px; margin-bottom:15px; font-size:1.5rem; font-weight:bold; border-width: 0 0 2px 0; background:transparent;" oninput="sfx.type()">
                
                <div class="swipe-labels" style="padding-bottom: 5px;">
                    ${state.labels.map(l => `<span onclick="toggleLabelDraft('${l}')" class="${note.labels.includes(l) ? 'active-tag' : ''}">[${l}]</span>`).join('')}
                </div>

                <div class="editor-container">
                    <div id="block-cursor"></div>
                    <div id="edit-content" contenteditable="true" spellcheck="false" oninput="handleInput(event)"></div>
                </div>
                
                <div class="flex-between" style="margin-top:15px;">
                    <div style="display:flex; gap:10px;">
                        <button onclick="execUndo()" style="padding: 10px; border-style:dashed;">&lt;&lt;</button>
                        <button onclick="execRedo()" style="padding: 10px; border-style:dashed;">&gt;&gt;</button>
                    </div>
                    <button style="color:red; border-color:red; font-size:1rem; padding: 10px 20px;" onclick="requestDelete(${note.id})">PURGE</button>
                </div>
                <div class="data-stream" style="text-align:right; margin-top:10px;"><span id="editor-stats">W:${words} // B:${rawText.length}</span></div>
            `;
            
            // Decryption Engine call on load
            const realTitle = note.title;
            const realContent = note.content;
            if(!note._isNew) {
                document.getElementById('edit-title').value = "DECRYPTING...";
                executeDecryption('edit-content', realContent, 700);
                setTimeout(() => { 
                    if(state.currentView === 'editor') document.getElementById('edit-title').value = realTitle; 
                }, 700);
            } else {
                document.getElementById('edit-title').value = realTitle;
                document.getElementById('edit-content').innerHTML = realContent;
            }
            
            const ta = document.getElementById('edit-content');
            ta.addEventListener('keyup', handleSmartList);
            document.addEventListener('selectionchange', handleSelectionPos);
            window.addEventListener('resize', handleSelectionPos); // Listener buat keyboard HP
            ta.addEventListener('scroll', handleSelectionPos); 
            ta.addEventListener('keyup', handleSelectionPos);
            ta.addEventListener('click', handleSelectionPos);
            ta.addEventListener('blur', () => { document.getElementById('block-cursor').style.display = 'none'; });
            ta.addEventListener('contextmenu', (e) => { e.preventDefault(); return false; });
        };

        const handleInput = (e) => { 
            sfx.type(); const ta = e.target;
            const html = ta.innerHTML; const raw = stripHTML(html); const words = raw.trim().split(/\s+/).filter(w=>w.length>0).length;
            document.getElementById('editor-stats').innerText = `W:${words} // B:${raw.length}`;
            clearTimeout(saveDraftTimeout); saveDraftTimeout = setTimeout(() => pushHistory(html), 600); 
            handleSelectionPos();
        };

        const handleSmartList = (e) => {
            if(e.code === 'Space') {
                const sel = window.getSelection(); if(!sel.rangeCount) return; const node = sel.anchorNode;
                if(node.nodeType === 3 && (node.textContent.trim() === '1.' || node.textContent.trim() === '-')) {
                    node.textContent = ''; document.execCommand(node.textContent.includes('-') ? 'insertUnorderedList' : 'insertOrderedList'); sfx.enter();
                }
            }
        };

        // CORE LOGIC: BULLETPROOF TOOLBAR (No cut-off)
        const handleSelectionPos = () => {
            if(state.currentView !== 'editor') return;
            const ta = document.getElementById('edit-content'); 
            const toolbar = document.getElementById('format-toolbar'); 
            const cursor = document.getElementById('block-cursor');
            if(!ta || !toolbar || !cursor) return;

            const sel = window.getSelection();
            
            // Check Block Cursor (Collapsed selection)
            if(document.activeElement === ta && sel.rangeCount > 0 && sel.isCollapsed) {
                toolbar.style.display = 'none'; cursor.style.display = 'block'; 
                const range = sel.getRangeAt(0); const rects = range.getClientRects();
                const rect = rects.length > 0 ? rects[rects.length - 1] : range.getBoundingClientRect();
                const containerRect = ta.getBoundingClientRect();
                if(ta.innerHTML === '' || ta.innerHTML === '<br>') { cursor.style.top = `15px`; cursor.style.left = `15px`; cursor.style.height = `1.4rem`; } 
                else if (rect && rect.height > 0) {
                    cursor.style.top = `${rect.top - containerRect.top}px`; cursor.style.left = `${rect.left - containerRect.left}px`; cursor.style.height = `${rect.height}px`;
                }
            } 
            // Check Smart Toolbar (Active selection)
            else if (document.activeElement === ta && sel.rangeCount > 0 && !sel.isCollapsed) { 
                const range = sel.getRangeAt(0);
                const rect = range.getBoundingClientRect(); // get absolute bounds to viewport
                
                if (rect.width === 0 && rect.height === 0) return; // Prevent empty bounds error

                cursor.style.display = 'none'; 
                toolbar.style.opacity = '0'; 
                toolbar.style.display = 'flex'; // Display first to calculate offsetWidth/Height
                
                activeTimeouts.push(setTimeout(() => {
                    // 1. Get accurate dimensions
                    const tbWidth = toolbar.offsetWidth; 
                    const tbHeight = toolbar.offsetHeight;
                    
                    // Gunakan VisualViewport API kalau ada (untuk handle keyboard HP), fallback ke innerHeight/Width
                    const vpW = window.visualViewport ? window.visualViewport.width : window.innerWidth;
                    const vpH = window.visualViewport ? window.visualViewport.height : window.innerHeight;
                    const vpTop = window.visualViewport ? window.visualViewport.offsetTop : 0;
                    
                    // 2. Kalkulasi sumbu X (Kiri-Kanan)
                    let targetX = rect.left + (rect.width / 2); 
                    let leftPos = targetX - (tbWidth / 2);
                    
                    // Clamp sumbu X supaya gak out of bounds (margin aman 10px dari sisi layar)
                    const marginX = 10;
                    if (leftPos < marginX) leftPos = marginX;
                    if (leftPos + tbWidth > vpW - marginX) leftPos = vpW - tbWidth - marginX;
                    
                    // Panah selalu menunjuk tepat ke targetX teks, dibatasi batas lebar toolbar
                    let arrowPos = targetX - leftPos;
                    if (arrowPos < 20) arrowPos = 20; 
                    if (arrowPos > tbWidth - 20) arrowPos = tbWidth - 20;
                    
                    // 3. Kalkulasi sumbu Y (Atas-Bawah)
                    let topPos = rect.top - tbHeight - 15; // Coba di atas teks dulu
                    let isFlipped = false;

                    // Kalau nabrak atap (safe zone 60px) ATAU posisi teks sangat di atas
                    if (topPos < vpTop + 60) { 
                        topPos = rect.bottom + 15; // Taruh di bawah teks
                        isFlipped = true;
                    }
                    
                    // (Opsional ekstra) Kalau setelah ditaruh bawah ternyata nabrak lantai bawah keyboard
                    if (isFlipped && topPos + tbHeight > vpH + vpTop - 10) {
                        topPos = vpTop + vpH - tbHeight - 10; // Tempel paksa di lantai keyboard
                    }

                    // Eksekusi DOM
                    if(isFlipped) toolbar.classList.add('flip-down'); 
                    else toolbar.classList.remove('flip-down'); 
                    
                    toolbar.style.top = `${topPos}px`; 
                    toolbar.style.left = `${leftPos}px`; 
                    toolbar.style.setProperty('--arrow-pos', `${arrowPos}px`); 
                    toolbar.style.opacity = '1';
                }, 0));
            } else { 
                toolbar.style.display = 'none'; cursor.style.display = 'none'; 
            }
        };

        const execFormat = (command, val = null) => { document.execCommand(command, false, val); sfx.commit(); showToast('FORMAT APPLIED'); pushHistory(document.getElementById('edit-content').innerHTML); handleSelectionPos(); };
        const execSelectAll = () => { document.execCommand('selectAll', false, null); sfx.type(); handleSelectionPos(); };
        const execCopy = () => { document.execCommand('copy'); showToast('COPIED TO CLIPBOARD'); sfx.commit(); document.getSelection().removeAllRanges(); handleSelectionPos(); };
        const execUndo = () => { if(historyIndex > 0) { historyIndex--; document.getElementById('edit-content').innerHTML = editorHistory[historyIndex]; sfx.type(); handleSelectionPos(); } else { sfx.error(); showToast('HISTORY LIMIT'); } };
        const execRedo = () => { if(historyIndex < editorHistory.length - 1) { historyIndex++; document.getElementById('edit-content').innerHTML = editorHistory[historyIndex]; sfx.type(); handleSelectionPos(); } else { sfx.error(); showToast('NEWEST STATE'); } };

        const captureDraft = () => { const note = state.notes.find(n => n.id === state.activeNoteId); if(note) { note.title = document.getElementById('edit-title').value === "DECRYPTING..." ? note.title : document.getElementById('edit-title').value; note.content = document.getElementById('edit-content').innerHTML; } };
        const toggleLabelDraft = (lbl) => { sfx.enter(); captureDraft(); const note = state.notes.find(n => n.id === state.activeNoteId); if(note.labels.includes(lbl)) note.labels = note.labels.filter(l => l !== lbl); else note.labels.push(lbl); renderEditor(); };
        const togglePinDraft = () => { sfx.enter(); captureDraft(); const note = state.notes.find(n => n.id === state.activeNoteId); note.pinned = !note.pinned; renderEditor(); };

        const requestDiscard = () => {
            const note = state.notes.find(n => n.id === state.activeNoteId);
            const currentState = JSON.stringify({ t: document.getElementById('edit-title').value, c: document.getElementById('edit-content').innerHTML });
            if (currentState === pristineEditorState && !(note._isNew && (note.title !== '' || document.getElementById('edit-content').innerHTML !== ''))) {
                sfx.enter(); if(note && note._isNew) state.notes = state.notes.filter(n => n.id !== state.activeNoteId); forceNavigate('notes');
            } else {
                triggerMeltdown();
                openCommit('DISCARD CHANGES', 'Data modified. Purge changes?', () => {
                    if(note && note._isNew) { state.notes = state.notes.filter(n => n.id !== state.activeNoteId); } else { const savedNotes = localStorage.getItem('os-nxt-notes'); state.notes = savedNotes ? JSON.parse(savedNotes) : []; }
                    showToast('CHANGES PURGED'); forceNavigate('notes');
                });
            }
        };

        const requestSave = () => { openCommit('SAVE TO MEMORY', 'Commit block to secure DB?', () => { captureDraft(); const note = state.notes.find(n => n.id === state.activeNoteId); note.timestamp = new Date().toISOString(); delete note._isNew; saveState(); showToast('DATA COMMITTED'); addLog('DATA', `Wrote block ID:${note.id}`); forceNavigate('notes'); }); };
        const requestDelete = (id) => { triggerMeltdown(); openCommit('PURGE DATA', `Erase ID:${id} permanently?`, () => { state.notes = state.notes.filter(n => n.id !== id); saveState(); showToast('BLOCK PURGED'); addLog('DATA', `Purged block ID:${id}`); forceNavigate('notes'); }); };

        // --- 4. LOG ---
        const renderLog = () => {
            document.getElementById('viewport').innerHTML = `
                <h1>TRACE.LOG</h1>
                <div class="data-stream" style="margin-bottom:25px;">> TAIL -F /VAR/LOG/SYS.LOG</div>
                <div>
                    ${state.logs.length === 0 ? '<div class="timeline-item">NO LOGS.</div>' : state.logs.map(l => `<div class="timeline-item"><span class="data-stream">${fmtDate(l.time)}</span><br><strong style="color:var(--accent);">[${l.action}]</strong> ${l.details}</div>`).join('')}
                </div>
                <button style="border-color:red; color:red; width:100%; margin-top:20px; border-style:dashed;" onclick="requestClearLogs()">FLUSH LOGS</button>
            `;
        };
        const requestClearLogs = () => { triggerMeltdown(); openCommit('FLUSH SYS LOGS', 'Erase all trace data?', () => { state.logs = []; saveState(); showToast('LOGS FLUSHED'); renderLog(); }); };

        // --- 5. SETTINGS (CFG) ---
        const renderSettings = () => {
            document.getElementById('viewport').innerHTML = `
                <h1>SYS.CONFIG</h1>
                <div class="data-stream">> ROOT_ACCESS: GRANTED</div>
                
                <h3>ENVIRONMENT</h3>
                <div class="grid-2">
                    <button onclick="toggleSetting('theme')" style="border-style:dashed;">THEME:<br><span style="color:var(--bg-color); background:var(--text-color); padding:0 5px;">${state.settings.theme === 'pipboy' ? 'PIPBOY' : 'TERMINAL'}</span></button>
                    <button onclick="toggleSetting('boot')" style="border-style:dashed;">COLD BOOT: <br>${state.settings.boot ? 'ON' : 'OFF'}</button>
                    <button onclick="toggleSetting('sfx')" style="border-style:dashed;">UI SFX: <br>${state.settings.sfx ? 'ON' : 'OFF'}</button>
                    <button onclick="toggleSetting('vhs')" style="border-style:dashed;">AUDIO HUM: <br>${state.settings.vhs ? 'ON' : 'OFF'}</button>
                </div>

                <h3>HARDWARE FX</h3>
                <div class="grid-2">
                    <button onclick="toggleSetting('blur')" style="border-style:dashed;">LENS BLUR: ${state.settings.blur ? 'ON' : 'OFF'}</button>
                    <button onclick="toggleSetting('chroma')" style="border-style:dashed;">CHROMATIC: ${state.settings.chroma ? 'ON' : 'OFF'}</button>
                    <button onclick="toggleSetting('scan')" style="border-style:dashed;">SCANLINES: ${state.settings.scan ? 'ON' : 'OFF'}</button>
                    <button onclick="toggleSetting('flicker')" style="border-style:dashed;">FLICKER: ${state.settings.flicker ? 'ON' : 'OFF'}</button>
                    <button onclick="toggleSetting('interf')" style="border-style:dashed;">INTERFERE: ${state.settings.interf ? 'ON' : 'OFF'}</button>
                    <button onclick="toggleSetting('ghost')" style="border-style:dashed;">GHOSTING: ${state.settings.ghost ? 'ON' : 'OFF'}</button>
                    <button onclick="toggleSetting('jitter')" style="border-style:dashed; grid-column:span 2; border-color:var(--accent);">GLITCH SYNC: ${state.settings.jitter ? 'ON' : 'OFF'}</button>
                </div>

                <h3>SECTOR LABELS</h3>
                <div style="border: 2px dashed var(--text-color); padding: 15px; margin-bottom: 20px; background: rgba(0,0,0,0.5);">
                    <div style="margin-bottom: 15px;">
                        ${state.labels.length === 0 ? '<div class="data-stream">NO LABELS.</div>' : ''}
                        ${state.labels.map(l => `<div class="flex-between" style="border-bottom: 1px dotted var(--text-muted); padding: 10px 0;"><span style="font-weight:bold; font-size:1.1rem;">[${l}]</span><button style="padding: 5px 15px; font-size: 0.9rem; border-color: red; color: red;" onclick="requestDeleteLabel('${l}')">DEL</button></div>`).join('')}
                    </div>
                    <div class="flex-row" style="margin:0;"><input type="text" id="new-label-input" placeholder="> NEW_LABEL" style="flex: 1;" onkeyup="sfx.type()"><button onclick="addNewLabel()">ADD</button></div>
                </div>
                
                <h3>DATA I/O</h3>
                <div class="grid-2"><button onclick="exportData()">EXPORT_DB</button><button onclick="document.getElementById('import-file').click()">IMPORT_DB</button><input type="file" id="import-file" style="display:none" accept=".json" onchange="handleImport(event)"></div>
            `;
        };

        const toggleSetting = (key) => {
            sfx.enter(); triggerFlash();
            if(key === 'theme') { state.settings.theme = state.settings.theme === 'pipboy' ? 'linux' : 'pipboy'; applyDOMSettings(); } 
            else { state.settings[key] = !state.settings[key]; applyDOMSettings(); if(key === 'vhs' || key === 'sfx') initAudio(); }
            saveState(); renderSettings(); addLog('CFG', `${key.toUpperCase()} -> ${state.settings[key]}`);
        };

        const applyDOMSettings = () => {
            document.body.setAttribute('data-theme', state.settings.theme); document.body.setAttribute('data-blur', state.settings.blur);
            document.body.setAttribute('data-chroma', state.settings.chroma); document.body.setAttribute('data-scan', state.settings.scan);
            document.body.setAttribute('data-flicker', state.settings.flicker); document.body.setAttribute('data-jitter', state.settings.jitter);
            document.body.setAttribute('data-interf', state.settings.interf); document.body.setAttribute('data-ghost', state.settings.ghost);
            document.getElementById('meta-theme-color').content = state.settings.theme === 'pipboy' ? '#010301' : '#050505'; 
        };

        const addNewLabel = () => { const input = document.getElementById('new-label-input'); const val = input.value.trim().toUpperCase().replace(/\s+/g, '_'); if(val && !state.labels.includes(val)) { sfx.commit(); state.labels.push(val); saveState(); addLog('CFG', `Created label [${val}]`); renderSettings(); } else { sfx.error(); showToast("INVALID LABEL"); } };
        const requestDeleteLabel = (lbl) => { triggerMeltdown(); openCommit('PURGE LABEL', `Remove [${lbl}]?`, () => { state.labels = state.labels.filter(l => l !== lbl); saveState(); showToast('LABEL PURGED'); renderSettings(); }); };

        const exportData = () => { sfx.enter(); const dataUri = 'data:application/json;charset=utf-8,'+ encodeURIComponent(JSON.stringify(state)); const link = document.createElement('a'); link.href = dataUri; link.download = `OS_NXT_DUMP_${Date.now()}.json`; link.click(); showToast('EXPORT SUCCESS'); addLog('DATA', 'Exported memory dump'); };
        const handleImport = (e) => { const file = e.target.files[0]; if(!file) return; const reader = new FileReader(); reader.onload = (event) => { try { const tempImport = JSON.parse(event.target.result); if(tempImport.notes) { triggerMeltdown(); openCommit('OVERWRITE SYS', 'Current data will be destroyed.', () => { state = tempImport; saveState(); applyDOMSettings(); showToast('RESTORE SUCCESS'); addLog('SYS', 'Memory restored from dump'); forceNavigate('dashboard'); }); } } catch(err) { sfx.error(); showToast('IMPORT FAIL'); } }; reader.readAsText(file); e.target.value = ''; };

        // --- STRICT MODAL UX ---
        let commitCallback = null; const modal = document.getElementById('modal-overlay'); const modalInput = document.getElementById('modal-input');
        const openCommit = (title, desc, callback) => {
            sfx.error(); document.getElementById('modal-title').innerText = title; document.getElementById('modal-desc').innerText = desc; modalInput.value = ''; modalInput.placeholder = "> TYPE 'OK'"; commitCallback = callback; modal.style.display = 'flex'; 
            modal.querySelector('.modal-box').classList.remove('crt-flash'); void modal.offsetWidth; modal.querySelector('.modal-box').classList.add('crt-flash'); 
            setTimeout(() => { modalInput.focus(); }, 100);
        };
        const closeModal = () => { sfx.enter(); modal.style.display = 'none'; commitCallback = null; };
        document.getElementById('modal-confirm').addEventListener('click', () => { if(modalInput.value.toLowerCase() === 'ok') { sfx.commit(); modal.style.display = 'none'; if(commitCallback) commitCallback(); } else { sfx.error(); triggerMeltdown(); modalInput.value = ''; modalInput.placeholder = "INVALID. TYPE 'OK'"; } });

        // --- BOOT SEQUENCE ---
        let bootReq; let bootProgress = 0;
        const startPower = (e) => {
            if(e.type === 'touchstart') e.preventDefault(); 
            if(bootProgress >= 100) return; sfx.type(); bootProgress = 0; document.getElementById('ascii-logo').style.display = 'block';
            
            const animateBoot = () => {
                bootProgress += 2; document.getElementById('boot-progress').style.width = bootProgress + '%';
                if(bootProgress % 10 === 0) sfx.type(); 
                if(bootProgress >= 100) { powerOn(); } else { bootReq = requestAnimationFrame(animateBoot); }
            };
            bootReq = requestAnimationFrame(animateBoot);
            document.getElementById('boot-instruct').innerText = "> CHARGING_CAPACITORS...";
        };
        const cancelPower = (e) => {
            if(bootProgress >= 100) return; cancelAnimationFrame(bootReq); bootProgress = 0; document.getElementById('ascii-logo').style.display = 'none';
            document.getElementById('boot-progress').style.width = '0%'; document.getElementById('boot-instruct').innerText = "> INITIALIZE_";
        };

        const powerOn = () => {
            document.getElementById('power-screen').style.display = 'none'; initAudio(); sfx.boot();
            
            if(!state.settings.boot) { 
                const ui = document.getElementById('os-ui'); ui.style.display = 'flex'; ui.classList.add('boot-flash');
                forceNavigate('dashboard'); return; 
            }

            const bootConsole = document.getElementById('boot-console'); bootConsole.style.display = 'flex';
            const lines = [ "OS-NXT v6.0.0 (APEX) KERNEL INIT", "BIOS DATE 10/23/77", "CPU: Z80A 4MHz ... OK", "MEM: CHECKING RAM...", "512KB EXTENDED MEMORY ... OK", "MOUNTING VFS: /dev/sda1", "LOADING MODULES: AUDIO_HUM, GEIGER_FX, DECRYPT_ENG", "BYPASSING SECURITY PROTOCOLS...", "ESTABLISHING SECURE LINK...", "BOOT SEQUENCE COMPLETE." ];
            const textArea = document.getElementById('boot-text-area'); let lIdx = 0; let cIdx = 0; let currentHTML = "";

            const typeChar = () => {
                if(lIdx >= lines.length) { setTimeout(() => { bootConsole.style.display = 'none'; const ui = document.getElementById('os-ui'); ui.style.display = 'flex'; ui.classList.add('boot-flash'); forceNavigate('dashboard'); }, 600); return; }
                if(cIdx < lines[lIdx].length) {
                    currentHTML += lines[lIdx].charAt(cIdx); textArea.innerHTML = currentHTML;
                    if(cIdx % 2 === 0 && state.settings.sfx) sfx.floppy(); cIdx++; setTimeout(typeChar, Math.random() * 10 + 5);
                } else {
                    currentHTML += "<br>"; textArea.innerHTML = currentHTML; lIdx++; cIdx = 0; setTimeout(typeChar, Math.random() * 80 + 30);
                }
            };
            setTimeout(typeChar, 400);
        };

        window.onload = () => {
            if(state.settings.sfx === undefined) state.settings = { theme: 'pipboy', sfx: true, vhs: true, blur: true, chroma: true, scan: true, flicker: true, jitter: false, interf: true, ghost: true, boot: true };
            applyDOMSettings(); history.replaceState({ view: 'dashboard' }, "", "#dashboard");
            
            const pScreen = document.getElementById('power-screen');
            pScreen.addEventListener('mousedown', startPower); pScreen.addEventListener('touchstart', startPower);
            pScreen.addEventListener('mouseup', cancelPower); pScreen.addEventListener('touchend', cancelPower);
            pScreen.addEventListener('mouseleave', cancelPower);
        };
    </script>
</body>
</html>
