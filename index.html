<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" id="meta-theme-color" content="#020802">
    
    <title>OS-NXT // PIP-BOY ULTIMATE</title>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&family=Share+Tech+Mono&display=swap');

        :root {
            --bg-color: #020802;
            --bg-bezel: #010201;
            --text-color: #14ff14;
            --text-muted: #086b08;
            --accent: #22ff22;
            --glow-light: 0 0 3px rgba(20, 255, 20, 0.5);
            --glow-heavy: 0 0 10px rgba(20, 255, 20, 0.9), 0 0 2px rgba(255, 255, 255, 0.5);
            --crt-line: rgba(20, 255, 20, 0.08);
            --chart-fill: rgba(20, 255, 20, 0.2);
            --font-main: 'Share Tech Mono', monospace;
            --letter-space: 0.5px;
            --border-style: solid;
            --bleed-offset: 0px;
        }

        /* GHOST MONO THEME (PUTIH) */
        [data-theme="linux"] {
            --bg-color: #000000;
            --bg-bezel: #020202;
            --text-color: #ffffff; 
            --text-muted: #555555;
            --accent: #dddddd; 
            --glow-light: 0 0 3px rgba(255, 255, 255, 0.4);
            --glow-heavy: 0 0 10px rgba(255, 255, 255, 0.8);
            --crt-line: rgba(255, 255, 255, 0.05);
            --chart-fill: rgba(255, 255, 255, 0.15);
            --font-main: 'Fira Code', monospace;
            --letter-space: -0.5px;
        }

        /* OVERDRIVE BLOOM */
        body[data-bloom="true"] {
            --glow-light: 0 0 8px var(--text-color), 0 0 2px #fff;
            --glow-heavy: 0 0 20px var(--text-color), 0 0 5px #fff;
        }

        /* COLOR BLEED (RF CABLE DEGRADATION) */
        body[data-bleed="true"] {
            --bleed-offset: 2px;
        }
        body[data-bleed="true"] #viewport {
            text-shadow: var(--bleed-offset) 0 0 rgba(255,0,0,0.6), calc(var(--bleed-offset) * -1) 0 0 rgba(0,255,255,0.6), var(--glow-light);
        }
        body[data-bleed="true"] canvas, body[data-bleed="true"] svg {
            filter: drop-shadow(var(--bleed-offset) 0 0 rgba(255,0,0,0.6)) drop-shadow(calc(var(--bleed-offset) * -1) 0 0 rgba(0,255,255,0.6));
        }

        body[data-chroma="true"] {
            --glow-light: 1px 0px 0px rgba(255, 0, 0, 0.7), -1px 0px 0px rgba(0, 255, 255, 0.7), 0 0 4px rgba(20, 255, 20, 0.4);
            --glow-heavy: 2px 0px 0px rgba(255, 0, 0, 0.8), -2px 0px 0px rgba(0, 255, 255, 0.8), 0 0 12px rgba(20, 255, 20, 0.8);
        }
        body[data-theme="linux"][data-chroma="true"] {
            --glow-light: 1px 0px 0px rgba(255, 0, 0, 0.5), -1px 0px 0px rgba(0, 150, 255, 0.5);
            --glow-heavy: 2px 0px 0px rgba(255, 0, 0, 0.6), -2px 0px 0px rgba(0, 150, 255, 0.6), 0 0 8px rgba(255, 255, 255, 0.6);
        }
        
        body[data-scan="false"] #crt-matrix, 
        body[data-scan="false"] .vcr-tracking, 
        body[data-scan="false"] .scanline,
        body[data-scan="false"] .scanline-thick,
        body[data-scan="false"] .vsync-roll { display: none !important; }
        
        body[data-blur="true"] #crt-vignette { backdrop-filter: blur(1.5px); -webkit-backdrop-filter: blur(1.5px); }
        body[data-flicker="true"] #flicker-layer { animation: crt-flicker 0.12s infinite; }
        body[data-jitter="true"] #viewport { animation: signal-jitter 4s infinite; }
        body[data-interf="true"] #interference { animation: v-interf 6s infinite linear; }
        body[data-ghost="true"] #viewport { filter: drop-shadow(4px 0px 2px rgba(20,255,20,0.3)); }
        body[data-theme="linux"][data-ghost="true"] #viewport { filter: drop-shadow(3px 0px 2px rgba(255,255,255,0.2)); }
        
        /* BURN IN LAYER */
        body[data-burnin="false"] #burn-in-layer { display: none; }

        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-user-select: none; -webkit-touch-callout: none; -webkit-tap-highlight-color: transparent; scrollbar-width: none; }
        ::-webkit-scrollbar { display: none; }
        input, [contenteditable="true"] { user-select: text; -webkit-user-select: text; -webkit-touch-callout: default; cursor: text; }

        body {
            background-color: var(--bg-bezel); height: 100vh; width: 100vw; overflow: hidden;
            display: flex; flex-direction: column; font-family: var(--font-main); color: var(--text-color);
            letter-spacing: var(--letter-space); text-transform: uppercase; font-size: 16px;
            -webkit-font-smoothing: none; text-rendering: optimizeSpeed; padding: 1.5vw; 
            transition: transform 0.05s, filter 0.05s; perspective: 1000px;
        }
        
        body.micro-jitter { transform: translate(1px, -1px) skewX(0.5deg); filter: brightness(1.2) contrast(1.1); }

        #screen-tube {
            position: relative; width: 100%; height: 100%; overflow: hidden;
            background-color: var(--bg-color); 
            border-radius: 40px;
            box-shadow: 0 0 0 10px #010101, inset 0 0 50px rgba(0,0,0,0.9), inset 0 0 10px var(--text-muted);
            border: 4px solid #1a1a1a; z-index: 1; transform-style: preserve-3d;
            clip-path: inset(0 round 40px);
        }

        #bg-parallax-wrapper { position: absolute; top: -5%; left: -5%; width: 110%; height: 110%; pointer-events: none; z-index: 2; transition: transform 0.1s ease-out; }
        #bg-grid { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-image: radial-gradient(var(--crt-line) 1px, transparent 1px); background-size: 25px 25px; pointer-events: none; opacity: 0.3; }
        #matrix-canvas { position: absolute; top:0; left:0; width:100%; height:100%; pointer-events: none; opacity: 0.25; display: none; }
        #crt-matrix { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(0, 0, 0, 0.2) 50%, transparent 50%), linear-gradient(90deg, rgba(0, 0, 0, 0.2) 50%, transparent 50%); background-size: 4px 4px; pointer-events: none; opacity: 0.8;}

        #static-noise { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 11; pointer-events: none; opacity: 0.06; background: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='1.5' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E"); mix-blend-mode: overlay; }
        #burn-in-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 12; pointer-events: none; opacity: 0.08; mix-blend-mode: screen; filter: blur(1px); background-image: repeating-linear-gradient(0deg, transparent, transparent 40px, var(--text-color) 40px, var(--text-color) 41px), radial-gradient(circle at 50% 20%, var(--text-color) 0%, transparent 10%); background-size: 100% 100%, 200px 200px; background-repeat: no-repeat; background-position: center; }

        .vsync-roll { position: absolute; top: -20%; left: 0; width: 100%; height: 15%; background: linear-gradient(to bottom, transparent, rgba(0,0,0,0.5), transparent); animation: v-roll 8s linear infinite; z-index: 8; pointer-events: none; will-change: top; }
        .vcr-tracking { width: 100%; height: 15px; z-index: 9; position: absolute; pointer-events: none; background: rgba(255,255,255,0.03); box-shadow: 0 0 10px rgba(255,255,255,0.02); animation: tracking 6s infinite linear; will-change: top; }
        .scanline { width: 100%; height: 150px; z-index: 10; position: absolute; pointer-events: none; background: linear-gradient(0deg, transparent 0%, var(--crt-line) 50%, transparent 100%); animation: scan 4s linear infinite; will-change: top; }
        .scanline-thick { width: 100%; height: 300px; z-index: 10; position: absolute; pointer-events: none; background: linear-gradient(0deg, transparent, rgba(255,255,255,0.02), transparent); animation: scan-thick 12s linear infinite; will-change: top; }
        #interference { position: absolute; top: -20%; left: 0; width: 100%; height: 40px; background: linear-gradient(0deg, transparent, rgba(255,255,255,0.1), transparent); z-index: 97; pointer-events: none; opacity: 0; }
        #flicker-layer { position: absolute; top:0; left:0; width:100%; height:100%; background: #000; opacity: 0; pointer-events: none; z-index: 98; }
        
        #screen-grime { position: absolute; top:0; left:0; width:100%; height:100%; z-index: 98; pointer-events: none; mix-blend-mode: overlay; opacity: 0.3; background: radial-gradient(circle at 20% 30%, rgba(0,0,0,0.6) 0%, transparent 40%), radial-gradient(circle at 80% 70%, rgba(0,0,0,0.8) 0%, transparent 50%); }
        #crt-vignette { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 50% 50%, transparent 50%, rgba(0,0,0,0.95) 130%), linear-gradient(90deg, rgba(0,0,0,0.5) 0%, transparent 5%, transparent 95%, rgba(0,0,0,0.5) 100%), linear-gradient(0deg, rgba(0,0,0,0.5) 0%, transparent 5%, transparent 95%, rgba(0,0,0,0.5) 100%); pointer-events: none; z-index: 99; transition: backdrop-filter 0.3s ease; box-shadow: inset 0 0 100px rgba(0,0,0,1); }

        #vats-overlay { position: absolute; top:0; left:0; width:100%; height:100%; z-index: 96; pointer-events: none; display: none; background: linear-gradient(0deg, transparent 49%, rgba(20,255,20,0.2) 50%, transparent 51%), linear-gradient(90deg, transparent 49%, rgba(20,255,20,0.2) 50%, transparent 51%); background-size: 100px 100px; border: 4px solid var(--text-color); box-shadow: inset 0 0 100px rgba(20,255,20,0.4); filter: contrast(1.5) saturate(2); animation: vats-pulse 2s infinite alternate; }
        #vats-overlay::after { content: 'V.A.T.S. ACTIVE // TARGET_ACQUIRED'; position: absolute; bottom: 120px; left: 20px; background: var(--text-color); color: var(--bg-color); padding: 5px 10px; font-weight: bold; }
        @keyframes vats-pulse { 0% { opacity: 0.8; transform: scale(1); } 100% { opacity: 1; transform: scale(1.02); } }

        #torch-mode { position: absolute; top:0; left:0; width:100%; height:100%; background: #ffffff; z-index: 999998; display: none; }
        #torch-mode::after { content:'TAP TO DISABLE TORCH'; position:absolute; top:50%; width:100%; text-align:center; color:#000; font-weight:bold; font-size:1.5rem; animation: blink 1s infinite; }

        #screensaver { position: absolute; top:0; left:0; width:100%; height:100%; background: #000; z-index: 999997; display: none; overflow: hidden; cursor: pointer; }
        #ss-logo { position: absolute; font-size: 2rem; font-weight: bold; color: var(--text-color); text-shadow: var(--glow-heavy); padding: 10px; border: 2px solid var(--text-color); white-space: nowrap; pointer-events: none; }

        @keyframes crt-flicker { 0% { opacity: 0; } 50% { opacity: 0.05; } 100% { opacity: 0; } }
        @keyframes signal-jitter { 0%, 9%, 11%, 100% { transform: translateX(0) skewX(0); } 10% { transform: translateX(-4px) skewX(1.5deg); } 10.5% { transform: translateX(3px) skewX(-1.5deg); } }
        @keyframes v-interf { 0% { top: -20%; opacity: 0; } 5% { opacity: 1; transform: skewX(10deg); } 8% { transform: skewX(-10deg); } 10% { top: 120%; opacity: 0; } 100% { top: 120%; opacity: 0; } }
        @keyframes scan { 0% { top: -100px; } 100% { top: 100%; } }
        @keyframes scan-thick { 0% { top: -300px; } 100% { top: 100%; } }
        @keyframes tracking { 0% { top: -20px; } 10% { top: 100%; } 100% { top: 100%; } }
        @keyframes v-roll { 0% { top: -20%; } 10% { top: 120%; } 100% { top: 120%; } }
        
        .crt-flash { animation: burst 0.4s cubic-bezier(0.1, 0.9, 0.2, 1) forwards; }
        @keyframes burst { 0% { filter: brightness(2.5) contrast(1.5) blur(2px); transform: scale(1.02); } 100% { filter: brightness(1) contrast(1) blur(0); transform: scale(1); } }
        
        .meltdown-fx { animation: glitch-tear 0.6s ease-in-out forwards; }
        @keyframes glitch-tear { 0% { transform: skew(0deg); filter: hue-rotate(0deg); } 15% { transform: skew(-25deg) translateX(-15px); filter: hue-rotate(90deg) invert(1); } 30% { transform: skew(20deg) translateX(10px); filter: hue-rotate(-90deg); } 45% { transform: skew(-10deg); filter: contrast(3); } 60% { transform: skew(15deg); opacity: 0.5; } 100% { transform: skew(0deg); filter: none; opacity: 1; } }

        .heal-fx { animation: heal-flash 0.5s ease-out forwards; }
        @keyframes heal-flash { 0% { filter: brightness(3) sepia(1) hue-rotate(90deg) saturate(5); transform: scale(1.05); } 100% { filter: none; transform: scale(1); } }

        .boot-flash { animation: boot-power-on 1s ease-out forwards; }
        @keyframes boot-power-on { 0% { transform: scaleY(0.01) scaleX(0); opacity: 0; filter: brightness(10); } 40% { transform: scaleY(0.02) scaleX(1); opacity: 1; filter: brightness(5); } 100% { transform: scaleY(1) scaleX(1); filter: brightness(1); } }

        .safe-area-wrapper { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; z-index: 20; padding-top: max(env(safe-area-inset-top), 10px); }
        #viewport { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 30px; padding-bottom: 110px; text-shadow: var(--glow-light); position: relative; will-change: transform; transition: transform 0.05s linear; z-index: 10;}

        #bottom-nav { position: absolute; bottom: 0; left: 0; width: 100%; height: 80px; background: rgba(0,0,0,0.9); border-top: 3px double var(--text-color); display: flex; justify-content: space-between; align-items: stretch; padding-bottom: env(safe-area-inset-bottom); z-index: 9999 !important; text-shadow: var(--glow-heavy); backdrop-filter: blur(10px); }
        .nav-btn { background: none; border: none; color: var(--text-muted); font-family: var(--font-main); font-size: 1rem; letter-spacing: 1px; cursor: pointer; flex: 1; height: 100%; position: relative; white-space: nowrap; display: flex; justify-content: center; align-items: center; touch-action: manipulation !important; pointer-events: auto !important; border-right: 1px solid rgba(255, 255, 255, 0.1); box-sizing: border-box; } 
        .nav-btn:last-child { border-right: none; }
        .nav-btn.active { color: var(--bg-color); background: var(--text-color); text-shadow: none; box-shadow: inset 0 0 15px rgba(0,0,0,0.5), 0 0 15px var(--text-color); }
        
        .nav-btn .bracket { opacity: 0; font-weight: bold; transition: opacity 0.1s;}
        .nav-btn .txt { margin: 0 4px; }
        .nav-btn.active .bracket { opacity: 1; color: var(--bg-color); }

        h1, h2, h3 { background: var(--text-color); color: var(--bg-color); padding: 5px 10px; display: inline-block; margin-bottom: 18px; font-size: 1.4rem; font-weight: bold; text-shadow: none; letter-spacing: 2px; box-shadow: 0 0 10px var(--text-color); }
        h3 { background: transparent; color: var(--text-color); border-bottom: 2px dashed var(--text-color); text-shadow: var(--glow-heavy); box-shadow: none; padding-left: 0;}
        
        button, input { font-family: var(--font-main); color: var(--text-color); background: rgba(0,0,0,0.5); border: 2px var(--border-style) var(--text-color); outline: none; padding: 14px; text-transform: uppercase; font-size: 1.1rem; text-shadow: var(--glow-light); transition: all 0.1s;}
        button { cursor: pointer; font-weight: bold; text-shadow: var(--glow-heavy); position: relative; overflow: hidden; }
        button::before { content: ''; position: absolute; top:0; left:-100%; width:100%; height:100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent); transition: 0.2s; }
        button:active::before { left: 100%; transition: 0.1s; }
        button:active { background: var(--text-color); color: var(--bg-color); transform: translateY(2px); box-shadow: 0 0 10px var(--text-color); }
        input::placeholder { color: var(--text-muted); opacity: 0.6; text-transform: uppercase; }
        input:focus { background: rgba(255, 255, 255, 0.05); border-style: dashed; }

        .fab-btn { position: absolute; bottom: 100px; right: 30px; z-index: 40; width: 70px; height: 70px; font-size: 2.5rem; font-weight: bold; background: var(--bg-color); box-shadow: -5px 5px 0px var(--text-muted); border: 3px solid var(--text-color); display: flex; justify-content: center; align-items: center; color: var(--text-color); cursor: pointer; text-shadow: var(--glow-heavy); border-radius: 50%; }
        .fab-btn:active { box-shadow: 0 0 0 transparent; transform: translate(-5px, 5px); background: var(--text-color); color: var(--bg-color); }

        .editor-container { position: relative; width: 100%; height: 50vh; margin-top: 10px; border: 2px var(--border-style) var(--text-color); background: rgba(0,0,0,0.6); box-shadow: inset 0 0 20px rgba(0,0,0,0.8); overflow: hidden; }
        #edit-content { position: absolute; top: 0; left: 0; width: 100%; height: 100%; font-family: var(--font-main); font-size: 1.2rem; line-height: 1.6; padding: 15px; overflow-y: auto; outline: none; text-transform: none; caret-color: transparent; text-shadow: var(--glow-light); z-index: 2; }
        #edit-content::selection { background: var(--text-color); color: var(--bg-color); text-shadow: none; }
        #block-cursor { position: absolute; width: 14px; height: 1.4rem; background-color: var(--text-color); box-shadow: var(--glow-heavy); z-index: 1; pointer-events: none; display: none; animation: blink 0.8s step-end infinite; transition: top 0.05s, left 0.05s; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        #edit-content h1, #edit-content h2 { display: block; background: transparent; color: var(--text-color); text-shadow: var(--glow-heavy); padding:0; letter-spacing: 0; box-shadow: none; }
        #edit-content h1 { font-size: 2.2rem; border-bottom: 3px solid var(--text-color); margin-bottom: 10px; text-transform: uppercase; }
        #edit-content h2 { font-size: 1.8rem; border-bottom: 1px dashed var(--text-color); margin-bottom: 10px; text-transform: uppercase; }
        #edit-content b, #edit-content strong { background: var(--chart-fill); color: var(--accent); padding: 0 4px; text-shadow: none; border: 1px solid var(--accent);}
        
        #format-toolbar { position: absolute; background: var(--bg-color); border: 2px solid var(--text-color); box-shadow: 0 15px 30px rgba(0,0,0,1); display: none; flex-direction: row; align-items: center; z-index: 9999; padding: 0; opacity: 0; transition: opacity 0.1s; pointer-events: none; }
        #format-toolbar::after { content: ''; position: absolute; bottom: -10px; left: var(--arrow-pos, 50%); transform: translateX(-50%); border-width: 10px 10px 0; border-style: solid; border-color: var(--text-color) transparent transparent transparent; display: block; width: 0; }
        #format-toolbar.flip-down::after { top: -10px; bottom: auto; border-width: 0 10px 10px; border-color: transparent transparent var(--text-color) transparent; }
        .fmt-btn { background: transparent; color: var(--text-color); border: none; font-size: 1.2rem; padding: 15px 20px; margin: 0; font-weight: bold; border-right: 2px solid var(--text-muted); border-radius: 0; pointer-events: auto;}
        .fmt-btn:last-child { border-right: none; }
        .fmt-btn:active { background: var(--text-color); color: var(--bg-color); transform: none; box-shadow: none;}

        .data-stream { font-size: 0.8rem; color: var(--text-muted); white-space: nowrap; overflow: hidden; margin-bottom: 15px; opacity: 0.8; font-family: monospace; }
        .chart-box { border: 2px var(--border-style) var(--text-color); padding: 10px; margin-top: 30px; margin-bottom: 20px; position: relative; background: repeating-linear-gradient(45deg, rgba(0,0,0,0), rgba(0,0,0,0) 10px, rgba(255,255,255,0.02) 10px, rgba(255,255,255,0.02) 20px); display: flex; justify-content: center; align-items: center; box-shadow: inset 0 0 15px rgba(0,0,0,0.5); }
        .chart-label { position: absolute; top: -14px; left: 15px; font-size: 1rem; background: var(--text-color); color: var(--bg-color); padding: 2px 10px; font-weight: bold; z-index: 2; text-shadow: none; box-shadow: 2px 2px 0 var(--text-muted);}
        canvas { display: block; width: 100%; image-rendering: pixelated; filter: drop-shadow(0 0 5px var(--text-color));}

        .note-card { border: 2px var(--border-style) var(--text-color); padding: 15px; margin-bottom: 15px; cursor: pointer; position: relative; display: block; width: 100%; text-align: left; background: rgba(0,0,0,0.4); border-left: 6px solid var(--text-color); transition: all 0.1s;}
        .note-card:active { background: var(--chart-fill); border-left-width: 15px; }
        .note-date { font-size: 0.85rem; color: var(--text-muted); margin-top: 8px; display: block; font-family: monospace;}
        .pin-badge { position: absolute; top: 10px; right: 10px; background: var(--text-color); color: var(--bg-color); font-size: 0.8rem; padding: 2px 8px; font-weight: bold; text-shadow: none; box-shadow: -2px 2px 0 var(--text-muted);}
        
        .label-badge { display: inline-block; padding: 4px 8px; font-size: 0.8rem; border: 1px solid var(--text-color); color: var(--text-color); margin-right: 5px; margin-top: 5px; background: rgba(0,0,0,0.6); }
        .swipe-labels { display: flex; overflow-x: auto; white-space: nowrap; padding-bottom: 15px; align-items: center; scrollbar-width: none;}
        .swipe-labels span { display: inline-block; cursor: pointer; border: 2px dashed var(--text-muted); padding: 8px 15px; margin-right: 10px; font-weight: bold; flex-shrink: 0; background: rgba(0,0,0,0.5);}
        .swipe-labels span.active-tag { border: 2px solid var(--text-color); background: var(--text-color); color: var(--bg-color); text-shadow: none; box-shadow: 2px 2px 0 var(--text-muted);}

        .timeline-item { border-left: 2px dashed var(--text-muted); padding-left: 20px; margin-bottom: 25px; position: relative; font-size: 1rem; line-height: 1.5;}
        .timeline-item::before { content: '>>'; position: absolute; left: -14px; top: 0; font-weight: bold; color: var(--accent); background: var(--bg-color); }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; align-items: stretch;}
        .flex-row { display: flex; gap: 15px; margin-bottom: 15px; flex-wrap: wrap; align-items: stretch;}
        .flex-between { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }

        .stat-block { flex: 1; border: 2px var(--border-style) var(--text-color); padding: 15px 10px; text-align: center; display: flex; flex-direction: column; justify-content: center; background: rgba(0,0,0,0.5); position: relative; overflow: hidden;}
        .stat-val { font-size: 1.8rem; font-weight: bold; text-shadow: var(--glow-heavy); white-space: nowrap; }
        .stat-lbl { font-size: 0.8rem; color: var(--text-muted); margin-top: 5px; letter-spacing: 1px;}
        .prog-bar { width: 100%; height: 6px; background: var(--chart-fill); margin-top: 10px; position: relative; overflow: hidden;}
        .prog-fill { height: 100%; background: var(--text-color); width: 0%; transition: width 1s ease-out; box-shadow: var(--glow-light);}

        /* AVATAR INTERAKTIF GILA-GILAAN */
        .avatar-container { width: 80px; height: 80px; display: flex; justify-content: center; align-items: center; position: relative; touch-action: none; }
        #nxt-boy-svg { width: 100%; height: 100%; stroke: var(--text-color); fill: none; stroke-width: 4; stroke-linejoin: round; stroke-linecap: round; filter: drop-shadow(0 0 5px var(--text-color)); transition: transform 0.1s ease-out, filter 0.3s;}
        
        .gauge-container { position: relative; width: 100%; height: 80px; display: flex; justify-content: center; align-items: flex-end; }
        #rad-gauge-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        
        .terminal-shell-box { border: 2px solid var(--text-color); background: #000; padding: 10px; margin-top: 25px; display: flex; align-items: center; font-family: monospace; box-shadow: 0 0 10px var(--crt-line); }
        .terminal-shell-box span { color: var(--accent); margin-right: 10px; font-weight: bold; }
        .terminal-shell-box input { flex: 1; background: transparent; border: none; padding: 5px; font-family: monospace; color: var(--text-color); font-size: 1rem; text-transform: uppercase; text-shadow: var(--glow-light); }

        #modal-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 10000; display: none; justify-content: center; align-items: center; padding: 20px; backdrop-filter: blur(2px);}
        .modal-box { border: 4px solid var(--text-color); background: repeating-linear-gradient(45deg, var(--bg-color), var(--bg-color) 10px, rgba(255,255,255,0.02) 10px, rgba(255,255,255,0.02) 20px); padding: 30px; width: 100%; max-width: 400px; text-align: center; box-shadow: -15px 15px 0px rgba(0,0,0,0.8), 0 0 30px var(--chart-fill); z-index: 10001; position: relative;}
        .modal-box::before { content: '!'; position: absolute; top: -25px; left: -25px; width: 50px; height: 50px; background: var(--text-color); color: var(--bg-color); font-size: 2rem; font-weight: bold; display: flex; justify-content: center; align-items: center; }
        .modal-box input { width: 100%; margin: 25px 0; text-align: center; font-size: 1.8rem; text-shadow: var(--glow-light); background: rgba(0,0,0,0.9); }
        
        #toast { position: absolute; top: 60px; left: 50%; transform: translateX(-50%); background: var(--text-color); color: var(--bg-color); padding: 15px 30px; font-weight: bold; font-size: 1.3rem; z-index: 12000; opacity: 0; pointer-events: none; transition: opacity 0.2s; border: 4px solid var(--bg-color); box-shadow: 0 0 30px var(--text-color); letter-spacing: 2px;}

        #power-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 20000; display: flex; flex-direction: column; justify-content: center; align-items: center; color: var(--text-color); font-family: monospace; cursor: pointer; text-shadow: 0 0 8px var(--text-color); }
        .boot-logo-ascii { white-space: pre; font-size: 8px; line-height: 8px; margin-bottom: 30px; color: var(--text-color); text-shadow: var(--glow-heavy); text-align: center;}
        @media (min-width: 400px) { .boot-logo-ascii { font-size: 12px; line-height: 12px; } }
        #boot-instruct { font-size: 1.4rem; margin-bottom: 20px; font-weight: bold;}
        
        #boot-bar-container { width: 250px; height: 20px; border: 2px solid var(--text-color); padding: 3px; position: relative;}
        #boot-progress { width: 0%; height: 100%; background: repeating-linear-gradient(90deg, var(--text-color), var(--text-color) 8px, transparent 8px, transparent 10px); transition: width 0.1s linear; box-shadow: var(--glow-light);}
        
        #boot-console { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 19999; display: none; flex-direction: column; padding: 20px; color: var(--text-color); font-family: monospace; font-size: 1.2rem; text-transform: uppercase; text-shadow: 0 0 5px var(--text-color); box-shadow: inset 0 0 50px rgba(0,0,0,0.9); overflow-y: hidden;}
        .boot-line { margin-bottom: 8px; word-break: break-all; }
        .boot-cursor { display: inline-block; width: 12px; height: 1.2rem; background: var(--text-color); animation: blink 0.5s step-end infinite; vertical-align: bottom;}
        
        .sys-glitch { animation: glitch-anim 0.2s linear infinite; }
        @keyframes glitch-anim { 0% { transform: translate(0) } 20% { transform: translate(-2px, 2px) } 40% { transform: translate(-2px, -2px) } 60% { transform: translate(2px, 2px) } 80% { transform: translate(2px, -2px) } 100% { transform: translate(0) } }

        .decrypting-text { font-family: monospace; opacity: 0.8; }
    </style>
</head>
<body>

    <div id="power-screen">
        <div class="boot-logo-ascii sys-glitch" id="ascii-logo" style="display:none;">
   ____  _____       _   ___  _______
  / __ \/ ___/      / | / / |/ /_  _/
 / / / /\__ \______/  |/ /|   / / /  
/ /_/ /___/ /_____/ /|  //   | / /   
\____//____/     /_/ |_//_/|_|/_/    
        </div>
        <div id="boot-instruct" class="sys-glitch">> INITIALIZE_</div>
        <div id="boot-bar-container"><div id="boot-progress"></div></div>
    </div>
    <div id="boot-console">
        <div id="boot-text-area" style="white-space:pre-wrap;"></div>
        <div class="boot-cursor" id="boot-cursor-elem"></div>
    </div>

    <!-- SCREENSAVER -->
    <div id="screensaver" onclick="exitScreensaver()">
        <div id="ss-logo">NXT-OS</div>
    </div>

    <!-- TORCH MODE -->
    <div id="torch-mode" onclick="toggleTorch()"></div>

    <!-- MAIN OS LAYERS -->
    <div id="screen-tube">
        <div id="bg-parallax-wrapper">
            <div id="bg-grid"></div>
            <canvas id="matrix-canvas"></canvas>
            <div id="crt-matrix"></div>
        </div>

        <div id="static-noise"></div>
        <div id="burn-in-layer"></div>
        <div class="vsync-roll"></div>
        <div class="vcr-tracking"></div>
        <div class="scanline"></div>
        <div class="scanline-thick"></div>
        
        <!-- OVERLAYS -->
        <div id="vats-overlay"></div>
        <div id="screen-grime"></div>

        <div id="interference"></div>
        <div id="flicker-layer"></div>
        <div id="crt-vignette"></div>
        <div id="toast">[ SYSTEM MESSAGE ]</div>

        <div class="safe-area-wrapper" id="os-ui">
            <div id="viewport"></div>

            <button id="main-fab" class="fab-btn" onclick="addNote()" style="display:none;">[+]</button>

            <div id="format-toolbar">
                <button class="fmt-btn" onmousedown="execFormat('formatBlock', 'H1'); return false;">H1</button>
                <button class="fmt-btn" onmousedown="execFormat('formatBlock', 'H2'); return false;">H2</button>
                <button class="fmt-btn" onmousedown="execFormat('bold'); return false;">B</button>
                <button class="fmt-btn" onmousedown="execFormat('italic'); return false;">I</button>
                <button class="fmt-btn" onmousedown="execSelectAll(); return false;">&lt;&gt;</button>
                <button class="fmt-btn" onmousedown="execCopy(); return false;">CPY</button>
            </div>

            <div id="bottom-nav">
                <button class="nav-btn active" onclick="navigate('dashboard')">
                    <span class="bracket">[</span><span class="txt">SYSTEM</span><span class="bracket">]</span>
                </button>
                <button class="nav-btn" onclick="navigate('notes')">
                    <span class="bracket">[</span><span class="txt">DATA</span><span class="bracket">]</span>
                </button>
                <button class="nav-btn" onclick="navigate('log')">
                    <span class="bracket">[</span><span class="txt">LOG</span><span class="bracket">]</span>
                </button>
                <button class="nav-btn" onclick="navigate('settings')">
                    <span class="bracket">[</span><span class="txt">CONFIG</span><span class="bracket">]</span>
                </button>
            </div>
        </div>

        <div id="modal-overlay">
            <div class="modal-box">
                <h2 id="modal-title" style="margin-bottom: 5px; background:var(--bg-color); color:var(--text-color); border:2px solid var(--text-color);">SUDO EXECUTE</h2>
                <p id="modal-desc" style="font-size: 1rem; color: var(--text-muted); margin-bottom:10px; font-family: monospace; background:var(--bg-color); padding:5px;">Authorization Required.</p>
                <input type="text" id="modal-input" autocomplete="off" placeholder="> TYPE 'OK'">
                <div class="grid-2" style="margin-top: 20px; margin-bottom: 0;">
                    <button onclick="closeModal()" style="border-style: dashed; background:var(--bg-color);">CANCEL</button>
                    <button id="modal-confirm" style="background: var(--text-color); color: var(--bg-color);">EXECUTE</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const setupPWA = () => {
            const svgIcon = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" fill="#020802"/><text x="50" y="65" font-family="monospace" font-size="50" font-weight="bold" fill="#14ff14" text-anchor="middle">NXT</text></svg>`;
            const encodedIcon = "data:image/svg+xml;base64," + btoa(svgIcon);
            const link = document.createElement('link'); link.rel = 'icon'; link.href = encodedIcon; document.head.appendChild(link);
        };
        setupPWA();

        let state = { 
            notes: [], labels: ['TUGAS', 'PRIBADI', 'IDE', 'INTEL'], logs: [], 
            settings: { theme: 'pipboy', sfx: true, vhs: true, blur: true, chroma: true, scan: true, flicker: true, jitter: false, interf: true, ghost: true, boot: true, bloom: false, bleed: false, burnin: false }, 
            currentView: 'dashboard', activeNoteId: null, filterLabel: null 
        };
        
        let pristineEditorState = ""; let editorHistory = []; let historyIndex = -1;
        let radsCount = 120; 
        let synthRadioActive = false; let synthInterval;
        let batteryLevel = "100%"; let isCharging = false;
        let idleTimer; let vatsActive = false; let isTorch = false;
        let geigerInterval; let streamInterval; let gyroEnabled = false;

        try {
            const memNotes = localStorage.getItem('os-nxt-notes'); if(memNotes) state.notes = JSON.parse(memNotes);
            const memLabels = localStorage.getItem('os-nxt-labels'); if(memLabels) state.labels = JSON.parse(memLabels);
            const memLogs = localStorage.getItem('os-nxt-logs'); if(memLogs) state.logs = JSON.parse(memLogs);
            const memSettings = localStorage.getItem('os-nxt-settings'); 
            if(memSettings) state.settings = { ...state.settings, ...JSON.parse(memSettings) };
        } catch (e) { localStorage.clear(); }

        let sessionStartTime = Date.now();

        const saveState = () => {
            localStorage.setItem('os-nxt-notes', JSON.stringify(state.notes)); localStorage.setItem('os-nxt-labels', JSON.stringify(state.labels));
            localStorage.setItem('os-nxt-logs', JSON.stringify(state.logs)); localStorage.setItem('os-nxt-settings', JSON.stringify(state.settings));
        };

        const addLog = (action, details) => { state.logs.unshift({ id: Date.now(), action, details, time: new Date().toISOString() }); if(state.logs.length > 150) state.logs.pop(); saveState(); };
        const getStorageSize = () => { let total = 0; for(let x in localStorage) { if(localStorage.hasOwnProperty(x)) total += ((localStorage[x].length + x.length) * 2); } return (total / 1024).toFixed(1); };
        const fmtDate = (iso) => { const d = new Date(iso); return `${d.getFullYear().toString().substr(-2)}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} // ${String(d.getHours()).padStart(2,'0')}${String(d.getMinutes()).padStart(2,'0')}H`; };
        const stripHTML = (html) => { const tmp = document.createElement("DIV"); tmp.innerHTML = html; return tmp.textContent || tmp.innerText || ""; };
        
        let toastTimeout;
        const showToast = (msg) => { const t = document.getElementById('toast'); t.innerText = `[ ${msg} ]`; t.style.opacity = 1; sfx.commit(); clearTimeout(toastTimeout); toastTimeout = setTimeout(() => t.style.opacity = 0, 2500); };

        // --- HARDWARE BATTERY API ---
        const initBattery = () => {
            if (navigator.getBattery) {
                navigator.getBattery().then(function(battery) {
                    const updateBattery = () => {
                        batteryLevel = Math.floor(battery.level * 100) + "%";
                        isCharging = battery.charging;
                        const el = document.getElementById('batt-status-val');
                        if(el) el.innerText = batteryLevel + (isCharging ? ' ++' : '');
                    };
                    updateBattery();
                    battery.addEventListener('levelchange', updateBattery);
                    battery.addEventListener('chargingchange', updateBattery);
                });
            } else { batteryLevel = "99%"; isCharging = false; } 
        };

        // --- AVATAR INTERAKTIF (GYRO & TOUCH) ---
        let pupilX = 0, pupilY = 0;
        let isTouchingAvatar = false;
        let lastTapTime = 0;

        const updateAvatarEyes = (x, y) => {
            if(state.currentView !== 'dashboard') return;
            const pL = document.getElementById('pupil-l'); const pR = document.getElementById('pupil-r');
            if(pL && pR) { pL.setAttribute('transform', `translate(${x}, ${y})`); pR.setAttribute('transform', `translate(${x}, ${y})`); }
        };

        // Fallback Mouse
        document.addEventListener('mousemove', (e) => {
            if(gyroEnabled || isTouchingAvatar || state.currentView !== 'dashboard') return;
            const svg = document.getElementById('nxt-boy-svg'); if(!svg) return;
            const rect = svg.getBoundingClientRect();
            const cx = rect.left + rect.width / 2; const cy = rect.top + rect.height / 2;
            const dx = e.clientX - cx; const dy = e.clientY - cy;
            const angle = Math.atan2(dy, dx);
            const dist = Math.min(Math.sqrt(dx*dx + dy*dy) / 20, 3); 
            pupilX = Math.cos(angle) * dist; pupilY = Math.sin(angle) * dist;
            updateAvatarEyes(pupilX, pupilY);
        });

        // Gyroscope tracking
        const handleOrientation = (e) => {
            if(isTouchingAvatar || state.currentView !== 'dashboard') return;
            if(e.gamma === null || e.beta === null) return; 
            gyroEnabled = true;
            // Gamma: left-right (-90 to 90). Beta: front-back (-180 to 180)
            let rawX = e.gamma; let rawY = e.beta - 45; // Asumsi megang HP 45 derajat
            let mappedX = Math.min(Math.max(rawX, -45), 45) / 45 * 4;
            let mappedY = Math.min(Math.max(rawY, -45), 45) / 45 * 4;
            updateAvatarEyes(mappedX, mappedY);
        };

        // Touch Avatar Logic
        const bindAvatarTouch = () => {
            const avatarHitbox = document.getElementById('avatar-hitbox');
            if(!avatarHitbox) return;
            
            avatarHitbox.addEventListener('touchstart', (e) => {
                isTouchingAvatar = true; sfx.commit();
                const mouth = document.getElementById('boy-mouth');
                if(mouth) mouth.setAttribute('d', 'M 45 65 A 5 5 0 1 1 55 65 A 5 5 0 1 1 45 65'); // Mulut membulat "O"
                trackAvatarTouch(e.touches[0]);
                
                // Double tap check for RadAway Heal
                const now = Date.now();
                if(now - lastTapTime < 300) {
                    healRads();
                }
                lastTapTime = now;
                e.preventDefault();
            });

            avatarHitbox.addEventListener('touchmove', (e) => {
                if(isTouchingAvatar) trackAvatarTouch(e.touches[0]);
                e.preventDefault();
            });

            avatarHitbox.addEventListener('touchend', (e) => {
                isTouchingAvatar = false;
                updateAvatarState(); // Kembali normal
                document.getElementById('nxt-boy-svg').style.transform = 'none';
                e.preventDefault();
            });
        };

        const trackAvatarTouch = (touch) => {
            if(state.currentView !== 'dashboard') return;
            const svg = document.getElementById('nxt-boy-svg');
            const rect = svg.getBoundingClientRect();
            const cx = rect.left + rect.width / 2; const cy = rect.top + rect.height / 2;
            const dx = touch.clientX - cx; const dy = touch.clientY - cy;
            
            // Mata liat jari ekstrem
            const angle = Math.atan2(dy, dx);
            pupilX = Math.cos(angle) * 4; pupilY = Math.sin(angle) * 4;
            updateAvatarEyes(pupilX, pupilY);
            
            // Kepala miring dikit ngikut jari
            const tilt = Math.max(Math.min(dx / 5, 15), -15);
            svg.style.transform = `rotate(${tilt}deg) scale(0.95)`;
        };

        const updateAvatarState = () => {
            const mouth = document.getElementById('boy-mouth');
            const svg = document.getElementById('nxt-boy-svg');
            if(!mouth || !svg || isTouchingAvatar) return;
            
            if(radsCount > 800) {
                // Ghoul / Sakit radiasi tinggi (Mulut turun, mata silang)
                mouth.setAttribute('d', 'M 30 70 Q 50 60 70 70');
                svg.style.filter = "drop-shadow(0 0 15px red) hue-rotate(-45deg)";
            } else if (radsCount > 400) {
                // Netral
                mouth.setAttribute('d', 'M 35 65 Q 50 65 65 65');
                svg.style.filter = "drop-shadow(0 0 5px var(--text-color))";
            } else {
                // Senyum
                mouth.setAttribute('d', 'M 30 60 Q 50 75 70 60');
                svg.style.filter = "drop-shadow(0 0 5px var(--text-color))";
            }
        };

        const spikeRads = (amount) => {
            radsCount += amount; if(state.currentView === 'dashboard') { drawRadGauge(); updateAvatarState(); }
            if(radsCount > 1000) {
                radsCount = 120; triggerMeltdown(); showToast("WARNING: REACTOR LEAK!");
                for(let i=0; i<10; i++) setTimeout(() => analogHit(1000 - i*80, 50, 0.2, 0.2, 'sawtooth'), i * 150);
            }
        };

        const healRads = () => {
            if(radsCount <= 120) return;
            radsCount = 120;
            sfx.boot(); showToast("RADAWAY INJECTED");
            const vp = document.getElementById('viewport');
            vp.classList.remove('heal-fx'); void vp.offsetWidth; vp.classList.add('heal-fx');
            drawRadGauge(); updateAvatarState();
        };

        // --- PHOSPHOR BURN-IN PROTECTION ---
        const resetIdleTimer = () => {
            clearTimeout(idleTimer);
            const ss = document.getElementById('screensaver');
            if(ss && ss.style.display === 'block') exitScreensaver();
            idleTimer = setTimeout(activateScreensaver, 45000); 
        };
        const activateScreensaver = () => {
            if(state.currentView === 'editor') return; 
            const ss = document.getElementById('screensaver'); ss.style.display = 'block';
            const logo = document.getElementById('ss-logo');
            let x = 50, y = 50, dx = 2, dy = 2;
            const moveLogo = () => {
                if(ss.style.display !== 'block') return;
                const rect = ss.getBoundingClientRect(); const lRect = logo.getBoundingClientRect();
                if(x + lRect.width >= rect.width || x <= 0) { dx = -dx; logo.style.color = Math.random() > 0.5 ? 'var(--text-color)' : 'var(--accent)'; }
                if(y + lRect.height >= rect.height || y <= 0) { dy = -dy; logo.style.color = Math.random() > 0.5 ? 'var(--text-color)' : 'var(--accent)'; }
                x += dx; y += dy; logo.style.left = x + 'px'; logo.style.top = y + 'px';
                requestAnimationFrame(moveLogo);
            };
            requestAnimationFrame(moveLogo);
        };
        const exitScreensaver = () => { document.getElementById('screensaver').style.display = 'none'; resetIdleTimer(); sfx.nav(); };
        ['mousemove', 'mousedown', 'keydown', 'touchstart'].forEach(evt => document.addEventListener(evt, resetIdleTimer));

        // --- AUDIO ENGINE ---
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx, humOsc, humGain, noiseSource, noiseFilter, noiseGain;
        
        const initAudio = () => { 
            if (!audioCtx && AudioContext) audioCtx = new AudioContext(); 
            if(audioCtx && audioCtx.state === 'suspended') audioCtx.resume(); 
            manageHumFX(); manageGeiger(); initBattery(); resetIdleTimer();
        };

        const manageGeiger = () => {
            clearInterval(geigerInterval);
            if(state.settings.sfx && state.settings.vhs) {
                const runGeigerTick = () => {
                    const delay = Math.max(10, 300 - (radsCount / 4)); 
                    geigerInterval = setTimeout(() => {
                        if(Math.random() > 0.4) {
                            if(audioCtx) {
                                const t = audioCtx.currentTime; const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
                                osc.type = 'square'; osc.frequency.setValueAtTime(100 + Math.random()*1200, t);
                                gain.gain.setValueAtTime((0.01 + Math.random()*0.04), t); gain.gain.exponentialRampToValueAtTime(0.001, t + 0.015);
                                osc.connect(gain); gain.connect(audioCtx.destination); osc.start(t); osc.stop(t + 0.015);
                                
                                if(state.currentView === 'dashboard') {
                                    const cvs = document.getElementById('rad-gauge-canvas');
                                    if(cvs) { cvs.style.transform = `rotate(${Math.random()*2 - 1}deg)`; setTimeout(()=>cvs.style.transform='none', 20); }
                                }
                            }
                        }
                        runGeigerTick();
                    }, delay);
                };
                runGeigerTick();
            }
        };

        const manageHumFX = () => {
            if(!audioCtx) return;
            if(state.settings.vhs && !noiseSource) {
                const bufferSize = audioCtx.sampleRate * 2; const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate); const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
                noiseSource = audioCtx.createBufferSource(); noiseSource.buffer = buffer; noiseSource.loop = true;
                noiseFilter = audioCtx.createBiquadFilter(); noiseFilter.type = 'lowpass'; noiseFilter.frequency.value = 1000; 
                noiseGain = audioCtx.createGain(); noiseGain.gain.value = 0.05; 
                noiseSource.connect(noiseFilter); noiseFilter.connect(noiseGain); noiseGain.connect(audioCtx.destination); noiseSource.start();
                humOsc = audioCtx.createOscillator(); humGain = audioCtx.createGain(); humOsc.type = 'sine'; humOsc.frequency.value = 60; humGain.gain.value = 0.06;
                humOsc.connect(humGain); humGain.connect(audioCtx.destination); humOsc.start();
            } else if (!state.settings.vhs && noiseSource) { noiseSource.stop(); noiseSource = null; humOsc.stop(); humOsc = null; }
        };

        const analogHit = (startFreq, endFreq, dur, vol, type='square') => {
            if (!state.settings.sfx || !audioCtx) return; const t = audioCtx.currentTime;
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.type = type; osc.frequency.setValueAtTime(startFreq, t); osc.frequency.exponentialRampToValueAtTime(endFreq, t + dur);
            gain.gain.setValueAtTime(vol, t); gain.gain.exponentialRampToValueAtTime(0.001, t + dur);
            osc.connect(gain); gain.connect(audioCtx.destination); osc.start(t); osc.stop(t + dur);
        };
        const humVoltageDrop = () => { if(humOsc && humOsc.frequency && state.settings.vhs) { const t = audioCtx.currentTime; humOsc.frequency.setValueAtTime(60, t); humOsc.frequency.exponentialRampToValueAtTime(30, t + 0.15); humOsc.frequency.exponentialRampToValueAtTime(60, t + 0.6); } };

        const sfx = {
            type: () => { analogHit(200, 50, 0.05, 0.2, 'sawtooth'); analogHit(1000, 400, 0.02, 0.05, 'square'); spikeRads(2); },
            nav: () => { analogHit(400, 50, 0.15, 0.2, 'square'); humVoltageDrop(); spikeRads(5); },
            enter: () => { analogHit(600, 100, 0.1, 0.2, 'triangle'); },

            let filteredNotes = state.notes; if(state.filterLabel) filteredNotes = filteredNotes.filter(n => n.labels.includes(state.filterLabel));
            const sortedNotes = [...filteredNotes.filter(n => n.pinned), ...filteredNotes.filter(n => !n.pinned)];
            container.innerHTML = sortedNotes.length === 0 ? '<div class="data-stream">> 404: NO DATA IN THIS SECTOR.</div>' : sortedNotes.map(n => `
                <div class="note-card note-item-dom" data-title="${(n.title||'').toLowerCase()}" data-content="${stripHTML(n.content).toLowerCase()}" onclick="openNote(${n.id})">
                    ${n.pinned ? '<div class="pin-badge">!!!</div>' : ''}
                    <div style="margin-bottom:5px;"><strong style="font-size:1.3rem">${n.title || 'UNTITLED_BLOCK'}</strong></div>
                    <div class="data-stream" style="margin-bottom:10px;">UID:${n.id} // LEN:${stripHTML(n.content).length}B</div>
                    <div style="margin-bottom:8px;">${n.labels.map(l => `<span class="label-badge">${l}</span>`).join('')}</div>
                    <div class="note-date">${fmtDate(n.timestamp)}</div>
                </div>
            `).join('');
            executeQuickSearch();
        };
        const setFilter = (lbl) => { sfx.enter(); state.filterLabel = lbl; renderNotes(); };
        const executeQuickSearch = () => { 
            sfx.type(); const term = document.getElementById('search-box').value.toLowerCase(); 
            if(term === 'meltdown') { triggerMeltdown(); document.getElementById('search-box').value = '';}
            document.querySelectorAll('.note-item-dom').forEach(card => { card.style.display = (card.getAttribute('data-title').includes(term) || card.getAttribute('data-content').includes(term)) ? 'block' : 'none'; }); 
        };

        // --- 3. EDITOR ---
        const addNote = () => { const id = Date.now(); state.notes.unshift({ id, title: '', content: '', labels: [], pinned: false, timestamp: new Date().toISOString(), _isNew: true }); state.activeNoteId = id; forceNavigate('editor'); };
        const openNote = (id) => { state.activeNoteId = id; forceNavigate('editor'); };

        let saveDraftTimeout;
        const pushHistory = (val) => { if(editorHistory[historyIndex] === val) return; editorHistory = editorHistory.slice(0, historyIndex + 1); editorHistory.push(val); historyIndex++; };

        const renderEditor = () => {
            const vp = document.getElementById('viewport'); const note = state.notes.find(n => n.id === state.activeNoteId); if(!note) return forceNavigate('notes');
            pristineEditorState = JSON.stringify({ t: note.title, c: note.content });
            editorHistory = [note.content]; historyIndex = 0; 
            const rawText = stripHTML(note.content); const words = rawText.trim().split(/\s+/).filter(w=>w.length>0).length;

            vp.innerHTML = `
                <div class="flex-between">
                    <button onclick="requestDiscard()" style="border:none; color:var(--text-muted); background:transparent;">&lt; CANCEL</button>
                    <div>
                        <button onclick="togglePinDraft()" style="margin-right:10px; padding:8px 12px; ${note.pinned ? 'background:var(--text-color); color:var(--bg-color);' : 'border-style:dashed;'}">PIN</button>
                        <button style="background:var(--text-color); color:var(--bg-color); padding:8px 15px;" onclick="requestSave()">SAVE &gt;</button>
                    </div>
                </div>
                
                <input type="text" id="edit-title" value="" placeholder="> ENTER_TITLE" style="width:100%; margin-top:10px; margin-bottom:15px; font-size:1.5rem; font-weight:bold; border-width: 0 0 2px 0; background:transparent;" oninput="sfx.type()">
                
                <div class="swipe-labels" style="padding-bottom: 5px;">
                    ${state.labels.map(l => `<span onclick="toggleLabelDraft('${l}')" class="${note.labels.includes(l) ? 'active-tag' : ''}">[${l}]</span>`).join('')}
                </div>

                <div class="editor-container">
                    <div id="block-cursor"></div>
                    <div id="edit-content" contenteditable="true" spellcheck="false" oninput="handleInput(event)"></div>
                </div>
                
                <div class="flex-between" style="margin-top:15px;">
                    <div style="display:flex; gap:10px;">
                        <button onclick="execUndo()" style="padding: 10px; border-style:dashed;">&lt;&lt;</button>
                        <button onclick="execRedo()" style="padding: 10px; border-style:dashed;">&gt;&gt;</button>
                    </div>
                    <button style="color:red; border-color:red; font-size:1rem; padding: 10px 20px;" onclick="requestDelete(${note.id})">DELETE</button>
                </div>
                <div class="data-stream" style="text-align:right; margin-top:10px;"><span id="editor-stats">W:${words} // B:${rawText.length}</span></div>
            `;
            
            const realTitle = note.title;
            const realContent = note.content;
            if(!note._isNew) {
                document.getElementById('edit-title').value = "DECRYPTING...";
                executeDecryption('edit-content', realContent, 700);
                setTimeout(() => { if(state.currentView === 'editor') document.getElementById('edit-title').value = realTitle; }, 700);
            } else {
                document.getElementById('edit-title').value = realTitle;
                document.getElementById('edit-content').innerHTML = realContent;
            }
            
            const ta = document.getElementById('edit-content');
            ta.addEventListener('keyup', handleSmartList);
            document.addEventListener('selectionchange', handleSelectionPos);
            window.addEventListener('resize', handleSelectionPos);
            ta.addEventListener('scroll', handleSelectionPos); 
            ta.addEventListener('keyup', handleSelectionPos);
            ta.addEventListener('click', handleSelectionPos);
            ta.addEventListener('blur', () => { document.getElementById('block-cursor').style.display = 'none'; });
            ta.addEventListener('contextmenu', (e) => { e.preventDefault(); return false; });
        };

        const handleInput = (e) => { 
            sfx.type(); const ta = e.target;
            const html = ta.innerHTML; const raw = stripHTML(html); const words = raw.trim().split(/\s+/).filter(w=>w.length>0).length;
            document.getElementById('editor-stats').innerText = `W:${words} // B:${raw.length}`;
            clearTimeout(saveDraftTimeout); saveDraftTimeout = setTimeout(() => pushHistory(html), 600); 
            handleSelectionPos();
            if(Math.random() > 0.85) { document.body.classList.add('micro-jitter'); setTimeout(() => document.body.classList.remove('micro-jitter'), 50); }
        };

        const handleSmartList = (e) => {
            if(e.code === 'Space') {
                const sel = window.getSelection(); if(!sel.rangeCount) return; const node = sel.anchorNode;
                if(node.nodeType === 3 && (node.textContent.trim() === '1.' || node.textContent.trim() === '-')) {
                    node.textContent = ''; document.execCommand(node.textContent.includes('-') ? 'insertUnorderedList' : 'insertOrderedList'); sfx.enter();
                }
            }
        };

        const handleSelectionPos = () => {
            if(state.currentView !== 'editor') return;
            const ta = document.getElementById('edit-content'); 
            const toolbar = document.getElementById('format-toolbar'); 
            const cursor = document.getElementById('block-cursor');
            if(!ta || !toolbar || !cursor) return;

            const sel = window.getSelection();
            if(document.activeElement === ta && sel.rangeCount > 0 && sel.isCollapsed) {
                toolbar.style.display = 'none'; cursor.style.display = 'block'; 
                const range = sel.getRangeAt(0); const rects = range.getClientRects();
                const rect = rects.length > 0 ? rects[rects.length - 1] : range.getBoundingClientRect();
                const containerRect = ta.getBoundingClientRect();
                if(ta.innerHTML === '' || ta.innerHTML === '<br>') { cursor.style.top = `15px`; cursor.style.left = `15px`; cursor.style.height = `1.4rem`; } 
                else if (rect && rect.height > 0) { cursor.style.top = `${rect.top - containerRect.top}px`; cursor.style.left = `${rect.left - containerRect.left}px`; cursor.style.height = `${rect.height}px`; }
            } 
            else if (document.activeElement === ta && sel.rangeCount > 0 && !sel.isCollapsed) { 
                const range = sel.getRangeAt(0); const rect = range.getBoundingClientRect(); 
                if (rect.width === 0 && rect.height === 0) return; 

                cursor.style.display = 'none'; toolbar.style.opacity = '0'; toolbar.style.display = 'flex'; 
                
                activeTimeouts.push(setTimeout(() => {
                    const tbWidth = toolbar.offsetWidth; const tbHeight = toolbar.offsetHeight;
                    const vpW = window.visualViewport ? window.visualViewport.width : window.innerWidth;
                    const vpH = window.visualViewport ? window.visualViewport.height : window.innerHeight;
                    const vpTop = window.visualViewport ? window.visualViewport.offsetTop : 0;
                    
                    let targetX = rect.left + (rect.width / 2); let leftPos = targetX - (tbWidth / 2);
                    const marginX = 10;
                    if (leftPos < marginX) leftPos = marginX;
                    if (leftPos + tbWidth > vpW - marginX) leftPos = vpW - tbWidth - marginX;
                    
                    let arrowPos = targetX - leftPos;
                    if (arrowPos < 20) arrowPos = 20; if (arrowPos > tbWidth - 20) arrowPos = tbWidth - 20;
                    
                    let topPos = rect.top - tbHeight - 15; let isFlipped = false;
                    if (topPos < vpTop + 60) { topPos = rect.bottom + 15; isFlipped = true; }
                    if (isFlipped && topPos + tbHeight > vpH + vpTop - 10) { topPos = vpTop + vpH - tbHeight - 10; }

                    if(isFlipped) toolbar.classList.add('flip-down'); else toolbar.classList.remove('flip-down'); 
                    toolbar.style.top = `${topPos}px`; toolbar.style.left = `${leftPos}px`; toolbar.style.setProperty('--arrow-pos', `${arrowPos}px`); toolbar.style.opacity = '1';
                }, 0));
            } else { toolbar.style.display = 'none'; cursor.style.display = 'none'; }
        };

        const execFormat = (command, val = null) => { document.execCommand(command, false, val); sfx.commit(); showToast('FORMAT APPLIED'); pushHistory(document.getElementById('edit-content').innerHTML); handleSelectionPos(); };
        const execSelectAll = () => { document.execCommand('selectAll', false, null); sfx.type(); handleSelectionPos(); };
        const execCopy = () => { document.execCommand('copy'); showToast('COPIED TO BUFFER'); sfx.commit(); document.getSelection().removeAllRanges(); handleSelectionPos(); };
        const execUndo = () => { if(historyIndex > 0) { historyIndex--; document.getElementById('edit-content').innerHTML = editorHistory[historyIndex]; sfx.type(); handleSelectionPos(); } else { sfx.error(); showToast('HISTORY LIMIT'); } };
        const execRedo = () => { if(historyIndex < editorHistory.length - 1) { historyIndex++; document.getElementById('edit-content').innerHTML = editorHistory[historyIndex]; sfx.type(); handleSelectionPos(); } else { sfx.error(); showToast('LATEST DATA'); } };

        const captureDraft = () => { const note = state.notes.find(n => n.id === state.activeNoteId); if(note) { note.title = document.getElementById('edit-title').value === "DECRYPTING..." ? note.title : document.getElementById('edit-title').value; note.content = document.getElementById('edit-content').innerHTML; } };
        const toggleLabelDraft = (lbl) => { sfx.enter(); captureDraft(); const note = state.notes.find(n => n.id === state.activeNoteId); if(note.labels.includes(lbl)) note.labels = note.labels.filter(l => l !== lbl); else note.labels.push(lbl); renderEditor(); };
        const togglePinDraft = () => { sfx.enter(); captureDraft(); const note = state.notes.find(n => n.id === state.activeNoteId); note.pinned = !note.pinned; renderEditor(); };

        const requestDiscard = () => {
            const note = state.notes.find(n => n.id === state.activeNoteId);
            const currentState = JSON.stringify({ t: document.getElementById('edit-title').value, c: document.getElementById('edit-content').innerHTML });
            if (currentState === pristineEditorState && !(note._isNew && (note.title !== '' || document.getElementById('edit-content').innerHTML !== ''))) {
                sfx.enter(); if(note && note._isNew) state.notes = state.notes.filter(n => n.id !== state.activeNoteId); forceNavigate('notes');
            } else {
                triggerMeltdown(); openCommit('DISCARD CHANGES', 'Data modified. Discard all?', () => {
                    if(note && note._isNew) { state.notes = state.notes.filter(n => n.id !== state.activeNoteId); } else { const savedNotes = localStorage.getItem('os-nxt-notes'); state.notes = savedNotes ? JSON.parse(savedNotes) : []; }
                    showToast('CHANGES DISCARDED'); forceNavigate('notes');
                });
            }
        };

        const requestSave = () => { openCommit('SAVE TO MEMORY', 'Write block to secure DB?', () => { captureDraft(); const note = state.notes.find(n => n.id === state.activeNoteId); note.timestamp = new Date().toISOString(); delete note._isNew; saveState(); showToast('DATA SAVED'); addLog('DATA', `Write block ID:${note.id}`); forceNavigate('notes'); }); };
        const requestDelete = (id) => { triggerMeltdown(); openCommit('DELETE DATA', `Permanently delete ID:${id}?`, () => { state.notes = state.notes.filter(n => n.id !== id); saveState(); showToast('BLOCK DELETED'); addLog('DATA', `Delete block ID:${id}`); forceNavigate('notes'); }); };

        // --- 4. LOG ---
        const renderLog = () => {
            document.getElementById('viewport').innerHTML = `
                <h1>ACTIVITY.LOG</h1>
                <div class="data-stream" style="margin-bottom:25px;">> TAIL -F /VAR/LOG/SYS.LOG</div>
                <div>
                    ${state.logs.length === 0 ? '<div class="timeline-item">NO LOG ENTRIES.</div>' : state.logs.map(l => `<div class="timeline-item"><span class="data-stream">${fmtDate(l.time)}</span><br><strong style="color:var(--accent);">[${l.action}]</strong> ${l.details}</div>`).join('')}
                </div>
                <button style="border-color:red; color:red; width:100%; margin-top:20px; border-style:dashed;" onclick="requestClearLogs()">CLEAR LOG</button>
            `;
        };
        const requestClearLogs = () => { triggerMeltdown(); openCommit('CLEAR SYSTEM LOG', 'Delete all tracking data?', () => { state.logs = []; saveState(); showToast('LOG CLEARED'); renderLog(); }); };

        // --- 5. SETTINGS (CFG) ---
        const renderSettings = () => {
            document.getElementById('viewport').innerHTML = `
                <h1>SYSTEM.CONFIG</h1>
                <div class="data-stream">> ROOT_ACCESS: GRANTED</div>
                
                <h3 style="color:var(--accent);">VISUAL OVERDRIVE</h3>
                <div class="grid-2">
                    <button onclick="toggleSetting('theme')" style="border-style:dashed;">THEME:<br><span style="color:var(--bg-color); background:var(--text-color); padding:0 5px;">${state.settings.theme === 'pipboy' ? 'PIPBOY' : 'GHOST (WHITE)'}</span></button>
                    <button onclick="toggleSetting('bloom')" style="border-style:dashed; border-color:${state.settings.bloom ? 'var(--accent)' : 'inherit'};">GLOW BLOOM: <br>${state.settings.bloom ? 'ON' : 'OFF'}</button>
                    <button onclick="toggleSetting('bleed')" style="border-style:dashed; border-color:${state.settings.bleed ? 'var(--accent)' : 'inherit'};">COLOR BLEED: <br>${state.settings.bleed ? 'ON' : 'OFF'}</button>
                    <button onclick="toggleSetting('burnin')" style="border-style:dashed; border-color:${state.settings.burnin ? 'var(--accent)' : 'inherit'};">BURN IN: <br>${state.settings.burnin ? 'ON' : 'OFF'}</button>
                </div>

                <h3>HARDWARE FX</h3>
                <div class="grid-2">
                    <button onclick="toggleSetting('boot')" style="border-style:dashed;">COLD BOOT: ${state.settings.boot ? 'ON' : 'OFF'}</button>
                    <button onclick="toggleSetting('sfx')" style="border-style:dashed;">UI SOUND: ${state.settings.sfx ? 'ON' : 'OFF'}</button>
                    <button onclick="toggleSetting('vhs')" style="border-style:dashed;">AUDIO HUM: ${state.settings.vhs ? 'ON' : 'OFF'}</button>
                    <button onclick="toggleSetting('blur')" style="border-style:dashed;">LENS BLUR: ${state.settings.blur ? 'ON' : 'OFF'}</button>
                    <button onclick="toggleSetting('scan')" style="border-style:dashed;">SCANLINES: ${state.settings.scan ? 'ON' : 'OFF'}</button>
                    <button onclick="toggleSetting('flicker')" style="border-style:dashed;">FLICKER: ${state.settings.flicker ? 'ON' : 'OFF'}</button>
                    <button onclick="toggleSetting('interf')" style="border-style:dashed;">INTERFERENCE: ${state.settings.interf ? 'ON' : 'OFF'}</button>
                    <button onclick="toggleSetting('ghost')" style="border-style:dashed;">LCD GHOST: ${state.settings.ghost ? 'ON' : 'OFF'}</button>
                    <button onclick="toggleSetting('jitter')" style="border-style:dashed; grid-column:span 2; border-color:var(--accent);">PHYSICAL JITTER: ${state.settings.jitter ? 'ON' : 'OFF'}</button>
                </div>

                <h3>SECTOR LABELS</h3>
                <div style="border: 2px dashed var(--text-color); padding: 15px; margin-bottom: 20px; background: rgba(0,0,0,0.5);">
                    <div style="margin-bottom: 15px;">
                        ${state.labels.length === 0 ? '<div class="data-stream">NO LABELS.</div>' : ''}
                        ${state.labels.map(l => `<div class="flex-between" style="border-bottom: 1px dotted var(--text-muted); padding: 10px 0;"><span style="font-weight:bold; font-size:1.1rem;">[${l}]</span><button style="padding: 5px 15px; font-size: 0.9rem; border-color: red; color: red;" onclick="requestDeleteLabel('${l}')">DEL</button></div>`).join('')}
                    </div>
                    <div class="flex-row" style="margin:0;"><input type="text" id="new-label-input" placeholder="> NEW_LABEL" style="flex: 1;" onkeyup="sfx.type()"><button onclick="addNewLabel()">ADD</button></div>
                </div>
                
                <h3>DATA I/O</h3>
                <div class="grid-2"><button onclick="exportData()">EXPORT_DATA</button><button onclick="document.getElementById('import-file').click()">IMPORT_DATA</button><input type="file" id="import-file" style="display:none" accept=".json" onchange="handleImport(event)"></div>
            `;
        };

        const toggleSetting = (key) => {
            sfx.enter(); triggerFlash();
            if(key === 'theme') { state.settings.theme = state.settings.theme === 'pipboy' ? 'linux' : 'pipboy'; applyDOMSettings(); } 
            else { state.settings[key] = !state.settings[key]; applyDOMSettings(); if(key === 'vhs' || key === 'sfx') initAudio(); }
            saveState(); renderSettings(); addLog('CONFIG', `${key.toUpperCase()} -> ${state.settings[key]}`);
        };

        const applyDOMSettings = () => {
            document.body.setAttribute('data-theme', state.settings.theme); 
            document.body.setAttribute('data-blur', state.settings.blur);
            document.body.setAttribute('data-chroma', state.settings.chroma); 
            document.body.setAttribute('data-scan', state.settings.scan);
            document.body.setAttribute('data-flicker', state.settings.flicker); 
            document.body.setAttribute('data-jitter', state.settings.jitter);
            document.body.setAttribute('data-interf', state.settings.interf); 
            document.body.setAttribute('data-ghost', state.settings.ghost);
            
            // New Visual Overdrive rules
            document.body.setAttribute('data-bloom', !!state.settings.bloom);
            document.body.setAttribute('data-bleed', !!state.settings.bleed);
            document.body.setAttribute('data-burnin', !!state.settings.burnin);

            document.getElementById('meta-theme-color').content = state.settings.theme === 'pipboy' ? '#010301' : '#020202'; 
        };

        const addNewLabel = () => { const input = document.getElementById('new-label-input'); const val = input.value.trim().toUpperCase().replace(/\s+/g, '_'); if(val && !state.labels.includes(val)) { sfx.commit(); state.labels.push(val); saveState(); addLog('CONFIG', `Created label [${val}]`); renderSettings(); } else { sfx.error(); showToast("INVALID LABEL"); } };
        const requestDeleteLabel = (lbl) => { triggerMeltdown(); openCommit('DELETE LABEL', `Remove [${lbl}]?`, () => { state.labels = state.labels.filter(l => l !== lbl); saveState(); showToast('LABEL DELETED'); renderSettings(); }); };

        const exportData = () => { sfx.enter(); const dataUri = 'data:application/json;charset=utf-8,'+ encodeURIComponent(JSON.stringify(state)); const link = document.createElement('a'); link.href = dataUri; link.download = `OS_NXT_DUMP_${Date.now()}.json`; link.click(); showToast('EXPORT SUCCESS'); addLog('DATA', 'Memory data exported'); };
        const handleImport = (e) => { const file = e.target.files[0]; if(!file) return; const reader = new FileReader(); reader.onload = (event) => { try { const tempImport = JSON.parse(event.target.result); if(tempImport.notes) { triggerMeltdown(); openCommit('OVERWRITE SYSTEM', 'Current data will be destroyed.', () => { state = tempImport; saveState(); applyDOMSettings(); showToast('RESTORE SUCCESS'); addLog('SYSTEM', 'Memory restored from dump'); forceNavigate('dashboard'); }); } } catch(err) { sfx.error(); showToast('IMPORT FAILED'); } }; reader.readAsText(file); e.target.value = ''; };

        // --- STRICT MODAL UX ---
        let commitCallback = null; const modal = document.getElementById('modal-overlay'); const modalInput = document.getElementById('modal-input');
        const openCommit = (title, desc, callback) => {
            sfx.error(); document.getElementById('modal-title').innerText = title; document.getElementById('modal-desc').innerText = desc; modalInput.value = ''; modalInput.placeholder = "> TYPE 'OK'"; commitCallback = callback; modal.style.display = 'flex'; 
            modal.querySelector('.modal-box').classList.remove('crt-flash'); void modal.offsetWidth; modal.querySelector('.modal-box').classList.add('crt-flash'); 
            setTimeout(() => { modalInput.focus(); }, 100);
        };
        const closeModal = () => { sfx.enter(); modal.style.display = 'none'; commitCallback = null; };
        document.getElementById('modal-confirm').addEventListener('click', () => { if(modalInput.value.toLowerCase() === 'ok') { sfx.commit(); modal.style.display = 'none'; if(commitCallback) commitCallback(); } else { sfx.error(); triggerMeltdown(); modalInput.value = ''; modalInput.placeholder = "WRONG. TYPE 'OK'"; } });

        // --- BOOT SEQUENCE ---
        let bootReq; let bootProgress = 0;
        const startPower = (e) => {
            if(e.type === 'touchstart') e.preventDefault(); 
            if(bootProgress >= 100) return; sfx.type(); bootProgress = 0; document.getElementById('ascii-logo').style.display = 'block';
            
            // Request Gyro Permission (Untuk iOS 13+ yang harus di-trigger user interaction)
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().then(resp => {
                    if (resp === 'granted') window.addEventListener('deviceorientation', handleOrientation);
                }).catch(console.error);
            } else {
                window.addEventListener('deviceorientation', handleOrientation);
            }

            const animateBoot = () => {
                bootProgress += 2; document.getElementById('boot-progress').style.width = bootProgress + '%';
                if(bootProgress % 10 === 0) sfx.type(); 
                if(bootProgress >= 100) { powerOn(); } else { bootReq = requestAnimationFrame(animateBoot); }
            };
            bootReq = requestAnimationFrame(animateBoot);
            document.getElementById('boot-instruct').innerText = "> LOADING_POWER...";
        };
        const cancelPower = (e) => {
            if(bootProgress >= 100) return; cancelAnimationFrame(bootReq); bootProgress = 0; document.getElementById('ascii-logo').style.display = 'none';
            document.getElementById('boot-progress').style.width = '0%'; document.getElementById('boot-instruct').innerText = "> INITIALIZE_";
        };

        const powerOn = () => {
            document.getElementById('power-screen').style.display = 'none'; initAudio(); sfx.boot();
            
            if(!state.settings.boot) { 
                const ui = document.getElementById('os-ui'); ui.style.display = 'flex'; ui.classList.add('boot-flash');
                forceNavigate('dashboard'); return; 
            }

            const bootConsole = document.getElementById('boot-console'); bootConsole.style.display = 'flex';
            
            const lines = [ 
                "ROBCO INDUSTRIES UNIFIED OPERATING SYSTEM",
                "COPYRIGHT 2077 ROBCO INDUSTRIES",
                "-Server 1-", "Compiled on NXT-OVERSEER.sys",
                "",
                "CPU: ZILOG Z80A 4MHz ... OK",
                "MEMORY: SYSTEM RAM 64KB",
                "MEMORY: 38911 BYTES FREE",
                "FILE COUNT: " + state.notes.length,
                "",
                "MOUNT VFS: /dev/sda1 ... SUCCESS",
                "LOAD MODULES: AUDIO_HUM, GEIGER_FX, DECRYPT_ENG ... LOADED",
                "BYPASS OVERSEER SECURITY PROTOCOL ... PERMITTED",
                "BUILD SECURE NETWORK ... DONE",
                "",
                "INIT PROCESS COMPLETE. WELCOME."
            ];
            
            const textArea = document.getElementById('boot-text-area'); let lIdx = 0; let currentHTML = "";

            const typeLine = () => {
                if(lIdx >= lines.length) { setTimeout(() => { bootConsole.style.display = 'none'; const ui = document.getElementById('os-ui'); ui.style.display = 'flex'; ui.classList.add('boot-flash'); forceNavigate('dashboard'); }, 800); return; }
                
                currentHTML += lines[lIdx] + "\n";
                textArea.innerHTML = currentHTML;
                
                if(lines[lIdx].length > 0 && state.settings.sfx) sfx.floppy();
                
                lIdx++;
                const delay = lines[lIdx-1].includes("...") ? 400 : (Math.random() * 80 + 20);
                setTimeout(typeLine, delay);
            };
            setTimeout(typeLine, 600);
        };

        window.onload = () => {
            // Apply migration settings defaults if old save doesn't have them
            const defaults = { bloom: false, bleed: false, burnin: false };
            state.settings = { ...defaults, ...state.settings };
            
            applyDOMSettings(); history.replaceState({ view: 'dashboard' }, "", "#dashboard");
            
            const pScreen = document.getElementById('power-screen');
            pScreen.addEventListener('mousedown', startPower); pScreen.addEventListener('touchstart', startPower);
            pScreen.addEventListener('mouseup', cancelPower); pScreen.addEventListener('touchend', cancelPower);
            pScreen.addEventListener('mouseleave', cancelPower);
        };
    </script>
</body>
</html>
