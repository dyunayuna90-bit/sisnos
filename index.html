<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <!-- PWA Meta Tags -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" id="meta-theme-color" content="#020802">
    
    <title>OS-NXT // SYS</title>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&family=Share+Tech+Mono&display=swap');

        :root {
            --bg-color: #020802;
            --text-color: #14ff14;
            --text-muted: #086b08;
            --accent: #22ff22;
            
            --glow-light: 0 0 2px rgba(20, 255, 20, 0.4);
            --glow-heavy: 0 0 8px rgba(20, 255, 20, 0.8);
            --crt-line: rgba(20, 255, 20, 0.08);
            --chart-fill: rgba(20, 255, 20, 0.2);
            --font-main: 'Share Tech Mono', monospace;
            --letter-space: 0px;
            --border-style: solid;
        }

        [data-theme="linux"] {
            --bg-color: #fdf6e3;
            --text-color: #073642; 
            --text-muted: #93a1a1;
            --accent: #dc322f; 
            --glow-light: none;
            --glow-heavy: none;
            --crt-line: rgba(0, 0, 0, 0.04);
            --chart-fill: rgba(7, 54, 66, 0.15);
            --font-main: 'Fira Code', monospace;
            --letter-space: -0.5px;
            --border-style: solid;
        }

        /* HARDWARE SWITCHES (OVERRIDES) */
        body[data-chroma="true"] {
            --glow-light: 0.8px 0px 0px rgba(255, 0, 0, 0.6), -0.8px 0px 0px rgba(0, 255, 255, 0.6), 0 0 4px rgba(20, 255, 20, 0.3);
            --glow-heavy: 1.5px 0px 0px rgba(255, 0, 0, 0.7), -1.5px 0px 0px rgba(0, 255, 255, 0.7), 0 0 8px rgba(20, 255, 20, 0.7);
        }
        body[data-theme="linux"][data-chroma="true"] {
            --glow-light: 0.5px 0px 0px rgba(220, 50, 47, 0.3), -0.5px 0px 0px rgba(42, 161, 152, 0.3);
            --glow-heavy: 1px 0px 0px rgba(220, 50, 47, 0.5), -1px 0px 0px rgba(42, 161, 152, 0.5), 0 0 5px rgba(7, 54, 66, 0.2);
        }
        
        body[data-scan="false"] #crt-matrix, 
        body[data-scan="false"] .vcr-tracking, 
        body[data-scan="false"] .scanline { display: none !important; }
        
        body[data-blur="true"] #crt-vignette { backdrop-filter: blur(0.6px); -webkit-backdrop-filter: blur(0.6px); }
        
        body[data-flicker="true"] #flicker-layer { animation: crt-flicker 0.15s infinite; }
        body[data-jitter="true"] #viewport { animation: signal-jitter 6s infinite; }
        body[data-interf="true"] #interference { animation: v-interf 8s infinite linear; }
        body[data-ghost="true"] #viewport { filter: drop-shadow(2px 2px 1px rgba(20,255,20,0.2)); }
        body[data-theme="linux"][data-ghost="true"] #viewport { filter: drop-shadow(1px 1px 0px rgba(7,54,66,0.2)); }

        /* ABSOLUTE NATIVE FEEL: Block Text Selection Globally */
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-user-select: none; -webkit-tap-highlight-color: transparent; scrollbar-width: none; }
        ::-webkit-scrollbar { display: none; }
        
        /* ENABLE Selection ONLY for inputs and editor */
        input, textarea, [contenteditable="true"] { user-select: text; -webkit-user-select: text; cursor: text; }

        body {
            background-color: var(--bg-color); height: 100vh; width: 100vw; overflow: hidden;
            display: flex; flex-direction: column; font-family: var(--font-main); color: var(--text-color);
            letter-spacing: var(--letter-space); text-transform: uppercase; font-size: 16px;
            -webkit-font-smoothing: none; text-rendering: optimizeSpeed;
        }

        /* 1. LAYERS */
        #screen-base { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: var(--bg-color); z-index: 1; transform: translateZ(0); }
        #crt-matrix {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0, 0, 0, 0.15) 50%, transparent 50%), linear-gradient(90deg, rgba(0, 0, 0, 0.15) 50%, transparent 50%);
            background-size: 3px 3px; pointer-events: none; z-index: 2; transform: translateZ(0);
        }
        .vcr-tracking {
            width: 100%; height: 12px; z-index: 9; position: absolute; pointer-events: none;
            background: rgba(255,255,255,0.02); box-shadow: 0 0 5px rgba(255,255,255,0.01);
            animation: tracking 7s infinite linear; will-change: transform, top; transform: translateZ(0);
        }
        .scanline {
            width: 100%; height: 150px; z-index: 10; position: absolute; pointer-events: none;
            background: linear-gradient(0deg, rgba(0,0,0,0) 0%, var(--crt-line) 50%, rgba(0,0,0,0) 100%);
            animation: scan 4s linear infinite; will-change: transform, top; transform: translateZ(0);
        }
        #interference {
            position: absolute; top: -20%; left: 0; width: 100%; height: 50px;
            background: linear-gradient(0deg, transparent, rgba(255,255,255,0.05), transparent);
            z-index: 97; pointer-events: none; opacity: 0; transform: translateZ(0);
        }
        #flicker-layer { position: absolute; top:0; left:0; width:100%; height:100%; background: #000; opacity: 0; pointer-events: none; z-index: 98; transform: translateZ(0); }
        #crt-vignette {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, transparent 45%, rgba(0,0,0,0.85) 110%);
            pointer-events: none; z-index: 99; transform: translateZ(0); transition: backdrop-filter 0.3s ease;
        }

        /* 2. KEYFRAMES */
        @keyframes tracking { 0% { top: -20px; } 100% { top: 110%; } }
        @keyframes scan { 0% { top: -150px; } 100% { top: 100%; } }
        @keyframes burst { 0% { filter: brightness(1.8) contrast(1.2); } 100% { filter: brightness(1) contrast(1); } }
        @keyframes crt-flicker { 0% { opacity: 0; } 50% { opacity: 0.03; } 100% { opacity: 0; } }
        @keyframes signal-jitter { 0%, 9%, 11%, 100% { transform: translateX(0) skewX(0); } 10% { transform: translateX(-3px) skewX(1deg); } 10.5% { transform: translateX(2px) skewX(-1deg); } }
        @keyframes v-interf { 0% { top: -20%; opacity: 0; } 5% { opacity: 1; } 10% { top: 120%; opacity: 0; } 100% { top: 120%; opacity: 0; } }

        .crt-flash { animation: burst 0.3s ease-out forwards; }

        /* 3. OS CONTENT */
        .safe-area-wrapper { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; z-index: 20; padding-top: max(env(safe-area-inset-top), 15px); }
        #viewport { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 20px; padding-bottom: 110px; text-shadow: var(--glow-light); position: relative; will-change: transform; transition: filter 0.3s; }

        #bottom-nav {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 80px; background: var(--bg-color); border-top: 2px var(--border-style) var(--text-color);
            display: flex; justify-content: space-around; align-items: center; padding-bottom: env(safe-area-inset-bottom); box-shadow: 0 -5px 15px rgba(0,0,0,0.8); z-index: 50; text-shadow: var(--glow-heavy); 
        }

        .nav-btn { background: none; border: none; color: var(--text-muted); font-family: var(--font-main); font-size: 1.4rem; cursor: pointer; padding: 15px 10px; font-weight: bold; flex: 1; transition: 0.1s; }
        .nav-btn.active { color: var(--text-color); text-shadow: var(--glow-heavy); border-bottom: 5px solid var(--text-color); }

        h1, h2, h3 { border-bottom: 2px var(--border-style) var(--text-color); padding-bottom: 8px; margin-bottom: 18px; font-size: 1.4rem; font-weight: bold; text-shadow: var(--glow-heavy); }
        button, input { font-family: var(--font-main); color: var(--text-color); background: transparent; border: 2px var(--border-style) var(--text-color); outline: none; padding: 14px; text-transform: uppercase; font-size: 1.1rem; text-shadow: var(--glow-light);}
        button { cursor: pointer; font-weight: bold; text-shadow: var(--glow-heavy);}
        button:active { background: var(--text-color); color: var(--bg-color); }
        input::placeholder { color: var(--text-muted); opacity: 0.6; text-transform: uppercase; }

        .fab-btn {
            position: absolute; bottom: 100px; right: 20px; z-index: 40; width: 65px; height: 65px; font-size: 2.2rem; font-weight: bold; background: var(--bg-color);
            box-shadow: -4px 4px 0px var(--text-muted); border: 2px solid var(--text-color); display: flex; justify-content: center; align-items: center;
            color: var(--text-color); cursor: pointer; text-shadow: var(--glow-heavy);
        }
        .fab-btn:active { box-shadow: 0 0 0 transparent; transform: translate(-4px, 4px); background: var(--text-color); color: var(--bg-color); }

        /* EDITOR (DENGAN FIX OVERFLOW UNTUK KURSOR HANTU) */
        .editor-container { 
            position: relative; width: 100%; height: 50vh; margin-top: 10px; 
            border: 2px var(--border-style) var(--text-color); background: rgba(0,0,0,0.3); 
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
            overflow: hidden; /* FIX: Biar kursor hantu kepotong rapi pas di scroll out of bounds */
        }
        #edit-content { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            font-family: var(--font-main); font-size: 1.2rem; line-height: 1.5; padding: 15px; 
            overflow-y: auto; outline: none; text-transform: none; caret-color: transparent; 
            text-shadow: var(--glow-light); z-index: 2; 
        }
        
        #block-cursor { 
            position: absolute; width: 12px; height: 1.4rem; background-color: var(--text-color); 
            box-shadow: var(--glow-heavy); z-index: 1; pointer-events: none; display: none; 
            animation: blink 1s step-end infinite; transition: top 0.05s, left 0.05s; 
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }

        #edit-content h1 { font-size: 2.2rem; border-bottom: none; margin-bottom: 10px; padding-bottom: 0; text-transform: uppercase; text-shadow: var(--glow-heavy); }
        #edit-content h2 { font-size: 1.8rem; border-bottom: none; margin-bottom: 10px; padding-bottom: 0; text-transform: uppercase; text-shadow: var(--glow-heavy); }
        #edit-content b, #edit-content strong { font-weight: bold; color: var(--accent); text-shadow: var(--glow-heavy); }
        #edit-content i, #edit-content em { font-style: italic; opacity: 0.9; }
        #edit-content ol, #edit-content ul { padding-left: 25px; margin-bottom: 10px; list-style-position: outside; }
        #edit-content li { margin-bottom: 5px; }

        /* TOOLBAR */
        #format-toolbar { position: fixed; background: var(--bg-color); border: 2px solid var(--text-color); box-shadow: 0 10px 20px rgba(0,0,0,0.9); display: none; flex-direction: row; align-items: center; z-index: 80; padding: 2px; transition: top 0.1s ease, left 0.1s ease; transform: translate(-50%, -100%); margin-top: -15px; }
        #format-toolbar::after { content: ''; position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%); border-width: 8px 8px 0; border-style: solid; border-color: var(--text-color) transparent transparent transparent; display: block; width: 0; }
        #format-toolbar.flip-down { transform: translate(-50%, 0); margin-top: 15px; }
        #format-toolbar.flip-down::after { top: -8px; bottom: auto; border-width: 0 8px 8px; border-style: solid; border-color: transparent transparent var(--text-color) transparent; }
        .fmt-btn { background: transparent; color: var(--text-color); border: none; font-size: 1.1rem; padding: 12px 18px; margin: 0; font-weight: bold; border-right: 2px solid var(--text-muted); border-radius: 0; user-select: none; text-shadow: none;}
        .fmt-btn:last-child { border-right: none; }
        .fmt-btn:active { background: var(--text-color); color: var(--bg-color); }

        /* COMPONENTS */
        .chart-box { border: 2px var(--border-style) var(--text-color); padding: 10px; margin-top: 25px; margin-bottom: 10px; position: relative; background: rgba(0,0,0,0.1); display: flex; justify-content: center; align-items: center; }
        .chart-label { position: absolute; top: -14px; left: 10px; font-size: 0.9rem; background: var(--bg-color); padding: 0 8px; font-weight: bold; border-left: 2px solid var(--text-color); border-right: 2px solid var(--text-color); color: var(--text-color); z-index: 2; text-shadow: var(--glow-heavy);}
        canvas { display: block; width: 100%; image-rendering: pixelated; }

        .note-card { border: 2px var(--border-style) var(--text-color); padding: 15px; margin-bottom: 15px; cursor: pointer; position: relative; display: block; width: 100%; text-align: left;}
        .note-card:active { background: var(--chart-fill); }
        .note-date { font-size: 0.85rem; color: var(--text-muted); margin-top: 8px; display: block;}
        .pin-badge { position: absolute; top: 0; right: 0; background: var(--text-color); color: var(--bg-color); font-size: 0.8rem; padding: 2px 8px; font-weight: bold; text-shadow: none;}
        
        .label-badge { display: inline-block; padding: 4px 8px; font-size: 0.8rem; border: 1px solid var(--text-color); color: var(--text-color); margin-right: 5px; margin-top: 5px; background: var(--chart-fill); }
        .swipe-labels { display: flex; overflow-x: auto; white-space: nowrap; padding-bottom: 10px; align-items: center; scrollbar-width: none; user-select: none; }
        .swipe-labels::-webkit-scrollbar { display: none; }
        .swipe-labels span { display: inline-block; cursor: pointer; border: 2px dashed var(--text-muted); padding: 6px 12px; margin-right: 8px; font-weight: bold; flex-shrink: 0; }
        .swipe-labels span.active-tag { border: 2px solid var(--accent); background: var(--chart-fill); color: var(--text-color); text-shadow: var(--glow-heavy);}

        .timeline-item { border-left: 2px var(--border-style) var(--text-color); padding-left: 20px; margin-bottom: 20px; position: relative; font-size: 1rem; line-height: 1.4;}
        .timeline-item::before { content: ''; position: absolute; left: -8px; top: 0; width: 14px; height: 14px; background: var(--bg-color); border: 2px solid var(--text-color); }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; align-items: stretch;}
        .flex-row { display: flex; gap: 15px; margin-bottom: 15px; flex-wrap: wrap; align-items: stretch;}
        .flex-between { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }

        .stat-block { flex: 1; border: 2px var(--border-style) var(--text-color); padding: 15px 10px; text-align: center; display: flex; flex-direction: column; justify-content: center;}
        .stat-val { font-size: 1.6rem; font-weight: bold; text-shadow: var(--glow-heavy);}
        .stat-lbl { font-size: 0.75rem; color: var(--text-muted); margin-top: 5px;}
        .hex-anim { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 15px; word-break: break-all;}
        .blink-fast { animation: blink 0.5s step-end infinite; }

        /* MODALS */
        #modal-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 100; display: none; justify-content: center; align-items: center; padding: 20px; transform: translateZ(0);}
        .modal-box { border: 2px solid var(--text-color); background: var(--bg-color); padding: 25px; width: 100%; max-width: 400px; text-align: center; box-shadow: -10px 10px 0px var(--chart-fill); z-index: 101; }
        .modal-box input { width: 100%; margin: 20px 0; text-align: center; font-size: 1.8rem; text-transform: uppercase; text-shadow: var(--glow-light); }
        #toast { position: absolute; top: 50px; left: 50%; transform: translateX(-50%); background: var(--text-color); color: var(--bg-color); padding: 12px 25px; font-weight: bold; font-size: 1.2rem; z-index: 120; opacity: 0; pointer-events: none; transition: opacity 0.2s; border: 2px solid var(--bg-color); box-shadow: 0 0 20px rgba(0,0,0,0.9); }

        /* BOOT SCREEN */
        #power-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 200; display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: var(--text-color); font-family: 'Share Tech Mono', monospace; cursor: pointer; text-shadow: 0 0 5px var(--text-color);
        }
        #boot-instruct { font-size: 1.2rem; margin-bottom: 20px; }
        #boot-bar-container { width: 200px; height: 15px; border: 2px solid var(--text-color); padding: 2px; }
        #boot-progress { width: 0%; height: 100%; background: var(--text-color); transition: width 0.1s linear; }
        
        #boot-console {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 199; display: none; flex-direction: column;
            padding: 20px; color: var(--text-color); font-family: 'Share Tech Mono', monospace; font-size: 1.1rem;
            text-transform: uppercase; text-shadow: 0 0 5px var(--text-color);
        }
    </style>
</head>
<body>

    <!-- BOOT SEQUENCE SCREENS -->
    <div id="power-screen">
        <div id="boot-instruct" class="blink-fast">> HOLD TO POWER ON_</div>
        <div id="boot-bar-container"><div id="boot-progress"></div></div>
    </div>
    <div id="boot-console"></div>

    <!-- MAIN OS LAYERS -->
    <div id="screen-base">
        <div id="crt-matrix"></div>
        <div class="vcr-tracking"></div>
        <div class="scanline"></div>
    </div>
    
    <div id="interference"></div>
    <div id="flicker-layer"></div>
    <div id="crt-vignette"></div>
    <div id="toast">[ SYS MSG ]</div>

    <div class="safe-area-wrapper" id="os-ui">
        <div id="viewport">
            <!-- Content -->
        </div>

        <button id="main-fab" class="fab-btn" onclick="addNote()" style="display:none;">[+]</button>

        <div id="format-toolbar">
            <button class="fmt-btn" onmousedown="execFormat('formatBlock', 'H1'); return false;">H1</button>
            <button class="fmt-btn" onmousedown="execFormat('formatBlock', 'H2'); return false;">H2</button>
            <button class="fmt-btn" onmousedown="execFormat('bold'); return false;">B</button>
            <button class="fmt-btn" onmousedown="execFormat('italic'); return false;">I</button>
            <button class="fmt-btn" onmousedown="execCopy(); return false;">COPY</button>
        </div>

        <div id="bottom-nav">
            <button class="nav-btn active" onclick="navigate('dashboard')">SYS</button>
            <button class="nav-btn" onclick="navigate('notes')">DATA</button>
            <button class="nav-btn" onclick="navigate('log')">LOG</button>
            <button class="nav-btn" onclick="navigate('settings')">CFG</button>
        </div>
    </div>

    <div id="modal-overlay">
        <div class="modal-box">
            <h3 id="modal-title">SUDO COMMIT</h3>
            <p id="modal-desc" style="font-size: 0.9rem; color: var(--text-muted);">Auth Required.</p>
            <input type="text" id="modal-input" autocomplete="off" placeholder="> TYPE 'OK'">
            <div class="grid-2" style="margin-top: 20px; margin-bottom: 0;">
                <button onclick="closeModal()" style="border-style: dashed;">ABORT</button>
                <button id="modal-confirm" style="background: var(--text-color); color: var(--bg-color);">EXEC</button>
            </div>
        </div>
    </div>

    <script>
        /** * OS-NXT CORE LOGIC
         * Mathematically Perfect Cursor Alignment.
         */
        const setupPWA = () => {
            const svgIcon = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" fill="#020802"/><text x="50" y="65" font-family="monospace" font-size="50" font-weight="bold" fill="#14ff14" text-anchor="middle">&gt;_</text></svg>`;
            const encodedIcon = "data:image/svg+xml;base64," + btoa(svgIcon);
            const link = document.createElement('link'); link.rel = 'icon'; link.href = encodedIcon; document.head.appendChild(link);
            const manifest = { name: "OS-NXT", short_name: "OS-NXT", display: "fullscreen", orientation: "portrait", background_color: "#020802", theme_color: "#020802" };
            const manifestLink = document.createElement('link'); manifestLink.rel = 'manifest'; manifestLink.href = 'data:application/json;charset=utf-8,' + encodeURIComponent(JSON.stringify(manifest)); document.head.appendChild(manifestLink);
        };
        setupPWA();

        let state = { 
            notes: [], labels: ['TUGAS', 'PRIBADI', 'IDE'], logs: [], 
            settings: { theme: 'pipboy', sfx: true, vhs: true, blur: true, chroma: true, scan: true, flicker: true, jitter: false, interf: true, ghost: true, boot: true }, 
            currentView: 'dashboard', activeNoteId: null, filterLabel: null 
        };
        
        let pristineEditorState = ""; let editorHistory = []; let historyIndex = -1;

        try {
            const memNotes = localStorage.getItem('os-nxt-notes'); if(memNotes) state.notes = JSON.parse(memNotes);
            const memLabels = localStorage.getItem('os-nxt-labels'); if(memLabels) state.labels = JSON.parse(memLabels);
            const memLogs = localStorage.getItem('os-nxt-logs'); if(memLogs) state.logs = JSON.parse(memLogs);
            const memSettings = localStorage.getItem('os-nxt-settings'); 
            if(memSettings) state.settings = { ...state.settings, ...JSON.parse(memSettings) };
        } catch (e) { localStorage.clear(); }

        let sessionStartTime = Date.now();

        const saveState = () => {
            localStorage.setItem('os-nxt-notes', JSON.stringify(state.notes)); localStorage.setItem('os-nxt-labels', JSON.stringify(state.labels));
            localStorage.setItem('os-nxt-logs', JSON.stringify(state.logs)); localStorage.setItem('os-nxt-settings', JSON.stringify(state.settings));
        };

        const addLog = (action, details) => { state.logs.unshift({ id: Date.now(), action, details, time: new Date().toISOString() }); if(state.logs.length > 100) state.logs.pop(); saveState(); };
        const getStorageSize = () => { let total = 0; for(let x in localStorage) { if(localStorage.hasOwnProperty(x)) total += ((localStorage[x].length + x.length) * 2); } return (total / 1024).toFixed(1); };
        const fmtDate = (iso) => { const d = new Date(iso); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`; };
        const stripHTML = (html) => { const tmp = document.createElement("DIV"); tmp.innerHTML = html; return tmp.textContent || tmp.innerText || ""; };
        
        let toastTimeout;
        const showToast = (msg) => { const t = document.getElementById('toast'); t.innerText = `[ ${msg} ]`; t.style.opacity = 1; clearTimeout(toastTimeout); toastTimeout = setTimeout(() => t.style.opacity = 0, 2000); };

        // --- AUDIO ENGINE ---
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx, humOsc, humGain, noiseSource, noiseFilter, noiseGain;
        
        const initAudio = () => { if (!audioCtx && AudioContext) audioCtx = new AudioContext(); if(audioCtx && audioCtx.state === 'suspended') audioCtx.resume(); manageHumFX(); };
        const manageHumFX = () => {
            if(!audioCtx) return;
            if(state.settings.vhs && !noiseSource) {
                const bufferSize = audioCtx.sampleRate * 2; const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate); const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
                noiseSource = audioCtx.createBufferSource(); noiseSource.buffer = buffer; noiseSource.loop = true;
                noiseFilter = audioCtx.createBiquadFilter(); noiseFilter.type = 'lowpass'; noiseFilter.frequency.value = 2000; 
                noiseGain = audioCtx.createGain(); noiseGain.gain.value = 0.04; 
                noiseSource.connect(noiseFilter); noiseFilter.connect(noiseGain); noiseGain.connect(audioCtx.destination); noiseSource.start();

                humOsc = audioCtx.createOscillator(); humGain = audioCtx.createGain();
                humOsc.type = 'sine'; humOsc.frequency.value = 55; humGain.gain.value = 0.03;
                humOsc.connect(humGain); humGain.connect(audioCtx.destination); humOsc.start();
            } else if (!state.settings.vhs && noiseSource) { noiseSource.stop(); noiseSource = null; humOsc.stop(); humOsc = null; }
        };

        const analogHit = (startFreq, endFreq, dur, vol, type='square') => {
            if (!state.settings.sfx || !audioCtx) return; const t = audioCtx.currentTime;
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.type = type; osc.frequency.setValueAtTime(startFreq, t); osc.frequency.exponentialRampToValueAtTime(endFreq, t + dur);
            gain.gain.setValueAtTime(vol, t); gain.gain.exponentialRampToValueAtTime(0.001, t + dur);
            osc.connect(gain); gain.connect(audioCtx.destination); osc.start(t); osc.stop(t + dur);
        };

        const sfx = {
            type: () => { analogHit(150, 40, 0.06, 0.2, 'sawtooth'); analogHit(800, 300, 0.03, 0.05, 'square'); },
            nav: () => { analogHit(300, 40, 0.1, 0.15, 'square'); },
            enter: () => { analogHit(400, 50, 0.15, 0.15, 'triangle'); },
            error: () => { analogHit(150, 40, 0.3, 0.2, 'sawtooth'); analogHit(100, 20, 0.4, 0.2, 'sawtooth'); },
            commit: () => { analogHit(800, 1200, 0.1, 0.1, 'square'); setTimeout(() => analogHit(1200, 1500, 0.15, 0.1, 'square'), 100); },

        };

        // --- ANIMATIONS & INTERCEPTS ---
        let activeFrames = []; let activeTimeouts = [];
        const clearAnimations = () => {

        });

        // --- 1. DASHBOARD ---
        const renderDashboard = () => {
            const storageKB = getStorageSize(); const recentNotes = [...state.notes].sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp)).slice(0, 2);
            const vp = document.getElementById('viewport');
            let hexString = ""; for(let i=0; i<8; i++) hexString += Math.floor(Math.random()*16777215).toString(16).padStart(6, '0').toUpperCase() + " ";

                </div>
                <div class="chart-box" style="height: 180px;"><span class="chart-label">MEM SCAN</span><canvas id="radar-chart"></canvas></div>
                <div class="chart-box" style="height: 180px;"><span class="chart-label">DATA DIST</span><canvas id="pie-chart"></canvas></div>
                <h3>RECENT I/O</h3>
                ${recentNotes.length === 0 ? '<p style="font-size:0.9rem">NO ACTIVITY.</p>' : recentNotes.map(n => `<button class="note-card" onclick="openNote(${n.id})"><span style="font-weight:bold; font-size:1.2rem;">${n.title || 'UNTITLED_BLOCK'}</span><br><span class="note-date">MODIFIED: ${fmtDate(n.timestamp)}</span></button>`).join('')}

            `;
            activeTimeouts.push(setTimeout(() => { if(state.currentView !== 'dashboard') return; drawPieChart(); drawRadarScanner(storageKB); }, 50));
            updateUptime(); if(!state.logs.length || state.logs[0].action !== 'SYSTEM') addLog('SYSTEM', 'SYS Diagnostics Active');
        };

        const updateUptime = () => {
            if(state.currentView !== 'dashboard') return;
            const el = document.getElementById('uptime-val'); if(!el) return;
            const diff = Math.floor((Date.now() - sessionStartTime) / 1000); el.innerText = `${String(Math.floor(diff / 60)).padStart(2, '0')}:${String(diff % 60).padStart(2, '0')}`;
            activeTimeouts.push(setTimeout(updateUptime, 1000)); 
        };

        const drawPieChart = () => {
            const canvas = document.getElementById('pie-chart'); if(!canvas) return;
            canvas.width = canvas.parentElement.clientWidth - 20; canvas.height = canvas.parentElement.clientHeight - 20;
            const ctx = canvas.getContext('2d'); const color = getComputedStyle(document.body).getPropertyValue('--text-color').trim();
            const dist = { 'UNLABELED': 0 }; state.labels.forEach(l => dist[l] = 0);
            state.notes.forEach(n => { if(n.labels.length === 0) dist['UNLABELED']++; else n.labels.forEach(l => { if(dist[l] !== undefined) dist[l]++; }); });
            const validDist = Object.entries(dist).filter(([k,v]) => v > 0); const total = validDist.reduce((a, [k,v]) => a + v, 0);

            if(total === 0) { ctx.fillStyle = color; ctx.font = "14px monospace"; ctx.textAlign="center"; ctx.fillText("NO DATA", canvas.width/2, canvas.height/2); return; }

            let startAngle = 0; const cx = canvas.width / 2; const cy = canvas.height / 2; const radius = Math.min(cx, cy) - 10;
            validDist.forEach(([label, count], index) => {
                const sliceAngle = (count / total) * 2 * Math.PI;
                ctx.beginPath(); ctx.moveTo(cx, cy); ctx.arc(cx, cy, radius, startAngle, startAngle + sliceAngle); ctx.closePath();
                ctx.fillStyle = color; ctx.globalAlpha = Math.max(1 - (index * 0.2), 0.2); ctx.fill();
                ctx.globalAlpha = 1.0; ctx.strokeStyle = getComputedStyle(document.body).getPropertyValue('--bg-color').trim(); ctx.lineWidth = 2; ctx.stroke(); startAngle += sliceAngle;
            });
        };

        const drawRadarScanner = (storage) => {
            const canvas = document.getElementById('radar-chart'); if(!canvas) return;
            canvas.width = canvas.parentElement.clientWidth - 20; canvas.height = canvas.parentElement.clientHeight - 20;
            const ctx = canvas.getContext('2d'); const cx = canvas.width / 2; const cy = canvas.height / 2; const radius = Math.min(cx, cy) - 10; let angle = 0;
            const color = getComputedStyle(document.body).getPropertyValue('--text-color').trim(); const bgColor = getComputedStyle(document.body).getPropertyValue('--bg-color').trim();
            const crtLine = getComputedStyle(document.body).getPropertyValue('--crt-line').trim(); const chartFill = getComputedStyle(document.body).getPropertyValue('--chart-fill').trim();
            
            let lastTime = 0;
            const animate = (time) => {
                if(state.currentView !== 'dashboard') return;
                activeFrames.push(requestAnimationFrame(animate));
                if(time - lastTime < 50) return; 
                lastTime = time;

                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.strokeStyle = crtLine; ctx.lineWidth = 1;
                ctx.beginPath(); ctx.arc(cx, cy, radius, 0, Math.PI*2); ctx.stroke(); ctx.beginPath(); ctx.arc(cx, cy, radius*0.5, 0, Math.PI*2); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(cx, 0); ctx.lineTo(cx, canvas.height); ctx.stroke(); ctx.beginPath(); ctx.moveTo(0, cy); ctx.lineTo(canvas.width, cy); ctx.stroke();
                ctx.save(); ctx.translate(cx, cy); ctx.rotate(angle);
                ctx.beginPath(); ctx.moveTo(0, 0); ctx.arc(0, 0, radius, -0.05, 0.4); ctx.lineTo(0,0);
                ctx.fillStyle = chartFill; ctx.fill(); ctx.strokeStyle = color; ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(radius, 0); ctx.stroke(); ctx.restore();
                ctx.fillStyle = bgColor; ctx.fillRect(cx - 30, cy - 12, 60, 24); ctx.strokeStyle = color; ctx.strokeRect(cx - 30, cy - 12, 60, 24);
                ctx.fillStyle = color; ctx.font = "14px monospace"; ctx.textAlign="center";
                ctx.fillText(storage > 1000 ? (storage/1024).toFixed(1)+'M' : storage+'K', cx, cy + 5);
                angle += 0.05; 
            }; 
            activeFrames.push(requestAnimationFrame(animate));
        };

        const requestClearLogs = () => { openCommit('FLUSH SYS LOGS', 'Erase all trace data?', () => { state.logs = []; saveState(); showToast('LOGS FLUSHED'); renderDashboard(); }); };

        // --- 2. NOTES LIST ---
        const renderNotes = () => {

                </div>
                <div id="notes-list-container"></div>
            `;
            buildNotesDOM();
        };

        const buildNotesDOM = () => {

            const sortedNotes = [...filteredNotes.filter(n => n.pinned), ...filteredNotes.filter(n => !n.pinned)];
            container.innerHTML = sortedNotes.length === 0 ? '<p>NO DATA BLOCKS FOUND.</p>' : sortedNotes.map(n => `

                    ${n.pinned ? '<div class="pin-badge">PINNED</div>' : ''}
                    <div style="margin-bottom:8px;"><strong style="font-size:1.3rem">${n.title || 'UNTITLED_BLOCK'}</strong></div>
                    <div style="margin-bottom:8px;">${n.labels.map(l => `<span class="label-badge">${l}</span>`).join('')}</div>
                    <div class="note-date">${fmtDate(n.timestamp)}</div>
                </div>
            `).join('');
            executeQuickSearch();
        };
        const setFilter = (lbl) => { sfx.enter(); state.filterLabel = lbl; renderNotes(); };
        const executeQuickSearch = () => { sfx.type(); const term = document.getElementById('search-box').value.toLowerCase(); document.querySelectorAll('.note-item-dom').forEach(card => { card.style.display = (card.getAttribute('data-title').includes(term) || card.getAttribute('data-content').includes(term)) ? 'block' : 'none'; }); };

        // --- 3. EDITOR ---
        const addNote = () => { const id = Date.now(); state.notes.unshift({ id, title: '', content: '', labels: [], pinned: false, timestamp: new Date().toISOString(), _isNew: true }); state.activeNoteId = id; forceNavigate('editor'); };
        const openNote = (id) => { state.activeNoteId = id; forceNavigate('editor'); };

        let saveDraftTimeout;
        const pushHistory = (val) => {
            if(editorHistory[historyIndex] === val) return;
            editorHistory = editorHistory.slice(0, historyIndex + 1);
            editorHistory.push(val); historyIndex++;
        };

        const renderEditor = () => {
            const vp = document.getElementById('viewport'); const note = state.notes.find(n => n.id === state.activeNoteId); if(!note) return forceNavigate('notes');
            pristineEditorState = JSON.stringify({ t: note.title, c: note.content });
            editorHistory = [note.content]; historyIndex = 0; 
            const rawText = stripHTML(note.content); const words = rawText.trim().split(/\s+/).filter(w=>w.length>0).length;

                <div class="flex-between">
                    <button onclick="requestDiscard()" style="border-style:dashed; color:var(--text-muted);">&lt; DISCARD</button>

                <input type="text" id="edit-title" value="${note.title}" placeholder="> TITLE_BLOCK" style="width:100%; margin-bottom:15px; font-size:1.4rem; font-weight:bold;" oninput="sfx.type()">
                
                <span style="font-size: 0.8rem; color: var(--text-muted);">ASSIGN LABELS:</span>
                <div class="swipe-labels" style="margin-top: 5px;">
                    ${state.labels.map(l => `<span onclick="toggleLabelDraft('${l}')" class="${note.labels.includes(l) ? 'active-tag' : ''}">[${l}]</span>`).join('')}

                <div class="flex-between" style="margin-top:10px;">

                        <button onclick="execUndo()" style="padding: 8px; margin-right: 5px;">&lt; UNDO</button>
                        <button onclick="execRedo()" style="padding: 8px;">REDO &gt;</button>

                    <button style="color:red; border-color:red; font-size:1rem; padding: 8px;" onclick="requestDelete(${note.id})">PURGE</button>

                <div style="font-size: 0.75rem; color: var(--text-muted); margin-top:5px; text-align:right;"><span id="editor-stats">W: ${words} | C: ${rawText.length}</span></div>
            `;
            
            const ta = document.getElementById('edit-content');
            ta.addEventListener('keyup', handleSmartList);
            document.addEventListener('selectionchange', handleSelectionPos);
            ta.addEventListener('scroll', handleSelectionPos);

        };

        const handleSmartList = (e) => {
            if(e.code === 'Space') {
                const sel = window.getSelection(); if(!sel.rangeCount) return; const node = sel.anchorNode;
                if(node.nodeType === 3 && (node.textContent.trim() === '1.' || node.textContent.trim() === '-')) {
                    node.textContent = ''; document.execCommand(node.textContent.includes('-') ? 'insertUnorderedList' : 'insertOrderedList'); sfx.enter();
                }

        };

        // KORDINAT DOM YANG DIKOREKSI (FIX CURSOR DOWNWARD DRIFT)
        const handleSelectionPos = () => {
            if(state.currentView !== 'editor') return;
            const ta = document.getElementById('edit-content'); const toolbar = document.getElementById('format-toolbar'); const cursor = document.getElementById('block-cursor');
            if(!ta || !cursor) return;

            const sel = window.getSelection();
            if(document.activeElement === ta && sel.rangeCount > 0) { 
                const range = sel.getRangeAt(0); const rects = range.getClientRects(); 
                let rect = rects.length > 0 ? rects[rects.length - 1] : range.getBoundingClientRect();

                if(sel.isCollapsed) {

                    if(ta.innerHTML === '' || ta.innerHTML === '<br>') { 
                        cursor.style.top = `15px`; cursor.style.left = `15px`; cursor.style.height = `1.4rem`;
                    } 
                    else if (rect && rect.height > 0) {
                        // LOGIKA ABSOLUT: Hanya butuh selisih box. Tidak ditambah scrollTop karena sibling absolute sama!
                        let topPos = rect.top - containerRect.top; 
                        let leftPos = rect.left - containerRect.left;

                    }, 0));
                }

        };

        const execFormat = (command, val = null) => { document.execCommand(command, false, val); sfx.commit(); showToast('FORMAT APPLIED'); pushHistory(document.getElementById('edit-content').innerHTML); };
        const execCopy = () => { document.execCommand('copy'); showToast('TEXT COPIED'); sfx.commit(); document.getSelection().removeAllRanges(); handleSelectionPos(); };

        const execRedo = () => { if(historyIndex < editorHistory.length - 1) { historyIndex++; document.getElementById('edit-content').innerHTML = editorHistory[historyIndex]; sfx.type(); } else { sfx.error(); showToast('NEWEST STATE'); } };

        const captureDraft = () => { const note = state.notes.find(n => n.id === state.activeNoteId); if(note) { note.title = document.getElementById('edit-title').value; note.content = document.getElementById('edit-content').innerHTML; } };
        const toggleLabelDraft = (lbl) => { sfx.enter(); captureDraft(); const note = state.notes.find(n => n.id === state.activeNoteId); if(note.labels.includes(lbl)) note.labels = note.labels.filter(l => l !== lbl); else note.labels.push(lbl); renderEditor(); };
        const togglePinDraft = () => { sfx.enter(); captureDraft(); const note = state.notes.find(n => n.id === state.activeNoteId); note.pinned = !note.pinned; renderEditor(); };

                    showToast('CHANGES PURGED'); forceNavigate('notes');
                });

        };

        const requestSave = () => {
            openCommit('SAVE TO MEMORY', 'Commit changes to database?', () => {
                captureDraft(); const note = state.notes.find(n => n.id === state.activeNoteId); note.timestamp = new Date().toISOString(); delete note._isNew;

        const requestDelete = (id) => openCommit('PURGE DATA', `Delete ID:${id}?`, () => { state.notes = state.notes.filter(n => n.id !== id); saveState(); showToast('BLOCK PURGED'); addLog('DATA', `Purged block ID:${id}`); forceNavigate('notes'); });

        // --- 4. LOG ---
        const renderLog = () => {
            document.getElementById('viewport').innerHTML = `
                <h2>TRACE.LOG</h2>
                <div class="hex-anim"><span class="blink-fast">_></span> MONITORING_EVENTS...</div>
                <div style="border-left: 2px var(--border-style) var(--text-color); margin-left: 10px;">
                    ${state.logs.length === 0 ? '<p style="padding-left:10px;">NO LOGS.</p>' : state.logs.map(l => `<div class="timeline-item"><span class="note-date">${fmtDate(l.time)}</span><br><strong>[${l.action}]</strong> ${l.details}</div>`).join('')}
                </div>
            `;
        };

        // --- 5. SETTINGS (CFG) ---
        const renderSettings = () => {
            document.getElementById('viewport').innerHTML = `
                <h2>SYS.CONFIG</h2>
                <div class="hex-anim"><span class="blink-fast">_></span> ROOT_ACCESS: GRANTED</div>
                
                <h3 style="font-size: 1rem; color: var(--text-muted); margin-bottom: 10px; margin-top:20px;">SYSTEM & AUDIO</h3>
                <div class="grid-2">
                    <div style="border:2px var(--border-style) var(--text-color); padding:10px; text-align:center;">
                        <span style="font-weight:bold; font-size:0.9rem; display:block; margin-bottom:5px;">ENVIRONMENT</span>
                        <button onclick="toggleSetting('theme')" style="width:100%; border-style:dashed;">${state.settings.theme === 'pipboy' ? 'PIPBOY' : 'LINUX'}</button>
                    </div>
                    <div style="border:2px var(--border-style) var(--text-color); padding:10px; text-align:center;">
                        <span style="font-weight:bold; font-size:0.9rem; display:block; margin-bottom:5px;">COLD BOOT</span>
                        <button onclick="toggleSetting('boot')" style="width:100%; border-style:dashed;">${state.settings.boot ? 'ON' : 'OFF'}</button>
                    </div>
                    <div style="border:2px var(--border-style) var(--text-color); padding:10px; text-align:center;">
                        <span style="font-weight:bold; font-size:0.9rem; display:block; margin-bottom:5px;">UI SFX</span>
                        <button onclick="toggleSetting('sfx')" style="width:100%; border-style:dashed;">${state.settings.sfx ? 'ON' : 'OFF'}</button>
                    </div>
                    <div style="border:2px var(--border-style) var(--text-color); padding:10px; text-align:center;">
                        <span style="font-weight:bold; font-size:0.9rem; display:block; margin-bottom:5px;">VHS HISS</span>
                        <button onclick="toggleSetting('vhs')" style="width:100%; border-style:dashed;">${state.settings.vhs ? 'ON' : 'OFF'}</button>
                    </div>
                </div>

                <h3 style="font-size: 1rem; color: var(--text-muted); margin-bottom: 10px; margin-top:20px;">VIDEO FX (HARDWARE)</h3>
                <div class="grid-2">
                    <div style="border:2px var(--border-style) var(--text-color); padding:10px; text-align:center;">
                        <span style="font-weight:bold; font-size:0.9rem; display:block; margin-bottom:5px;">LENS BLUR</span>
                        <button onclick="toggleSetting('blur')" style="width:100%; border-style:dashed;">${state.settings.blur ? 'ON' : 'OFF'}</button>
                    </div>
                    <div style="border:2px var(--border-style) var(--text-color); padding:10px; text-align:center;">
                        <span style="font-weight:bold; font-size:0.9rem; display:block; margin-bottom:5px;">CHROMATIC</span>
                        <button onclick="toggleSetting('chroma')" style="width:100%; border-style:dashed;">${state.settings.chroma ? 'ON' : 'OFF'}</button>
                    </div>
                    <div style="border:2px var(--border-style) var(--text-color); padding:10px; text-align:center;">
                        <span style="font-weight:bold; font-size:0.9rem; display:block; margin-bottom:5px;">SCANLINES</span>
                        <button onclick="toggleSetting('scan')" style="width:100%; border-style:dashed;">${state.settings.scan ? 'ON' : 'OFF'}</button>
                    </div>
                    <div style="border:2px var(--border-style) var(--text-color); padding:10px; text-align:center;">
                        <span style="font-weight:bold; font-size:0.9rem; display:block; margin-bottom:5px;">FLICKER</span>
                        <button onclick="toggleSetting('flicker')" style="width:100%; border-style:dashed;">${state.settings.flicker ? 'ON' : 'OFF'}</button>
                    </div>
                    <div style="border:2px var(--border-style) var(--text-color); padding:10px; text-align:center;">
                        <span style="font-weight:bold; font-size:0.9rem; display:block; margin-bottom:5px;">INTERFERENCE</span>
                        <button onclick="toggleSetting('interf')" style="width:100%; border-style:dashed;">${state.settings.interf ? 'ON' : 'OFF'}</button>
                    </div>
                    <div style="border:2px var(--border-style) var(--text-color); padding:10px; text-align:center;">
                        <span style="font-weight:bold; font-size:0.9rem; display:block; margin-bottom:5px;">GHOSTING</span>
                        <button onclick="toggleSetting('ghost')" style="width:100%; border-style:dashed;">${state.settings.ghost ? 'ON' : 'OFF'}</button>
                    </div>
                    <div style="border:2px var(--border-style) var(--text-color); padding:10px; grid-column: span 2; text-align:center;">
                        <span style="font-weight:bold; font-size:0.9rem; display:block; margin-bottom:5px;">SIGNAL JITTER (GLITCH)</span>
                        <button onclick="toggleSetting('jitter')" style="width:100%; border-style:dashed;">${state.settings.jitter ? 'ON' : 'OFF'}</button>
                    </div>
                </div>

                <h3 style="font-size: 1rem; color: var(--text-muted); margin-bottom: 10px; margin-top:20px;">DATABASE</h3>
                <div style="border: 2px dashed var(--text-color); padding: 15px; margin-bottom: 20px;">
                    <div style="margin-bottom: 15px;">
                        ${state.labels.length === 0 ? '<p style="font-size:0.9rem">NO LABELS.</p>' : ''}
                        ${state.labels.map(l => `<div class="flex-between" style="border-bottom: 1px dashed var(--crt-line); padding: 8px 0;"><span style="font-size:1rem;">[${l}]</span><button style="padding: 4px 8px; font-size: 0.8rem; border-color: red; color: red;" onclick="requestDeleteLabel('${l}')">DEL</button></div>`).join('')}
                    </div>
                    <div class="flex-row"><input type="text" id="new-label-input" placeholder="> NEW_LABEL" style="flex: 1;" onkeyup="sfx.type()"><button onclick="addNewLabel()">[+]</button></div>
                </div>
                
                <h3 style="font-size: 1rem; color: var(--text-muted); margin-bottom: 10px;">DATA.IO</h3>
                <div class="grid-2"><button onclick="exportData()">EXPORT</button><button onclick="document.getElementById('import-file').click()">IMPORT</button><input type="file" id="import-file" style="display:none" accept=".json" onchange="handleImport(event)"></div>
            `;
        };

        const toggleSetting = (key) => {
            sfx.enter();
            if(key === 'theme') {
                state.settings.theme = state.settings.theme === 'pipboy' ? 'linux' : 'pipboy';
                applyDOMSettings();
            } else {
                state.settings[key] = !state.settings[key];
                applyDOMSettings();
                if(key === 'vhs' || key === 'sfx') manageHumFX();
            }
            saveState(); renderSettings(); addLog('CFG', `${key.toUpperCase()} set to ${state.settings[key]}`);
        };

        const applyDOMSettings = () => {
            document.body.setAttribute('data-theme', state.settings.theme); 
            document.body.setAttribute('data-blur', state.settings.blur);
            document.body.setAttribute('data-chroma', state.settings.chroma);
            document.body.setAttribute('data-scan', state.settings.scan);
            document.body.setAttribute('data-flicker', state.settings.flicker);
            document.body.setAttribute('data-jitter', state.settings.jitter);
            document.body.setAttribute('data-interf', state.settings.interf);
            document.body.setAttribute('data-ghost', state.settings.ghost);
            document.getElementById('meta-theme-color').content = state.settings.theme === 'pipboy' ? '#030a03' : '#fdf6e3'; 
        };

        const addNewLabel = () => { const input = document.getElementById('new-label-input'); const val = input.value.trim().toUpperCase().replace(/\s+/g, '_'); if(val && !state.labels.includes(val)) { sfx.commit(); state.labels.push(val); saveState(); addLog('CFG', `Created label [${val}]`); renderSettings(); } else { sfx.error(); showToast("INVALID LABEL"); } };
        const requestDeleteLabel = (lbl) => openCommit('PURGE LABEL', `Remove [${lbl}]?`, () => { state.labels = state.labels.filter(l => l !== lbl); saveState(); showToast('LABEL PURGED'); renderSettings(); });

        const exportData = () => { sfx.enter(); const dataUri = 'data:application/json;charset=utf-8,'+ encodeURIComponent(JSON.stringify(state)); const link = document.createElement('a'); link.href = dataUri; link.download = `OS_NXT_${Date.now()}.json`; link.click(); showToast('EXPORT SUCCESS'); addLog('DATA', 'Exported memory state'); };
        const handleImport = (e) => { const file = e.target.files[0]; if(!file) return; const reader = new FileReader(); reader.onload = (event) => { try { const tempImport = JSON.parse(event.target.result); if(tempImport.notes) openCommit('OVERWRITE SYS', 'Current data will be destroyed.', () => { state = tempImport; saveState(); applyDOMSettings(); showToast('RESTORE SUCCESS'); addLog('SYS', 'Memory restored'); forceNavigate('dashboard'); }); } catch(err) { sfx.error(); showToast('IMPORT FAIL'); } }; reader.readAsText(file); e.target.value = ''; };

        // --- STRICT MODAL UX ---
        let commitCallback = null; const modal = document.getElementById('modal-overlay'); const modalInput = document.getElementById('modal-input');
        const openCommit = (title, desc, callback) => {
            sfx.error(); document.getElementById('modal-title').innerText = title; document.getElementById('modal-desc').innerText = desc; modalInput.value = ''; modalInput.placeholder = "> TYPE 'OK'"; commitCallback = callback; modal.style.display = 'flex'; 
            modal.querySelector('.modal-box').classList.remove('crt-flash'); void modal.offsetWidth; modal.querySelector('.modal-box').classList.add('crt-flash'); 
        };
        const closeModal = () => { sfx.enter(); modal.style.display = 'none'; commitCallback = null; };
        document.getElementById('modal-confirm').addEventListener('click', () => { if(modalInput.value.toLowerCase() === 'ok') { sfx.commit(); modal.style.display = 'none'; if(commitCallback) commitCallback(); } else { sfx.error(); modalInput.value = ''; modalInput.placeholder = "INVALID. TYPE 'OK'"; } });

        // --- BOOT SEQUENCE (HOLD TO POWER) ---
        let bootReq; let bootProgress = 0;
        const startPower = (e) => {
            if(e.type === 'touchstart') e.preventDefault(); 
            if(bootProgress >= 100) return;
            sfx.type(); 
            bootProgress = 0;
            
            const animateBoot = () => {
                bootProgress += 2.5; 
                document.getElementById('boot-progress').style.width = bootProgress + '%';
                if(bootProgress % 10 === 0) sfx.type(); 
                
                if(bootProgress >= 100) { powerOn(); } 
                else { bootReq = requestAnimationFrame(animateBoot); }
            };
            bootReq = requestAnimationFrame(animateBoot);
            document.getElementById('boot-instruct').innerText = "> CHARGING CAPACITORS...";
        };
        const cancelPower = (e) => {
            if(bootProgress >= 100) return;
            cancelAnimationFrame(bootReq); bootProgress = 0;
            document.getElementById('boot-progress').style.width = '0%';
            document.getElementById('boot-instruct').innerText = "> HOLD TO POWER ON_";
        };

        const powerOn = () => {
            document.getElementById('power-screen').style.display = 'none';
            initAudio(); sfx.boot();
            
            if(!state.settings.boot) {
                document.getElementById('os-ui').style.display = 'flex';
                forceNavigate('dashboard'); return;
            }

            const bootConsole = document.getElementById('boot-console');
            bootConsole.style.display = 'flex';
            
            const lines = [
                "OS-NXT v3.1.0 KERNEL INIT", "BIOS DATE 04/24/85", "CPU: Z80A 4MHz ... OK", 
                "MEM: 64KB BASE ... OK", "MOUNTING VFS: /dev/sda1", "LOADING MODULES: AUDIO, CRT_FX", 
                "ESTABLISHING SECURE LINK...", "BOOT COMPLETE."
            ];
            
            let html = ""; let i = 0;
            const printLine = () => {
                if(i < lines.length) {
                    html += `<div>> ${lines[i]}</div>`; bootConsole.innerHTML = html;
                    if(state.settings.sfx) analogHit(300, 100, 0.05, 0.05, 'square');
                    i++; setTimeout(printLine, Math.random() * 150 + 50);
                } else {
                    setTimeout(() => {
                        bootConsole.style.display = 'none'; document.getElementById('os-ui').style.display = 'flex'; forceNavigate('dashboard');
                    }, 500);
                }
            };
            printLine();
        };

        window.onload = () => {
            if(state.settings.sfx === undefined) state.settings = { theme: 'pipboy', sfx: true, vhs: true, blur: true, chroma: true, scan: true, flicker: true, jitter: false, interf: true, ghost: true, boot: true };
            applyDOMSettings(); history.replaceState({ view: 'dashboard' }, "", "#dashboard");
            
            const pScreen = document.getElementById('power-screen');
            pScreen.addEventListener('mousedown', startPower); pScreen.addEventListener('touchstart', startPower);
            pScreen.addEventListener('mouseup', cancelPower); pScreen.addEventListener('touchend', cancelPower);
            pScreen.addEventListener('mouseleave', cancelPower);
        };
    </script>
</body>
</html>
